# =============================================================================
# AZALPLUS - Absences pour la Paie
# =============================================================================
# Gestion des absences avec impact sur le bulletin de paie

nom: Absence Paie
nom_pluriel: Absences Paie
icone: calendar-x
menu: Paie
description: "Absences avec calcul des retenues et IJSS"
ordre_menu: 15

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "ABS-{AAAA}{MM}-{####}"

  - nom: employe_id
    type: relation
    libelle: "Employé"
    relation: employes
    obligatoire: true

  - nom: type_absence
    type: select
    libelle: "Type d'absence"
    obligatoire: true
    options:
      - MALADIE
      - ACCIDENT_TRAVAIL
      - ACCIDENT_TRAJET
      - MALADIE_PRO
      - MATERNITE
      - PATERNITE
      - ADOPTION
      - CONGE_PARENTAL
      - CONGE_SANS_SOLDE
      - ABSENCE_INJUSTIFIEE
      - MISE_A_PIED
      - GREVE
      - CONGE_SABBATIQUE
      - TEMPS_PARTIEL_THERAPEUTIQUE
      - AUTRE

  # Dates
  - nom: date_debut
    type: date
    libelle: "Date début"
    obligatoire: true

  - nom: date_fin
    type: date
    libelle: "Date fin"
    description: "Fin réelle ou prévisionnelle"

  - nom: date_reprise
    type: date
    libelle: "Date reprise"

  - nom: date_dernier_jour_travail
    type: date
    libelle: "Dernier jour travaillé"

  # Durée
  - nom: jours_calendaires
    type: number
    libelle: "Jours calendaires"

  - nom: jours_ouvrables
    type: number
    libelle: "Jours ouvrables"

  - nom: jours_ouvres
    type: number
    libelle: "Jours ouvrés"

  - nom: heures_absence
    type: number
    libelle: "Heures absence"
    description: "Pour calcul retenue"

  # Document médical
  - nom: arret_travail_numero
    type: text
    libelle: "N° arrêt travail"

  - nom: arret_travail_document
    type: text
    libelle: "Document arrêt"
    description: "Chemin du scan"

  - nom: prolongation
    type: boolean
    libelle: "Prolongation"
    defaut: false

  - nom: absence_origine_id
    type: relation
    libelle: "Absence d'origine"
    relation: absences_paie
    description: "Si prolongation"

  # Retenue sur salaire
  - nom: methode_retenue
    type: select
    libelle: "Méthode retenue"
    options:
      - JOURS_OUVRES
      - JOURS_CALENDAIRES
      - HEURES_REELLES
      - MAINTIEN_SALAIRE
    defaut: JOURS_OUVRES

  - nom: base_retenue
    type: money
    libelle: "Base retenue"
    description: "Salaire de référence"

  - nom: taux_retenue
    type: number
    libelle: "Taux retenue (%)"
    defaut: 100

  - nom: montant_retenue
    type: money
    libelle: "Montant retenue"

  # Indemnisation employeur
  - nom: maintien_salaire
    type: boolean
    libelle: "Maintien salaire"
    defaut: false
    description: "Employeur maintient le salaire"

  - nom: delai_carence_employeur
    type: number
    libelle: "Carence employeur (j)"
    defaut: 7
    description: "Jours avant complément"

  - nom: duree_maintien_100
    type: number
    libelle: "Maintien 100% (j)"
    description: "Selon ancienneté"

  - nom: duree_maintien_partial
    type: number
    libelle: "Maintien partiel (j)"

  - nom: taux_maintien_partial
    type: number
    libelle: "Taux maintien (%)"
    defaut: 66.67

  - nom: complement_employeur
    type: money
    libelle: "Complément employeur"

  # IJSS (Indemnités Journalières Sécurité Sociale)
  - nom: ijss_estimees
    type: money
    libelle: "IJSS estimées"

  - nom: ijss_recues
    type: money
    libelle: "IJSS reçues"

  - nom: date_reception_ijss
    type: date
    libelle: "Date réception IJSS"

  # Subrogation
  - nom: subrogation
    type: boolean
    libelle: "Subrogation"
    defaut: false
    description: "Employeur perçoit les IJSS"

  - nom: subrogation_debut
    type: date
    libelle: "Début subrogation"

  - nom: subrogation_fin
    type: date
    libelle: "Fin subrogation"

  # Prévoyance
  - nom: prevoyance_declenchee
    type: boolean
    libelle: "Prévoyance"
    defaut: false

  - nom: indemnites_prevoyance
    type: money
    libelle: "Indemnités prévoyance"

  # DSN
  - nom: dsn_evenement_id
    type: relation
    libelle: "Événement DSN"
    relation: dsn_evenements

  - nom: transmis_dsn
    type: boolean
    libelle: "Transmis DSN"
    defaut: false

  - nom: date_transmission_dsn
    type: datetime
    libelle: "Date transmission"

  # Intégration paie
  - nom: periode_paie
    type: text
    libelle: "Période paie"
    placeholder: "AAAA-MM"

  - nom: bulletin_paie_id
    type: relation
    libelle: "Bulletin"
    relation: bulletins_paie

  - nom: integre_paie
    type: boolean
    libelle: "Intégré paie"
    defaut: false

  # Impact compteurs
  - nom: impact_cp
    type: boolean
    libelle: "Impact CP"
    defaut: false
    description: "Réduit acquisition CP"

  - nom: impact_anciennete
    type: boolean
    libelle: "Impact ancienneté"
    defaut: false

  # Statut
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - EN_COURS
      - TERMINEE
      - PROLONGEE
      - ANNULEE
    defaut: EN_COURS

  # Validation
  - nom: justificatif_recu
    type: boolean
    libelle: "Justificatif reçu"
    defaut: false

  - nom: date_reception_justificatif
    type: date
    libelle: "Date réception"

  - nom: validee_rh
    type: boolean
    libelle: "Validée RH"
    defaut: false

  - nom: validee_par
    type: text
    libelle: "Validée par"

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

# Index pour performance
index:
  - employe_id
  - date_debut
  - type_absence
  - periode_paie

recherche:
  - numero
  - employe_id
  - type_absence

affichage_liste:
  - numero
  - employe_id
  - type_absence
  - date_debut
  - date_fin
  - jours_ouvres
  - statut

workflow:
  EN_COURS -> TERMINEE: "Clôturer"
  EN_COURS -> PROLONGEE: "Prolonger"
  EN_COURS -> ANNULEE: "Annuler"

actions:
  - calculer_retenue
  - calculer_ijss
  - creer_evenement_dsn
  - integrer_bulletin
  - enregistrer_reprise
