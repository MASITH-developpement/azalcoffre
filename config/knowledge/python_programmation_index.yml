bonnes_pratiques:
  style:
    - id: py_bp_001
      titre: "PEP 8 - Style de code Python"
      contenu: |
        CONVENTIONS PEP 8

        NOMMAGE
        - variables, fonctions : snake_case
        - constantes : MAJUSCULES_SNAKE
        - classes : PascalCase
        - modules : snake_case
        - _prive : prefixe underscore
        - __tres_prive : double underscore

        INDENTATION
        - 4 espaces (pas de tabulations)
        - Lignes max 79 caracteres (code)
        - Lignes max 72 caracteres (docstrings)

        ESPACES
        - Apres virgules : func(a, b, c)
        - Autour operateurs : x = y + z
        - Pas d'espace avant parenthese : func(x)

        IMPORTS
        - Un import par ligne
        - Ordre : stdlib, tiers, local
        - Eviter from x import *

        # Bon
        import os
        import sys
        from collections import defaultdict

        # Mauvais
        import os, sys
        from collections import *

        OUTILS DE VERIFICATION
        - black (formatage auto)
        - flake8 (linting)
        - mypy (verification types)
        - isort (tri imports)

    - id: py_bp_002
      titre: "Type hints et documentation"
      contenu: |
        TYPE HINTS (Python 3.5+)

        # Variables
        nom: str = "Alice"
        age: int = 30
        prix: float = 19.99
        actif: bool = True

        # Fonctions
        def saluer(nom: str) -> str:
            return f"Bonjour {nom}"

        def calculer(a: int, b: int = 0) -> int:
            return a + b

        # Collections
        from typing import List, Dict, Optional, Union, Tuple

        nombres: List[int] = [1, 2, 3]
        scores: Dict[str, int] = {"Alice": 100}
        peut_etre: Optional[str] = None  # str ou None
        mixte: Union[int, str] = 42
        coord: Tuple[float, float] = (3.14, 2.71)

        # Python 3.9+ : pas besoin d'importer
        nombres: list[int] = [1, 2, 3]
        scores: dict[str, int] = {"Alice": 100}

        DOCSTRINGS (PEP 257)

        def calculer_tva(montant: float, taux: float = 0.20) -> float:
            """
            Calcule le montant TTC.

            Args:
                montant: Montant hors taxes
                taux: Taux de TVA (defaut 20%)

            Returns:
                Montant toutes taxes comprises

            Raises:
                ValueError: Si le montant est negatif

            Example:
                >>> calculer_tva(100)
                120.0
            """
            if montant < 0:
                raise ValueError("Montant negatif")
            return montant * (1 + taux)
