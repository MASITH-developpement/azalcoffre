# AZALPLUS - Module Agenda
nom: Agenda
icone: calendar
menu: General
description: Gestion de l'agenda et des rendez-vous

champs:
  # Identification
  - nom: titre
    type: text
    obligatoire: true
    description: Objet du rendez-vous
    autocompletion: true

  - nom: type
    type: select
    obligatoire: true
    defaut: RDV
    options:
      - RDV
      - REUNION
      - APPEL
      - TACHE
      - RAPPEL
      - AUTRE
    description: Type d'evenement

  # Date et heure
  - nom: date_debut
    type: datetime
    obligatoire: true
    description: Date et heure de debut

  - nom: date_fin
    type: datetime
    obligatoire: false
    description: Date et heure de fin

  - nom: journee_entiere
    type: boolean
    obligatoire: false
    defaut: false
    description: Evenement sur toute la journee

  # Lieu
  - nom: lieu
    type: select
    obligatoire: false
    defaut: BUREAU
    options:
      - BUREAU
      - CHEZ_CLIENT
      - TELEPHONE
      - VISIO
      - EXTERIEUR
    description: Lieu

  - nom: adresse
    type: text
    obligatoire: false
    description: Adresse
    autocompletion: true

  # Contact
  - nom: client_id
    type: relation
    obligatoire: false
    relation: Clients
    description: Client

  - nom: contact_nom
    type: text
    obligatoire: false
    description: Nom du contact
    autocompletion: true

  - nom: contact_tel
    type: tel
    obligatoire: false
    description: Telephone

  # Affectation
  - nom: collaborateur_id
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Collaborateur

  # Statut
  - nom: statut
    type: select
    obligatoire: true
    defaut: PLANIFIE
    options:
      - PLANIFIE
      - CONFIRME
      - TERMINE
      - ANNULE
    description: Statut

  # Rappel
  - nom: rappel
    type: select
    obligatoire: false
    defaut: 30_MIN
    options:
      - AUCUN
      - 15_MIN
      - 30_MIN
      - 1_HEURE
      - 1_JOUR
    description: Rappel

  # Notes
  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

  # Affichage
  - nom: couleur
    type: text
    obligatoire: false
    defaut: "#2563EB"
    description: Couleur

  - nom: is_active
    type: boolean
    obligatoire: false
    defaut: true

workflow:
  PLANIFIE -> CONFIRME: confirmer
  CONFIRME -> TERMINE: terminer
  PLANIFIE -> ANNULE: annuler
  CONFIRME -> ANNULE: annuler

actions:
  - envoyer_rappel
  - envoyer_confirmation
