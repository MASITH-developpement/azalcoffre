# =============================================================================
# AZALPLUS - Acomptes sur Salaire
# =============================================================================
# Gestion des avances et acomptes versés aux salariés

nom: Acompte
nom_pluriel: Acomptes
icone: credit-card
menu: Paie
description: "Acomptes et avances sur salaire"
ordre_menu: 12

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "AC-{AAAA}{MM}-{####}"

  - nom: employe_id
    type: relation
    libelle: "Employé"
    relation: employes
    obligatoire: true

  - nom: type_avance
    type: select
    libelle: "Type"
    obligatoire: true
    options:
      - ACOMPTE
      - AVANCE
      - PRET
    defaut: ACOMPTE
    description: "Acompte: sur salaire acquis, Avance: sur salaire futur"

  # Montants
  - nom: montant_demande
    type: money
    libelle: "Montant demandé"
    obligatoire: true

  - nom: montant_accorde
    type: money
    libelle: "Montant accordé"

  - nom: montant_verse
    type: money
    libelle: "Montant versé"

  # Dates
  - nom: date_demande
    type: date
    libelle: "Date demande"
    obligatoire: true
    defaut: "today"

  - nom: date_accord
    type: date
    libelle: "Date accord"

  - nom: date_versement
    type: date
    libelle: "Date versement"

  - nom: periode_paie
    type: text
    libelle: "Période paie"
    placeholder: "AAAA-MM"
    description: "Période sur laquelle imputer l'acompte"

  # Remboursement (pour avances et prêts)
  - nom: mode_remboursement
    type: select
    libelle: "Mode remboursement"
    options:
      - UNIQUE
      - ECHELONNE
    defaut: UNIQUE

  - nom: nombre_echeances
    type: number
    libelle: "Nombre d'échéances"
    description: "Si remboursement échelonné"

  - nom: montant_echeance
    type: money
    libelle: "Montant échéance"

  - nom: date_premiere_echeance
    type: date
    libelle: "Première échéance"

  - nom: montant_rembourse
    type: money
    libelle: "Montant remboursé"
    defaut: 0

  - nom: solde_restant
    type: money
    libelle: "Solde restant"

  # Paiement
  - nom: mode_paiement
    type: select
    libelle: "Mode paiement"
    options:
      - VIREMENT
      - CHEQUE
      - ESPECES
    defaut: VIREMENT

  - nom: iban
    type: text
    libelle: "IBAN"

  - nom: reference_paiement
    type: text
    libelle: "Référence paiement"
    description: "N° virement ou chèque"

  # Justificatif
  - nom: motif
    type: select
    libelle: "Motif"
    options:
      - BESOIN_PERSONNEL
      - DEPENSES_SANTE
      - LOGEMENT
      - VEHICULE
      - AUTRE

  - nom: motif_detail
    type: textarea
    libelle: "Détail motif"

  - nom: justificatif
    type: text
    libelle: "Justificatif"
    description: "Chemin du document"

  # Validation
  - nom: demandeur
    type: text
    libelle: "Demandeur"
    description: "Qui a saisi la demande"

  - nom: validateur
    type: text
    libelle: "Validateur"
    description: "Responsable ayant validé"

  - nom: date_validation
    type: datetime
    libelle: "Date validation"

  # Intégration paie
  - nom: bulletin_paie_id
    type: relation
    libelle: "Bulletin"
    relation: bulletins_paie
    description: "Bulletin où l'acompte est déduit"

  - nom: integre_paie
    type: boolean
    libelle: "Intégré paie"
    defaut: false

  # Comptabilité
  - nom: compte_debit
    type: text
    libelle: "Compte débit"
    defaut: "425000"
    description: "Personnel - Avances et acomptes"

  - nom: compte_credit
    type: text
    libelle: "Compte crédit"
    defaut: "512000"
    description: "Banque"

  - nom: ecriture_comptable_id
    type: text
    libelle: "Écriture comptable"

  # Statut
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - DEMANDE
      - EN_ATTENTE
      - ACCORDE
      - REFUSE
      - VERSE
      - REMBOURSE
      - ANNULE
    defaut: DEMANDE

  - nom: motif_refus
    type: text
    libelle: "Motif refus"

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

recherche:
  - numero
  - employe_id
  - periode_paie

affichage_liste:
  - numero
  - employe_id
  - type_avance
  - montant_accorde
  - date_versement
  - statut

workflow:
  DEMANDE -> EN_ATTENTE: "Soumettre"
  EN_ATTENTE -> ACCORDE: "Accorder"
  EN_ATTENTE -> REFUSE: "Refuser"
  ACCORDE -> VERSE: "Verser"
  VERSE -> REMBOURSE: null
  DEMANDE -> ANNULE: "Annuler"
  EN_ATTENTE -> ANNULE: "Annuler"

actions:
  - valider_acompte
  - verser_acompte
  - generer_virement
  - integrer_paie
