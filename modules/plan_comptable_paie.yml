# =============================================================================
# AZALPLUS - Plan Comptable Paie
# =============================================================================
# Comptes comptables pour la comptabilisation de la paie

nom: Compte Paie
nom_pluriel: Plan Comptable Paie
icone: calculator
menu: Paie
description: "Comptes comptables pour la paie"
ordre_menu: 5

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro de compte"
    obligatoire: true
    unique: true
    placeholder: "Ex: 641100"

  - nom: libelle
    type: text
    libelle: "Libellé"
    obligatoire: true

  - nom: libelle_court
    type: text
    libelle: "Libellé court"

  # Classification
  - nom: classe
    type: select
    libelle: "Classe"
    obligatoire: true
    options:
      - "4 - Tiers"
      - "6 - Charges"
      - "7 - Produits"

  - nom: type_compte
    type: select
    libelle: "Type"
    obligatoire: true
    options:
      - REMUNERATION_PERSONNEL
      - CHARGES_SOCIALES
      - ORGANISMES_SOCIAUX
      - PERSONNEL_DEBITEUR
      - AUTRES_CHARGES
      - PRODUITS

  - nom: categorie
    type: select
    libelle: "Catégorie"
    options:
      - SALAIRES_BRUTS
      - CONGES_PAYES
      - PRIMES_GRATIFICATIONS
      - INDEMNITES
      - AVANTAGES_NATURE
      - COTISATIONS_URSSAF
      - COTISATIONS_RETRAITE
      - COTISATIONS_CHOMAGE
      - COTISATIONS_PREVOYANCE
      - COTISATIONS_FORMATION
      - AUTRES_COTISATIONS
      - ACOMPTES
      - OPPOSITIONS
      - NET_A_PAYER
      - CHARGES_PROVISIONNEES

  # Sens et solde
  - nom: sens_normal
    type: select
    libelle: "Sens normal"
    options:
      - DEBIT
      - CREDIT

  - nom: compte_contrepartie
    type: text
    libelle: "Compte contrepartie"
    description: "Compte de contrepartie habituel"

  # Affectation automatique
  - nom: rubrique_paie_id
    type: relation
    libelle: "Rubrique paie"
    relation: rubriques_paie
    description: "Rubrique associée"

  - nom: cotisation_id
    type: relation
    libelle: "Cotisation"
    relation: cotisations
    description: "Cotisation associée"

  - nom: organisme
    type: select
    libelle: "Organisme"
    options:
      - URSSAF
      - AGIRC-ARRCO
      - POLE_EMPLOI
      - MUTUELLE
      - PREVOYANCE
      - OPCO
      - TRESOR_PUBLIC
      - AUTRE

  # Analytique
  - nom: axe_analytique
    type: text
    libelle: "Axe analytique"
    description: "Code pour ventilation analytique"

  - nom: ventilation_etablissement
    type: boolean
    libelle: "Ventilation par établissement"
    defaut: false

  - nom: ventilation_service
    type: boolean
    libelle: "Ventilation par service"
    defaut: false

  # Provisions
  - nom: compte_provision
    type: text
    libelle: "Compte de provision"
    description: "Pour CP, RTT..."

  - nom: compte_reprise_provision
    type: text
    libelle: "Compte reprise provision"

  # DSN/Déclarations
  - nom: code_ducs
    type: text
    libelle: "Code DUCS"

  # Métadonnées
  - nom: actif
    type: boolean
    libelle: "Actif"
    defaut: true

  - nom: lettrable
    type: boolean
    libelle: "Lettrable"
    defaut: true

  - nom: notes
    type: textarea
    libelle: "Notes"

recherche:
  - numero
  - libelle
  - type_compte

affichage_liste:
  - numero
  - libelle
  - type_compte
  - categorie
  - actif

tri_defaut: numero
