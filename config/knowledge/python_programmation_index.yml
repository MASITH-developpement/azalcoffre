# PROGRAMMATION ORIENTEE OBJET
# =============================================================================

poo:
  classes:
    - id: py_oop_001
      titre: "Classes et objets"
      contenu: |
        PROGRAMMATION ORIENTEE OBJET

        # Definition d'une classe
        class Personne:
            # Attribut de classe
            espece = "Homo sapiens"

            # Constructeur
            def __init__(self, nom, age):
                # Attributs d'instance
                self.nom = nom
                self.age = age

            # Methode d'instance
            def se_presenter(self):
                return f"Je suis {self.nom}, {self.age} ans"

            # Methode de classe
            @classmethod
            def creer_anonyme(cls):
                return cls("Anonyme", 0)

            # Methode statique
            @staticmethod
            def est_adulte(age):
                return age >= 18

        # Instanciation
        alice = Personne("Alice", 30)
        print(alice.nom)           # "Alice"
        print(alice.se_presenter())

        # Methode de classe
        anon = Personne.creer_anonyme()

        # Methode statique
        Personne.est_adulte(25)    # True

    - id: py_oop_002
      titre: "Heritage et polymorphisme"
      contenu: |
        HERITAGE

        class Animal:
            def __init__(self, nom):
                self.nom = nom

            def parler(self):
                raise NotImplementedError

        class Chien(Animal):
            def parler(self):
                return f"{self.nom} dit: Wouf!"

        class Chat(Animal):
            def parler(self):
                return f"{self.nom} dit: Miaou!"

        # Utilisation
        rex = Chien("Rex")
        felix = Chat("Felix")
        print(rex.parler())    # "Rex dit: Wouf!"
        print(felix.parler())  # "Felix dit: Miaou!"

        # Polymorphisme
        animaux = [rex, felix]
        for animal in animaux:
            print(animal.parler())

        # super() - appeler methode parente
        class ChienSavant(Chien):
            def parler(self):
                base = super().parler()
                return f"{base} Et je sais compter!"

        # Verifier le type
        isinstance(rex, Chien)   # True
        isinstance(rex, Animal)  # True
        issubclass(Chien, Animal)  # True

    - id: py_oop_003
      titre: "Methodes speciales (dunder)"
      contenu: |
        METHODES SPECIALES (DUNDER METHODS)

        class Vecteur:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            # Representation string
            def __str__(self):
                return f"Vecteur({self.x}, {self.y})"

            def __repr__(self):
                return f"Vecteur({self.x!r}, {self.y!r})"

            # Operateurs arithmetiques
            def __add__(self, other):
                return Vecteur(self.x + other.x, self.y + other.y)

            def __mul__(self, scalaire):
                return Vecteur(self.x * scalaire, self.y * scalaire)

            # Comparaison
            def __eq__(self, other):
                return self.x == other.x and self.y == other.y

            # Longueur
            def __len__(self):
                return 2

            # Indexation
            def __getitem__(self, index):
                if index == 0: return self.x
                if index == 1: return self.y
                raise IndexError

        # Utilisation
        v1 = Vecteur(1, 2)
        v2 = Vecteur(3, 4)
        v3 = v1 + v2       # Vecteur(4, 6)
        print(v1)          # "Vecteur(1, 2)"

