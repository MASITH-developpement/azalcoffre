# =============================================================================
# AZALPLUS - Module Secretariat IA (Marceau Assistant)
# =============================================================================
nom: Secretariat IA
icone: headset
menu: Communication
description: Assistant secretariat intelligent (appels, emails, RDV)

champs:
  - nom: nom
    type: text
    obligatoire: true
    description: Nom assistant

  - nom: status
    type: select
    obligatoire: true
    defaut: ACTIF
    options: [ACTIF, PAUSE, FORMATION, ARCHIVE]
    description: Statut

  - nom: voix
    type: select
    obligatoire: false
    defaut: FEMININE_FR
    options: [FEMININE_FR, MASCULINE_FR, FEMININE_EN, MASCULINE_EN]
    description: Voix synthetique

  - nom: numero_entrant
    type: tel
    obligatoire: false
    description: Numero telephone entrant

  - nom: prompt_accueil
    type: textarea
    obligatoire: true
    description: Message accueil

  - nom: competences
    type: json
    obligatoire: false
    description: Competences (prise RDV, infos, transfert)

  - nom: agenda_id
    type: relation
    obligatoire: false
    relation: Agenda
    description: Agenda pour RDV

  - nom: disponibilites
    type: json
    obligatoire: false
    description: Creneaux disponibles

  - nom: duree_rdv_defaut
    type: number
    obligatoire: false
    defaut: 30
    description: Duree RDV par defaut (min)

  - nom: transfert_urgences
    type: tel
    obligatoire: false
    description: Numero transfert urgences

  - nom: detection_urgence
    type: json
    obligatoire: false
    description: Mots-cles urgence

  - nom: emails_geres
    type: json
    obligatoire: false
    description: Emails a gerer

  - nom: reponses_auto_email
    type: boolean
    obligatoire: false
    defaut: false
    description: Reponses auto emails

  - nom: transcription
    type: boolean
    obligatoire: false
    defaut: true
    description: Transcription appels

  - nom: synthese_quotidienne
    type: boolean
    obligatoire: false
    defaut: true
    description: Synthese quotidienne

  - nom: heure_synthese
    type: text
    obligatoire: false
    defaut: "18:00"
    description: Heure envoi synthese

  - nom: nb_appels_jour
    type: number
    obligatoire: false
    readonly: true
    defaut: 0
    description: Appels du jour

  - nom: nb_rdv_pris
    type: number
    obligatoire: false
    readonly: true
    defaut: 0
    description: RDV pris total

  - nom: temps_moyen_appel
    type: number
    obligatoire: false
    readonly: true
    description: Duree moyenne appel (sec)

  - nom: cout_mensuel
    type: number
    obligatoire: false
    readonly: true
    description: Cout mensuel

  - nom: provider_telephonie
    type: select
    obligatoire: false
    options: [TWILIO, VONAGE, AIRCALL]
    description: Provider telephonie

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

workflow:
  ACTIF -> PAUSE: pause
  PAUSE -> ACTIF: activer
  ACTIF -> FORMATION: former
  FORMATION -> ACTIF: deployer
  TOUS -> ARCHIVE: archiver

actions:
  - tester_appel
  - ecouter_enregistrements
  - ajuster_prompt
  - analyser_performance
  - exporter_transcriptions

marceau:
  alertes:
    - si nb_appels_jour > 100: "Forte activite telephonique"
    - si temps_moyen_appel > 300: "Appels trop longs"
