<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350">
  <!-- Format carrousel Instagram/LinkedIn -->
  <rect width="1080" height="1350" fill="#3454D1"/>

  <!-- Points déco -->
  <circle cx="100" cy="100" r="10" fill="#6B9FFF" opacity="0.4"/>
  <circle cx="980" cy="150" r="15" fill="#6B9FFF" opacity="0.3"/>

  <!-- Contenu -->
  <text x="540" y="500" font-family="Inter, Arial" font-weight="800" font-size="72" fill="#FFFFFF" text-anchor="middle">Vous payez</text>
  <text x="540" y="600" font-family="Inter, Arial" font-weight="800" font-size="72" fill="#FFFFFF" text-anchor="middle">combien</text>
  <text x="540" y="700" font-family="Inter, Arial" font-weight="800" font-size="72" fill="#FFFFFF" text-anchor="middle">pour votre ERP ?</text>

  <!-- Swipe -->
  <text x="540" y="1200" font-family="Inter, Arial" font-weight="500" font-size="28" fill="#FFFFFF" opacity="0.7" text-anchor="middle">Glissez →</text>

  <!-- Pagination -->
  <circle cx="480" cy="1280" r="8" fill="#FFFFFF"/>
  <circle cx="510" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="540" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="570" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="600" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
</svg>
