# =============================================================================
# AZALPLUS - Module Location de Materiel
# =============================================================================
# Gestion de la location de materiel et equipements.

nom: Location Materiel
icone: hand-holding
menu: Commercial
description: Location de materiel et equipements

champs:
  # Identification
  - nom: number
    type: text
    groupe: Informations
    obligatoire: true
    unique: true
    description: Numero de location (LOC-YYYY-NNNNN)
    autocompletion: true

  - nom: status
    type: select
    groupe: Statut
    obligatoire: true
    defaut: RESERVATION
    options: [RESERVATION, CONFIRMEE, EN_COURS, TERMINEE, ANNULEE, LITIGE]
    description: Statut

  # Client
  - nom: customer_id
    type: relation
    groupe: Relations
    obligatoire: true
    relation: Clients
    description: Client
    autocompletion: true

  - nom: contact_id
    type: relation
    groupe: Relations
    obligatoire: false
    relation: Contacts
    description: Contact
    autocompletion: true

  # Materiel
  - nom: equipement_id
    type: relation
    groupe: Relations
    obligatoire: true
    relation: Equipements
    description: Materiel loue
    autocompletion: true

  - nom: quantite
    type: number
    groupe: Quantites
    obligatoire: true
    defaut: 1
    description: Quantite

  # Periode
  - nom: date_debut
    type: datetime
    groupe: Dates
    obligatoire: true
    description: Date/heure debut

  - nom: date_fin_prevue
    type: datetime
    groupe: Dates
    obligatoire: true
    description: Date/heure fin prevue

  - nom: date_fin_effective
    type: datetime
    groupe: Dates
    obligatoire: false
    description: Date/heure fin effective

  - nom: duree_jours
    type: number
    groupe: Informations
    obligatoire: false
    readonly: true
    description: Duree en jours

  # Tarification
  - nom: tarif_type
    type: select
    groupe: Informations
    obligatoire: true
    defaut: JOURNALIER
    options: [HORAIRE, DEMI_JOURNEE, JOURNALIER, HEBDOMADAIRE, MENSUEL, FORFAIT]
    description: Type de tarif

  - nom: tarif_unitaire
    type: number
    groupe: Montants
    obligatoire: true
    description: Tarif unitaire

  - nom: montant_location
    type: number
    groupe: Montants
    obligatoire: false
    readonly: true
    description: Montant location HT

  - nom: remise_pourcent
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Remise (%)

  - nom: montant_remise
    type: number
    groupe: Montants
    obligatoire: false
    defaut: 0
    description: Montant remise

  - nom: frais_livraison
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Frais de livraison

  - nom: assurance
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Assurance

  - nom: total_ht
    type: number
    groupe: Montants
    obligatoire: false
    readonly: true
    description: Total HT

  - nom: tva
    type: number
    groupe: Montants
    obligatoire: false
    readonly: true
    description: TVA

  - nom: total_ttc
    type: number
    groupe: Montants
    obligatoire: false
    readonly: true
    description: Total TTC

  # Caution
  - nom: caution_requise
    type: boolean
    groupe: Informations
    obligatoire: false
    defaut: true
    description: Caution requise

  - nom: montant_caution
    type: number
    groupe: Montants
    obligatoire: false
    description: Montant caution

  - nom: caution_encaissee
    type: boolean
    groupe: Informations
    obligatoire: false
    defaut: false
    description: Caution encaissee

  - nom: mode_caution
    type: select
    groupe: Configuration
    obligatoire: false
    options: [CHEQUE, CB, VIREMENT, ESPECES]
    description: Mode de caution

  - nom: caution_restituee
    type: boolean
    groupe: Informations
    obligatoire: false
    defaut: false
    description: Caution restituee

  - nom: date_restitution_caution
    type: date
    groupe: Dates
    obligatoire: false
    description: Date restitution caution

  - nom: retenue_caution
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Montant retenu sur caution

  - nom: motif_retenue
    type: text
    groupe: Informations
    obligatoire: false
    description: Motif retenue

  # Livraison
  - nom: mode_remise
    type: select
    groupe: Configuration
    obligatoire: false
    defaut: ENLEVEMENT
    options: [ENLEVEMENT, LIVRAISON, SUR_SITE]
    description: Mode de remise

  - nom: adresse_livraison
    type: textarea
    groupe: Contact
    obligatoire: false
    description: Adresse de livraison

  # Etat du materiel
  - nom: etat_depart
    type: select
    groupe: Statut
    obligatoire: false
    defaut: BON
    options: [NEUF, BON, USAGE, DEFAUTS_MINEURS]
    description: Etat au depart

  - nom: etat_retour
    type: select
    groupe: Statut
    obligatoire: false
    options: [NEUF, BON, USAGE, DEFAUTS_MINEURS, ENDOMMAGE]
    description: Etat au retour

  - nom: photos_depart
    type: json
    groupe: Metadata
    obligatoire: false
    description: Photos etat depart

  - nom: photos_retour
    type: json
    groupe: Metadata
    obligatoire: false
    description: Photos etat retour

  - nom: observations_depart
    type: textarea
    groupe: Notes
    obligatoire: false
    description: Observations depart

  - nom: observations_retour
    type: textarea
    groupe: Notes
    obligatoire: false
    description: Observations retour

  # Contrat
  - nom: contrat_signe
    type: boolean
    groupe: Informations
    obligatoire: false
    defaut: false
    description: Contrat signe

  - nom: signature_client
    type: text
    groupe: Informations
    obligatoire: false
    description: Signature client

  - nom: conditions_generales
    type: boolean
    groupe: Informations
    obligatoire: false
    defaut: false
    description: CGV acceptees

  # Facturation
  - nom: facture_id
    type: relation
    groupe: Relations
    obligatoire: false
    relation: Factures
    description: Facture
    autocompletion: true

  - nom: facture_caution_id
    type: relation
    groupe: Relations
    obligatoire: false
    relation: Factures
    description: Facture caution

  # Penalites retard
  - nom: retard_jours
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Jours de retard

  - nom: penalite_retard
    type: number
    groupe: Informations
    obligatoire: false
    defaut: 0
    description: Penalite retard

  # Notes
  - nom: notes
    type: textarea
    groupe: Notes
    obligatoire: false
    description: Notes

workflow:
  RESERVATION -> CONFIRMEE: confirmer
  CONFIRMEE -> EN_COURS: demarrer
  EN_COURS -> TERMINEE: terminer
  RESERVATION -> ANNULEE: annuler
  CONFIRMEE -> ANNULEE: annuler
  EN_COURS -> LITIGE: declarer_litige
  LITIGE -> TERMINEE: resoudre_litige

actions:
  - confirmer
  - generer_contrat
  - etat_des_lieux_depart
  - etat_des_lieux_retour
  - facturer
  - restituer_caution
  - prolonger

marceau:
  alertes:
    - si date_fin_prevue < aujourd'hui et status = EN_COURS: "Location en retard de retour"
    - si caution_requise = true et caution_encaissee = false et status = CONFIRMEE: "Caution non encaissee"
