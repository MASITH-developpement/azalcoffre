<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} - {{ error_title }} | AZALPLUS</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Fond animé avec particules */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, {{ header_color | default('#667eea') }}22 0%, {{ header_color | default('#764ba2') }}33 100%);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        .error-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.25);
            max-width: 500px;
            width: 100%;
            text-align: center;
            overflow: hidden;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .error-header {
            background: {{ header_color | default('#ef4444') }};
            padding: 50px 20px;
            position: relative;
            overflow: hidden;
        }

        .error-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25%, 25%); }
        }

        .error-illustration {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            position: relative;
            z-index: 1;
        }

        .error-illustration svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        .error-code {
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-body {
            padding: 40px 30px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 17px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, {{ header_color | default('#667eea') }} 0%, {{ header_color | default('#764ba2') }} 100%);
            color: white;
            box-shadow: 0 4px 15px {{ header_color | default('#667eea') }}66;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px {{ header_color | default('#667eea') }}88;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        .error-details {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e5e7eb;
            font-size: 13px;
            color: #9ca3af;
        }

        .error-details code {
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
        }

        /* Fun elements */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            color: white;
            animation: twinkle 1.5s infinite;
            font-size: 20px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 56px; }
            .error-title { font-size: 22px; }
            .error-body { padding: 30px 20px; }
            .error-illustration { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <!-- Particules de fond -->
        <div class="particle" style="width: 80px; height: 80px; background: {{ header_color | default('#667eea') }}33; top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="width: 60px; height: 60px; background: {{ header_color | default('#764ba2') }}33; top: 60%; left: 80%; animation-delay: 2s;"></div>
        <div class="particle" style="width: 100px; height: 100px; background: {{ header_color | default('#667eea') }}22; top: 80%; left: 20%; animation-delay: 4s;"></div>
        <div class="particle" style="width: 50px; height: 50px; background: {{ header_color | default('#764ba2') }}44; top: 30%; left: 70%; animation-delay: 1s;"></div>
        <div class="particle" style="width: 70px; height: 70px; background: {{ header_color | default('#667eea') }}33; top: 50%; left: 5%; animation-delay: 3s;"></div>
    </div>

    <div class="error-container">
        <div class="error-header">
            <div class="stars">
                <span class="star" style="top: 15%; left: 10%;">✨</span>
                <span class="star" style="top: 25%; left: 85%; animation-delay: 0.5s;">✨</span>
                <span class="star" style="top: 70%; left: 15%; animation-delay: 1s;">⭐</span>
                <span class="star" style="top: 60%; left: 80%; animation-delay: 0.3s;">✨</span>
            </div>
            <div class="error-illustration">{{ error_icon | safe }}</div>
            <div class="error-code">{{ error_code }}</div>
        </div>
        <div class="error-body">
            <h1 class="error-title">{{ error_title }}</h1>
            <p class="error-message">{{ error_message }}</p>
            <div class="error-actions">
                {{ error_actions | safe }}
            </div>
            {% if show_details and request_path %}
            <div class="error-details">
                📍 Chemin: <code>{{ request_path }}</code>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Effet de particules interactif au mouvement de souris
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            particles.forEach((p, i) => {
                const speed = (i + 1) * 0.5;
                p.style.transform = `translate(${x * 20 * speed}px, ${y * 20 * speed}px)`;
            });
        });

        // Animation du code d'erreur au clic
        document.querySelector('.error-code').addEventListener('click', function() {
            this.style.animation = 'none';
            this.offsetHeight;
            this.style.animation = 'shake 0.5s ease-in-out';
        });

        // Ajouter l'animation shake
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-20px) rotate(-5deg); }
                75% { transform: translateX(20px) rotate(5deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
