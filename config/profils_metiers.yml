# =============================================================================
# AZALPLUS - Profils Metiers
# =============================================================================
# Mapping metier -> modules actives automatiquement a l'inscription.
# Un fichier simple, pas de base de donnees, facile a maintenir.
#
# Usage:
# 1. SIRET saisi -> API INSEE -> Code NAF -> Profil auto
# 2. Pas de SIRET -> Selection manuelle du metier
# 3. Modules actives automatiquement selon le profil
#
# Maintenance:
# - Ajouter un metier: 5 lignes dans ce fichier
# - Modifier les modules: editer la liste
# - Ajouter un code NAF: ajouter dans la liste naf
# =============================================================================

version: "1.0.0"

