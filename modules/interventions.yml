      obligatoire: false
      options: [CLIENT, FOURNISSEUR, AUTRE]

    - nom: client_id
      type: relation
      obligatoire: false
      relation: Clients
      autocompletion: true

    - nom: fournisseur_id
      type: relation
      obligatoire: false
      relation: Fournisseurs
      autocompletion: true

    - nom: email
      type: email
      obligatoire: false
      autocompletion: true

    - nom: telephone
      type: tel
      obligatoire: false

    - nom: adresse
      type: textarea
      obligatoire: false
      autocompletion: true

    - nom: adresse_facturation
      type: textarea
      obligatoire: false
      autocompletion: true

    - nom: delai_paiement
      type: number
      obligatoire: false
      defaut: 30
      description: Delai paiement (jours)

    - nom: email_rapport
      type: email
      obligatoire: false
      description: Email pour envoi rapports
      autocompletion: true

    # Contact commercial
    - nom: contact_commercial_civilite
      type: select
      obligatoire: false
      options: [Mr, Mme, Melle]

    - nom: contact_commercial_nom
      type: text
      obligatoire: false
      autocompletion: true

    - nom: contact_commercial_email
      type: email
      obligatoire: false
      autocompletion: true

    - nom: contact_commercial_telephone
      type: tel
      obligatoire: false

    # Contact comptabilite
    - nom: contact_comptabilite_civilite
      type: select
      obligatoire: false
      options: [Mr, Mme, Melle]

    - nom: contact_comptabilite_nom
      type: text
      obligatoire: false
      autocompletion: true

    - nom: contact_comptabilite_email
      type: email
      obligatoire: false
      autocompletion: true

    - nom: contact_comptabilite_telephone
      type: tel
      obligatoire: false

    # Contact technique
    - nom: contact_technique_civilite
      type: select
      obligatoire: false
      options: [Mr, Mme, Melle]

    - nom: contact_technique_nom
      type: text
      obligatoire: false
      autocompletion: true

    - nom: contact_technique_email
      type: email
      obligatoire: false
