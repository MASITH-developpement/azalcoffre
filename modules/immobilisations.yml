# AZALPLUS - Module Immobilisations
nom: Immobilisations
icone: building
menu: Comptabilite
description: Gestion des immobilisations (actifs fixes)

champs:
  - nom: asset_code
    type: text
    obligatoire: true
    description: Code unique de l'immobilisation
    autocompletion: true

  - nom: name
    type: text
    obligatoire: true
    description: Designation de l'immobilisation
    autocompletion: true

  - nom: description
    type: textarea
    obligatoire: false
    description: Description detaillee

  - nom: asset_type
    type: select
    obligatoire: true
    options: [INTANGIBLE_GOODWILL, INTANGIBLE_PATENT, INTANGIBLE_LICENSE, INTANGIBLE_SOFTWARE, INTANGIBLE_TRADEMARK, INTANGIBLE_RD, INTANGIBLE_OTHER, TANGIBLE_LAND, TANGIBLE_BUILDING, TANGIBLE_TECHNICAL, TANGIBLE_INDUSTRIAL, TANGIBLE_TRANSPORT, TANGIBLE_OFFICE, TANGIBLE_IT, TANGIBLE_FURNITURE, TANGIBLE_FIXTURE, TANGIBLE_TOOLS, TANGIBLE_OTHER, FINANCIAL_PARTICIPATION, FINANCIAL_LOAN, FINANCIAL_DEPOSIT, FINANCIAL_OTHER, IN_PROGRESS]
    description: Type d'immobilisation selon le PCG
    autocompletion: true

  - nom: category_id
    type: relation
    obligatoire: false
    relation: CategoriesImmobilisations
    description: Categorie d'immobilisation
    autocompletion: true

  - nom: status
    type: select
    obligatoire: true
    defaut: DRAFT
    options: [DRAFT, ORDERED, RECEIVED, IN_SERVICE, UNDER_MAINTENANCE, OUT_OF_SERVICE, FULLY_DEPRECIATED, DISPOSED, SCRAPPED, TRANSFERRED, STOLEN, DESTROYED]
    description: Statut de l'immobilisation

  - nom: serial_number
    type: text
    obligatoire: false
    description: Numero de serie

  - nom: barcode
    type: text
    obligatoire: false
    description: Code-barres

  - nom: inventory_number
    type: text
    obligatoire: false
    description: Numero d'inventaire interne
    autocompletion: true

  - nom: manufacturer
    type: text
    obligatoire: false
    description: Fabricant
    autocompletion: true

  - nom: brand
    type: text
    obligatoire: false
    description: Marque
    autocompletion: true

  - nom: model
    type: text
    obligatoire: false
    description: Modele
    autocompletion: true

  - nom: year_manufactured
    type: number
    obligatoire: false
    description: Annee de fabrication

  - nom: acquisition_date
    type: date
    obligatoire: true
    description: Date d'acquisition

  - nom: in_service_date
    type: date
    obligatoire: false
    description: Date de mise en service

  - nom: purchase_order_reference
    type: text
    obligatoire: false
    description: Reference commande
    autocompletion: true

  - nom: invoice_reference
    type: text
    obligatoire: false
    description: Reference facture
    autocompletion: true

  - nom: supplier_id
    type: relation
    obligatoire: false
    relation: Fournisseurs
    description: Fournisseur
    autocompletion: true

  - nom: purchase_price
    type: number
    obligatoire: false
    defaut: 0
    description: Prix d'achat HT

  - nom: vat_amount
    type: number
    obligatoire: false
    defaut: 0
    description: TVA (si non recuperable)

  - nom: transport_cost
    type: number
    obligatoire: false
    defaut: 0
    description: Frais de transport

  - nom: installation_cost
    type: number
    obligatoire: false
    defaut: 0
    description: Frais d'installation

  - nom: acquisition_cost
    type: number
    obligatoire: false
    defaut: 0
    description: Cout d'acquisition total

  - nom: residual_value
    type: number
    obligatoire: false
    defaut: 0
    description: Valeur residuelle

  - nom: depreciation_method
    type: select
    obligatoire: false
    defaut: LINEAR
    options: [LINEAR, DECLINING_BALANCE, UNITS_OF_PRODUCTION, SUM_OF_YEARS_DIGITS, EXCEPTIONAL, NONE]
    description: Methode d'amortissement

  - nom: useful_life_years
    type: number
    obligatoire: true
    description: Duree d'utilisation (annees)

  - nom: depreciation_start_date
    type: date
    obligatoire: false
    description: Date de debut d'amortissement

  - nom: accumulated_depreciation
    type: number
    obligatoire: false
    defaut: 0
    description: Amortissements cumules

  - nom: net_book_value
    type: number
    obligatoire: false
    description: Valeur nette comptable (VNC)

  - nom: location_id
    type: relation
    obligatoire: false
    relation: Sites
    description: Site/Entrepot
    autocompletion: true

  - nom: site_name
    type: text
    obligatoire: false
    description: Nom du site
    autocompletion: true

  - nom: building
    type: text
    obligatoire: false
    description: Batiment
    autocompletion: true

  - nom: floor
    type: text
    obligatoire: false
    description: Etage

  - nom: room
    type: text
    obligatoire: false
    description: Piece/Bureau
    autocompletion: true

  - nom: responsible_id
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Responsable de l'actif
    autocompletion: true

  - nom: department_id
    type: relation
    obligatoire: false
    relation: Departements
    description: Departement
    autocompletion: true

  - nom: cost_center
    type: text
    obligatoire: false
    description: Centre de cout
    autocompletion: true

  - nom: asset_account
    type: text
    obligatoire: false
    description: Compte d'immobilisation (21xxxx)
    autocompletion: true

  - nom: depreciation_account
    type: text
    obligatoire: false
    description: Compte d'amortissement (28xxxx)
    autocompletion: true

  - nom: expense_account
    type: text
    obligatoire: false
    description: Compte de dotation (681xxx)
    autocompletion: true

  - nom: warranty_start_date
    type: date
    obligatoire: false
    description: Date debut garantie

  - nom: warranty_end_date
    type: date
    obligatoire: false
    description: Date fin garantie

  - nom: warranty_provider
    type: text
    obligatoire: false
    description: Garant
    autocompletion: true

  - nom: last_maintenance_date
    type: date
    obligatoire: false
    description: Date derniere maintenance

  - nom: next_maintenance_date
    type: date
    obligatoire: false
    description: Date prochaine maintenance

  - nom: insured_value
    type: number
    obligatoire: false
    description: Valeur assuree

  - nom: disposal_date
    type: date
    obligatoire: false
    description: Date de cession

  - nom: disposal_type
    type: select
    obligatoire: false
    options: [SALE, SCRAP, DONATION, THEFT, DESTRUCTION, TRANSFER_INTRAGROUP, EXCHANGE, LOSS]
    description: Type de sortie

  - nom: disposal_proceeds
    type: number
    obligatoire: false
    description: Prix de cession

  - nom: disposal_gain_loss
    type: number
    obligatoire: false
    description: Plus/moins-value de cession

  - nom: photo_url
    type: text
    obligatoire: false
    description: URL de la photo principale

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

  - nom: tags
    type: json
    obligatoire: false
    description: Tags de classification

workflow:
  DRAFT -> ORDERED: commander
  ORDERED -> RECEIVED: recevoir
  RECEIVED -> IN_SERVICE: mettre en service
  IN_SERVICE -> UNDER_MAINTENANCE: maintenance
  UNDER_MAINTENANCE -> IN_SERVICE: fin maintenance
  IN_SERVICE -> OUT_OF_SERVICE: hors service
  OUT_OF_SERVICE -> IN_SERVICE: remise en service
  IN_SERVICE -> FULLY_DEPRECIATED: amortissement complet
  IN_SERVICE -> DISPOSED: ceder
  IN_SERVICE -> SCRAPPED: mettre au rebut

actions:
  - calculer_amortissement
  - generer_ecriture_dotation
  - reevaluer
  - deprecier
  - ceder
  - transferer

marceau:
  alertes:
    - si warranty_end_date < aujourd'hui + 30 jours et status = IN_SERVICE: "Garantie expire bientot"
    - si next_maintenance_date < aujourd'hui: "Maintenance en retard"
    - si net_book_value = 0 et status = IN_SERVICE: "Actif totalement amorti mais encore en service"
