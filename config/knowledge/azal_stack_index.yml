# =============================================================================
# FASTAPI
# =============================================================================

fastapi:
  bases:
    - id: fastapi_001
      titre: "FastAPI - Introduction et structure"
      contenu: |
        FASTAPI - FRAMEWORK API MODERNE

        Installation :
        pip install fastapi uvicorn[standard]

        # main.py - Application minimale
        from fastapi import FastAPI

        app = FastAPI(
            title="Mon API",
            description="Description de l'API",
            version="1.0.0"
        )

        @app.get("/")
        def root():
            return {"message": "Hello World"}

        @app.get("/items/{item_id}")
        def read_item(item_id: int):
            return {"item_id": item_id}

        # Lancer le serveur
        # uvicorn main:app --reload --port 8000

        STRUCTURE PROJET AZALPLUS

        azalplus/
        ├── moteur/
        │   ├── core.py          # App FastAPI principale
        │   ├── api_v1.py        # Routes API v1
        │   ├── db.py            # Base de donnees
        │   ├── auth.py          # Authentification
        │   ├── tenant.py        # Multi-tenant
        │   └── ...
        ├── modules/             # Definitions YAML
        ├── config/              # Configuration
        └── templates/           # Jinja2

    - id: fastapi_002
      titre: "Routes et parametres"
      contenu: |
        METHODES HTTP

        @app.get("/items")           # Lecture liste
        @app.get("/items/{id}")      # Lecture un
        @app.post("/items")          # Creation
        @app.put("/items/{id}")      # Mise a jour complete
        @app.patch("/items/{id}")    # Mise a jour partielle
        @app.delete("/items/{id}")   # Suppression

        PARAMETRES DE CHEMIN

        @app.get("/users/{user_id}")
        def get_user(user_id: int):  # Type valide automatiquement
            return {"user_id": user_id}

        @app.get("/files/{file_path:path}")  # Chemin complet
        def get_file(file_path: str):
            return {"path": file_path}

        PARAMETRES DE REQUETE

        @app.get("/items")
        def list_items(
            skip: int = 0,
            limit: int = 10,
            q: str | None = None  # Optionnel
        ):
            return {"skip": skip, "limit": limit, "q": q}

        # /items?skip=0&limit=10&q=recherche

        from fastapi import Query

        @app.get("/search")
        def search(
            q: str = Query(min_length=3, max_length=50),
            page: int = Query(default=1, ge=1),
        ):
            return {"q": q, "page": page}

    - id: fastapi_003
      titre: "Corps de requete et Pydantic"
      contenu: |
        CORPS DE REQUETE AVEC PYDANTIC

        from pydantic import BaseModel, Field
        from typing import Optional
        from uuid import UUID

        class ItemCreate(BaseModel):
            nom: str = Field(..., min_length=1, max_length=100)
            description: Optional[str] = None
            prix: float = Field(..., gt=0)
            quantite: int = Field(default=1, ge=0)

        class ItemResponse(BaseModel):
            id: UUID
            nom: str
            description: Optional[str]
            prix: float

            class Config:
                from_attributes = True  # Pour SQLAlchemy

        @app.post("/items", response_model=ItemResponse)
        def create_item(item: ItemCreate):
            # item est valide automatiquement
            return {"id": "...", **item.model_dump()}

        VALIDATION AVANCEE

        from pydantic import BaseModel, field_validator, EmailStr

        class UserCreate(BaseModel):
            email: EmailStr
            password: str
            age: int

            @field_validator('password')
            @classmethod
            def password_strength(cls, v):
                if len(v) < 8:
                    raise ValueError('Mot de passe trop court')
                return v

            @field_validator('age')
            @classmethod
            def age_valid(cls, v):
                if v < 0 or v > 150:
                    raise ValueError('Age invalide')
                return v

    - id: fastapi_004
      titre: "Dependances et injection"
      contenu: |
        INJECTION DE DEPENDANCES

        from fastapi import Depends, HTTPException
        from sqlalchemy.orm import Session

        # Dependance base de donnees
        def get_db():
            db = SessionLocal()
            try:
                yield db
            finally:
                db.close()

        @app.get("/items")
        def list_items(db: Session = Depends(get_db)):
            return db.query(Item).all()

        DEPENDANCE AUTHENTIFICATION (AZALPLUS)

        from fastapi.security import OAuth2PasswordBearer

        oauth2_scheme = OAuth2PasswordBearer(tokenUrl="token")

        async def get_current_user(token: str = Depends(oauth2_scheme)):
            user = decode_token(token)
            if not user:
                raise HTTPException(status_code=401)
            return user

        @app.get("/me")
        def read_me(user: User = Depends(get_current_user)):
            return user

        DEPENDANCE TENANT (AZALPLUS - OBLIGATOIRE)

        from uuid import UUID

        def get_tenant_id(
            x_tenant_id: str = Header(..., alias="X-Tenant-ID")
        ) -> UUID:
            try:
                return UUID(x_tenant_id)
            except ValueError:
                raise HTTPException(400, "Tenant ID invalide")

        @app.get("/items")
        def list_items(
            tenant_id: UUID = Depends(get_tenant_id),
            db: Session = Depends(get_db)
        ):
            # TOUJOURS filtrer par tenant_id
            return db.query(Item).filter(Item.tenant_id == tenant_id).all()

    - id: fastapi_005
      titre: "Middleware et lifespan"
      contenu: |
        MIDDLEWARE

        from fastapi import Request
        from starlette.middleware.base import BaseHTTPMiddleware

        class TenantMiddleware(BaseHTTPMiddleware):
            async def dispatch(self, request: Request, call_next):
                tenant_id = request.headers.get("X-Tenant-ID")
                if not tenant_id:
                    return JSONResponse(
                        status_code=400,
                        content={"detail": "X-Tenant-ID requis"}
                    )
                request.state.tenant_id = tenant_id
                response = await call_next(request)
                return response

        app.add_middleware(TenantMiddleware)

        # Middleware CORS
        from fastapi.middleware.cors import CORSMiddleware

        app.add_middleware(
            CORSMiddleware,
            allow_origins=["http://localhost:3000"],
            allow_credentials=True,
            allow_methods=["*"],
            allow_headers=["*"],
        )

        LIFESPAN (STARTUP/SHUTDOWN)

        from contextlib import asynccontextmanager

        @asynccontextmanager
        async def lifespan(app: FastAPI):
            # Startup
            print("Demarrage de l'application")
            await init_database()
            await init_cache()
            yield
            # Shutdown
            print("Arret de l'application")
            await close_connections()

        app = FastAPI(lifespan=lifespan)

    - id: fastapi_006
      titre: "Gestion des erreurs"
      contenu: |
        EXCEPTIONS HTTP

        from fastapi import HTTPException

        @app.get("/items/{item_id}")
        def get_item(item_id: int):
            item = db.get(item_id)
            if not item:
                raise HTTPException(
                    status_code=404,
                    detail="Item non trouve"
                )
            return item

        EXCEPTIONS PERSONNALISEES

        class ItemNotFoundError(Exception):
            def __init__(self, item_id: int):
                self.item_id = item_id

        @app.exception_handler(ItemNotFoundError)
        async def item_not_found_handler(request, exc):
            return JSONResponse(
                status_code=404,
                content={"detail": f"Item {exc.item_id} non trouve"}
            )

        VALIDATION ERRORS

        from fastapi.exceptions import RequestValidationError

        @app.exception_handler(RequestValidationError)
        async def validation_handler(request, exc):
            return JSONResponse(
                status_code=422,
                content={
                    "detail": "Erreur de validation",
                    "errors": exc.errors()
                }
            )

