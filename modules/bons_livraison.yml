# =============================================================================
# AZALPLUS - Module Bons de Livraison
# =============================================================================
# Gestion des bons de livraison avec tracabilite complete, livraisons partielles,
# integration stock et generation de factures.
# Compatible No-Code et multi-tenant.
# =============================================================================

nom: BonsLivraison
nom_affichage: "Bons de Livraison"
icone: truck
menu: Commercial

description: |
  Module de gestion des bons de livraison pour le suivi des expeditions.
  Permet les livraisons partielles, le suivi des transporteurs,
  et la mise a jour automatique des stocks.

champs:
  # =========================================================================
  # IDENTIFICATION
  # =========================================================================
  - nom: numero
    type: text
    obligatoire: true
    auto: true
    readonly: true
    description: Numero du bon de livraison (auto-genere)
    autocompletion: true

  - nom: reference
    type: text
    obligatoire: false
    description: Reference client ou commande
    autocompletion: true

  - nom: statut
    type: select
    obligatoire: true
    defaut: PREPARATION
    options: [PREPARATION, PRET, EXPEDIE, EN_TRANSIT, LIVRE, LIVRE_PARTIEL, PROBLEME, RETOUR, ANNULE]
    description: Statut du bon de livraison

  # =========================================================================
  # RELATIONS - Documents sources
  # =========================================================================
  - nom: devis_id
    type: relation
    obligatoire: false
    relation: Devis
    description: Devis source (si creation depuis devis)
    autocompletion: true

  - nom: facture_id
    type: relation
    obligatoire: false
    relation: Factures
    description: Facture associee (si creation depuis facture ou liee apres)
    autocompletion: true

  - nom: client_id
    type: relation
    obligatoire: true
    relation: Clients
    description: Client destinataire
    autocompletion: true

  - nom: contact_livraison_civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite du contact de livraison

  - nom: contact_livraison
    type: relation
    obligatoire: false
    relation: Clients.contacts
    filtre: "is_shipping = true"
    description: Contact pour la livraison
    autocompletion: true

  # =========================================================================
  # DATES
  # =========================================================================
  - nom: date
    type: date
    obligatoire: true
    defaut: aujourd'hui
    description: Date du bon de livraison

  - nom: date_prevue
    type: date
    obligatoire: false
    description: Date de livraison prevue

  - nom: date_expedition
    type: datetime
    obligatoire: false
    description: Date et heure d'expedition effective

  - nom: date_livraison
    type: datetime
    obligatoire: false
    description: Date et heure de livraison effective

  # =========================================================================
  # ADRESSE DE LIVRAISON
  # =========================================================================
  - nom: adresse_livraison
    type: textarea
    obligatoire: true
    description: Adresse de livraison complete

  - nom: adresse_ligne1
    type: text
    obligatoire: false
    description: Adresse ligne 1 (rue, numero)
    autocompletion: true

  - nom: adresse_ligne2
    type: text
    obligatoire: false
    description: Adresse ligne 2 (complement)
    autocompletion: true

  - nom: code_postal
    type: text
    obligatoire: false
    description: Code postal
    autocompletion: true

  - nom: ville
    type: text
    obligatoire: false
    description: Ville
    autocompletion: true

  - nom: pays
    type: text
    obligatoire: false
    defaut: France
    description: Pays de livraison
    autocompletion: true

  - nom: instructions_livraison
    type: textarea
    obligatoire: false
    description: Instructions speciales pour la livraison

  # =========================================================================
  # TRANSPORTEUR ET SUIVI
  # =========================================================================
  - nom: transporteur
    type: text
    obligatoire: false
    description: Nom du transporteur (ex Chronopost, Colissimo, DHL, UPS)
    autocompletion: true

  - nom: service_transport
    type: select
    obligatoire: false
    options: [STANDARD, EXPRESS, 24H, 48H, ECONOMIQUE, POINT_RELAIS, SUR_PLACE]
    description: Type de service de livraison

  - nom: numero_suivi
    type: text
    obligatoire: false
    description: Numero de suivi du colis
    autocompletion: true

  - nom: url_suivi
    type: text
    obligatoire: false
    description: URL de suivi du transporteur
    autocompletion: true

  - nom: poids_total
    type: number
    obligatoire: false
    defaut: 0
    min: 0
    precision: 3
    description: Poids total en kg

  - nom: nombre_colis
    type: number
    obligatoire: false
    defaut: 1
    min: 1
    description: Nombre de colis

  - nom: frais_port
    type: number
    obligatoire: false
    defaut: 0
    min: 0
    description: Frais de port HT

  # =========================================================================
  # SIGNATURE ET RECEPTION
  # =========================================================================
  - nom: signe_par_civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite du signataire

  - nom: signe_par
    type: text
    obligatoire: false
    description: Nom du signataire a la reception
    autocompletion: true

  - nom: signature_client
    type: text
    obligatoire: false
    description: Image de la signature du receptionnaire (base64)

  - nom: date_signature
    type: datetime
    obligatoire: false
    description: Date et heure de signature

  - nom: signature_ip
    type: text
    obligatoire: false
    description: Adresse IP lors de la signature electronique

  - nom: photo_livraison
    type: text
    obligatoire: false
    description: Photo preuve de livraison (base64 ou URL)

  # =========================================================================
  # LIVRAISON PARTIELLE - Suivi quantites restantes
  # =========================================================================
  - nom: livraison_complete
    type: boolean
    obligatoire: false
    defaut: true
    readonly: true
    calcul: "toutes(lignes.quantite_restante = 0)"
    description: Indique si toutes les quantites ont ete livrees

  - nom: taux_livraison
    type: number
    obligatoire: false
    readonly: true
    calcul: |
      si somme(lignes.quantite_commandee) > 0:
        (somme(lignes.quantite_livree) / somme(lignes.quantite_commandee)) * 100
      sinon:
        0
    description: Pourcentage de livraison (0-100)

  - nom: bon_suivant_id
    type: relation
    obligatoire: false
    relation: BonsLivraison
    description: Bon de livraison suivant (pour livraisons partielles)
    autocompletion: true

  - nom: bon_precedent_id
    type: relation
    obligatoire: false
    relation: BonsLivraison
    description: Bon de livraison precedent (si suite de livraison)
    autocompletion: true

  # =========================================================================
  # PROBLEMES ET RETOURS
  # =========================================================================
  - nom: type_probleme
    type: select
    obligatoire: false
    options: [AUCUN, COLIS_ENDOMMAGE, COLIS_PERDU, ADRESSE_INCORRECTE, ABSENT, REFUSE, AUTRE]
    defaut: AUCUN
    description: Type de probleme rencontre

  - nom: description_probleme
    type: textarea
    obligatoire: false
    description: Description detaillee du probleme

  - nom: date_retour
    type: date
    obligatoire: false
    description: Date de retour du colis

  - nom: motif_retour
    type: textarea
    obligatoire: false
    description: Motif du retour

  # =========================================================================
  # NOTES
  # =========================================================================
  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes visibles sur le bon de livraison

  - nom: notes_internes
    type: textarea
    obligatoire: false
    description: Notes internes (non visibles client)

  - nom: notes_preparateur
    type: textarea
    obligatoire: false
    description: Instructions pour le preparateur

  # =========================================================================
  # PDF ET DOCUMENTS
  # =========================================================================
  - nom: pdf_url
    type: text
    obligatoire: false
    description: URL du PDF genere

  - nom: pdf_colisage_url
    type: text
    obligatoire: false
    description: URL du PDF liste de colisage

  - nom: access_token
    type: text
    obligatoire: false
    description: Token d'acces portail client

  # =========================================================================
  # ATTRIBUTION
  # =========================================================================
  - nom: preparateur
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Personne qui prepare la commande
    autocompletion: true

  - nom: expediteur
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Personne qui expedie
    autocompletion: true

  - nom: assigned_to
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Commercial responsable
    autocompletion: true

  - nom: validated_by
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Valide par
    autocompletion: true

  - nom: validated_at
    type: datetime
    obligatoire: false
    description: Date de validation

  # =========================================================================
  # METADONNEES
  # =========================================================================
  - nom: created_by
    type: relation
    obligatoire: false
    relation: Utilisateurs
    autocompletion: true

  - nom: created_at
    type: datetime
    obligatoire: false

  - nom: updated_at
    type: datetime
    obligatoire: false

# =============================================================================
# LIGNES DU BON DE LIVRAISON
# =============================================================================
lignes:
  champs:
    - nom: line_number
      type: number
      obligatoire: true
      description: Numero de ligne

    - nom: product_id
      type: relation
      obligatoire: true
      relation: Produits
      description: Produit a livrer

    - nom: variante_id
      type: relation
      obligatoire: false
      relation: VariantesProduit
      description: Variante du produit (si applicable)

    - nom: product_code
      type: text
      obligatoire: false
      description: Code produit ou SKU

    - nom: attributs_variante
      type: json
      obligatoire: false
      readonly: true
      description: |
        Attributs de la variante selectionnee.
        Format: {"TAILLE": "M", "COULEUR": "Rouge"}

    - nom: attributs_display
      type: text
      obligatoire: false
      readonly: true
      description: Texte d'affichage des attributs (ex Taille M, Couleur Rouge)

    - nom: description
      type: textarea
      obligatoire: true
      description: Description du produit

    - nom: unite
      type: text
      obligatoire: false
      defaut: pce
      description: Unite (pce, kg, m, etc.)

    # =========================================================================
    # QUANTITES - Gestion livraisons partielles
    # =========================================================================
    - nom: quantite_commandee
      type: number
      obligatoire: true
      min: 0
      precision: 3
      description: Quantite commandee initialement

    - nom: quantite_deja_livree
      type: number
      obligatoire: false
      defaut: 0
      min: 0
      precision: 3
      description: Quantite deja livree sur bons precedents

    - nom: quantite_a_livrer
      type: number
      obligatoire: true
      min: 0
      precision: 3
      description: Quantite a livrer sur ce bon

    - nom: quantite_livree
      type: number
      obligatoire: false
      defaut: 0
      min: 0
      precision: 3
      description: Quantite effectivement livree (confirmee)

    - nom: quantite_restante
      type: number
      obligatoire: false
      readonly: true
      calcul: "quantite_commandee - quantite_deja_livree - quantite_livree"
      description: Quantite restant a livrer

    - nom: quantite_manquante
      type: number
      obligatoire: false
      defaut: 0
      min: 0
      precision: 3
      description: Quantite manquante (rupture, defaut)

    - nom: motif_manquant
      type: text
      obligatoire: false
      description: Motif pour la quantite manquante

    # =========================================================================
    # COLISAGE
    # =========================================================================
    - nom: poids_unitaire
      type: number
      obligatoire: false
      min: 0
      precision: 3
      description: Poids unitaire en kg

    - nom: poids_ligne
      type: number
      obligatoire: false
      readonly: true
      calcul: "poids_unitaire * quantite_a_livrer"
      description: Poids total de la ligne en kg

    - nom: numero_colis
      type: text
      obligatoire: false
      description: Numero du colis contenant cet article

    - nom: emplacement
      type: text
      obligatoire: false
      description: Emplacement dans l'entrepot

    - nom: lot
      type: text
      obligatoire: false
      description: Numero de lot

    - nom: numero_serie
      type: text
      obligatoire: false
      description: Numero de serie

    - nom: date_peremption
      type: date
      obligatoire: false
      description: Date de peremption

    # =========================================================================
    # STOCK
    # =========================================================================
    - nom: stock_impacte
      type: boolean
      obligatoire: false
      defaut: false
      readonly: true
      description: Indique si le mouvement de stock a ete cree

    - nom: mouvement_stock_id
      type: relation
      obligatoire: false
      relation: MouvementStock
      description: Reference du mouvement de stock cree

    - nom: notes
      type: textarea
      obligatoire: false
      description: Notes pour cette ligne

# =============================================================================
# WORKFLOW
# =============================================================================
workflow:
  PREPARATION -> PRET: si lignes.count > 0 action marquer_pret
  PRET -> EXPEDIE: si transporteur ou service_transport action expedier
  EXPEDIE -> EN_TRANSIT: automatique
  EN_TRANSIT -> LIVRE: si signe_par ou signature_client action confirmer_livraison
  EN_TRANSIT -> LIVRE_PARTIEL: si taux_livraison < 100 action confirmer_livraison
  EN_TRANSIT -> PROBLEME: action signaler_probleme
  PROBLEME -> EN_TRANSIT: action resoudre_probleme
  PROBLEME -> RETOUR: action creer_retour
  LIVRE_PARTIEL -> LIVRE: si livraison_complete = true
  PREPARATION -> ANNULE: action annuler
  PRET -> ANNULE: action annuler
  LIVRE -> RETOUR: action creer_retour

# =============================================================================
# ACTIONS
# =============================================================================
actions:
  # Preparation
  - creer_depuis_devis        # Creer BL depuis un devis accepte
  - creer_depuis_facture      # Creer BL depuis une facture
  - ajouter_lignes            # Ajouter des lignes manuellement
  - importer_lignes           # Importer depuis document source

  # Workflow
  - marquer_pret              # Passer en status PRET
  - expedier                  # Marquer comme expedie
  - confirmer_livraison       # Confirmer reception
  - signer_electroniquement   # Signature electronique

  # Problemes
  - signaler_probleme         # Signaler un probleme
  - resoudre_probleme         # Marquer probleme resolu
  - creer_retour              # Creer un retour

  # Livraisons partielles
  - creer_bl_complement       # Creer BL pour le reste

  # Stock
  - impacter_stock            # Creer mouvements de stock
  - annuler_impact_stock      # Annuler les mouvements

  # Documents
  - generer_pdf               # Generer le bon de livraison PDF
  - generer_colisage          # Generer la liste de colisage
  - envoyer_email             # Envoyer par email
  - envoyer_sms_suivi         # Envoyer SMS avec lien suivi

  # Facturation
  - generer_facture           # Creer facture depuis ce BL

  # Divers
  - dupliquer
  - annuler

# =============================================================================
# REGLES DE VALIDATION
# =============================================================================
regles:
  - "client_id est requis"
  - "adresse_livraison est requis"
  - "lignes.count > 0 pour valider"
  - "quantite_a_livrer <= quantite_restante pour chaque ligne"
  - "quantite_livree <= quantite_a_livrer pour chaque ligne"
  - "date_livraison >= date_expedition si les deux sont definis"
  - "signe_par ou signature_client requis pour statut LIVRE"

# =============================================================================
# TRIGGERS - Automatisations
# =============================================================================
triggers:
  on_create:
    - copier_adresse_client    # Pre-remplir adresse depuis client
    - calculer_quantites       # Calculer quantites depuis source

  on_status_pret:
    - notifier_preparateur     # Notification au preparateur

  on_status_expedie:
    - creer_mouvements_stock   # Impacter le stock
    - notifier_client          # Email de confirmation expedition
    - envoyer_sms_suivi        # SMS avec numero de suivi

  on_status_livre:
    - confirmer_mouvements_stock  # Valider les mouvements
    - notifier_commercial      # Notification au commercial
    - mettre_a_jour_facture    # Marquer facture comme livree

  on_status_probleme:
    - alerter_commercial       # Alerte immediate
    - creer_tache_suivi        # Creer tache de suivi

  on_status_retour:
    - annuler_mouvements_stock # Annuler les mouvements
    - creer_avoir              # Proposer creation avoir

# =============================================================================
# INTEGRATION STOCK
# =============================================================================
stock:
  # Mouvement de sortie cree lors de l'expedition
  mouvement_type: SORTIE
  mouvement_sous_type: VENTE

  # Moment d'impact
  impact_sur: EXPEDIE   # Stock debite a l'expedition

  # Champs a renseigner
  motif: "Livraison {numero} - Client {client_id.name}"

  # Gestion des variantes
  # Si variante_id est renseigne, le mouvement est sur la variante
  # Sinon, le mouvement est sur le produit

# =============================================================================
# MARCEAU (Assistant IA)
# =============================================================================
marceau:
  alertes:
    - si statut = PREPARATION et date > date_prevue - 1j: "Livraison a preparer pour demain"
    - si statut = PREPARATION et date > date_prevue: "Livraison en retard de preparation"
    - si statut = EXPEDIE et date > date_prevue + 2j: "Livraison en retard"
    - si statut = PROBLEME: "Probleme de livraison a traiter"
    - si statut = EN_TRANSIT et date > date_expedition + 7j: "Colis non livre depuis 7 jours"
    - si taux_livraison < 100 et statut = LIVRE_PARTIEL: "Livraison partielle - reste a expedier"
    - si type_probleme != AUCUN: "Incident sur la livraison"
    - si lignes.count = 0: "Bon de livraison sans lignes"

  suggestions:
    - "Regrouper les livraisons par transporteur"
    - "Optimiser les tournees de livraison"
    - "Relancer les livraisons en attente"
    - "Analyser les problemes de livraison recurrents"
    - "Generer les factures des livraisons completees"

  kpis:
    - nom: "BL en preparation"
      calcul: "compte(statut = PREPARATION)"
      format: "nombre"
      alerte_si: "> 20"

    - nom: "BL prets a expedier"
      calcul: "compte(statut = PRET)"
      format: "nombre"

    - nom: "BL en transit"
      calcul: "compte(statut IN [EXPEDIE, EN_TRANSIT])"
      format: "nombre"

    - nom: "BL livres (mois)"
      calcul: "compte(statut = LIVRE AND date_livraison >= debut_mois)"
      format: "nombre"

    - nom: "Taux livraison reussie"
      calcul: |
        compte(statut = LIVRE) /
        compte(statut IN [LIVRE, LIVRE_PARTIEL, PROBLEME, RETOUR]) * 100
      format: "pourcentage"
      alerte_si: "< 95"

    - nom: "BL avec probleme"
      calcul: "compte(statut = PROBLEME)"
      format: "nombre"
      alerte_si: "> 0"

    - nom: "Delai moyen livraison"
      calcul: "moyenne(DATEDIFF(date_livraison, date_expedition)) WHERE statut = LIVRE"
      format: "jours"

    - nom: "Livraisons partielles"
      calcul: "compte(statut = LIVRE_PARTIEL)"
      format: "nombre"

# =============================================================================
# PDF - Templates
# =============================================================================
pdf:
  templates:
    - nom: bon_livraison
      description: Bon de livraison standard
      format: A4
      sections:
        - entete_entreprise
        - informations_livraison
        - adresse_destinataire
        - tableau_lignes
        - zone_signature
        - pied_page

    - nom: liste_colisage
      description: Liste de colisage (packing list)
      format: A4
      sections:
        - entete_entreprise
        - informations_colis
        - tableau_contenu_colis
        - instructions_manutention
        - codes_barres

  champs_bon_livraison:
    - numero
    - date
    - reference
    - client (nom, adresse)
    - adresse_livraison
    - transporteur
    - numero_suivi
    - lignes (description, quantite, unite)
    - notes
    - zone_signature (cadre vide pour signature)
    - date_signature_prevue

  champs_colisage:
    - numero
    - numero_colis
    - poids_total
    - dimensions
    - lignes (produit, quantite, emplacement)
    - codes_barres_produits

# =============================================================================
# INDEX pour performance
# =============================================================================
index:
  - numero
  - statut
  - date
  - client_id
  - devis_id
  - facture_id
  - transporteur
  - numero_suivi
  - date_livraison
  - ["client_id", "statut"]
  - ["date", "statut"]

# =============================================================================
# RECHERCHE
# =============================================================================
recherche:
  champs: [numero, reference, client_id.name, transporteur, numero_suivi, adresse_livraison]

# =============================================================================
# EXPORT
# =============================================================================
export:
  formats: [csv, xlsx, pdf]
  champs: [numero, date, client_id.name, statut, transporteur, numero_suivi, date_livraison, taux_livraison]

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  lecture: ["admin", "gestionnaire", "commercial", "preparateur"]
  creation: ["admin", "gestionnaire", "commercial"]
  modification: ["admin", "gestionnaire", "commercial"]
  expedition: ["admin", "gestionnaire", "preparateur"]
  confirmation: ["admin", "gestionnaire"]
  annulation: ["admin"]
  impact_stock: ["admin", "gestionnaire"]
