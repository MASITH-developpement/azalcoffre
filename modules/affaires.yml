# AZALPLUS - Module Affaires (Commandes)
# Flux: Devis -> Affaire/Commande -> Facture
nom: Affaires
icone: briefcase
menu: Commercial
description: Commandes de travaux (entre devis et facture)

champs:
  - nom: reference
    type: text
    obligatoire: true
    description: "Reference commande (CMD-YYYY-XXXX)"
    autocompletion: true

  - nom: client_id
    type: relation
    obligatoire: true
    relation: Clients
    description: Client
    autocompletion: true

  - nom: devis_id
    type: relation
    obligatoire: false
    relation: Devis
    description: Devis source
    autocompletion: true

  - nom: intitule
    type: text
    obligatoire: true
    description: Intitule de la commande

  - nom: description
    type: textarea
    obligatoire: false
    description: Description des travaux

  - nom: date_commande
    type: date
    obligatoire: true
    description: Date de commande

  - nom: date_debut
    type: date
    obligatoire: false
    description: Date debut prevue

  - nom: date_fin
    type: date
    obligatoire: false
    description: Date fin prevue

  - nom: montant_ht
    type: money
    obligatoire: false
    description: Montant HT

  - nom: statut
    type: select
    options:
      - EN_ATTENTE
      - EN_COURS
      - TERMINE
      - FACTURE
      - ANNULE
    defaut: EN_ATTENTE
    description: Statut de la commande

workflow:
  EN_ATTENTE -> EN_COURS: action demarrer
  EN_COURS -> TERMINE: action terminer
  TERMINE -> FACTURE: action facturer
  EN_ATTENTE -> ANNULE: action annuler
  EN_COURS -> ANNULE: action annuler

colonnes_liste:
  - reference
  - client_id
  - intitule
  - date_commande
  - montant_ht
  - statut
