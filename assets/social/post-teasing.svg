<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg1)"/>

  <!-- Montants qui tombent -->
  <text x="100" y="200" font-family="Inter, Arial" font-weight="800" font-size="120" fill="#ef4444" opacity="0.8">50€</text>
  <text x="450" y="350" font-family="Inter, Arial" font-weight="800" font-size="140" fill="#ef4444" opacity="0.85">100€</text>
  <text x="750" y="250" font-family="Inter, Arial" font-weight="800" font-size="160" fill="#ef4444" opacity="0.9">200€</text>
  <text x="200" y="480" font-family="Inter, Arial" font-weight="800" font-size="100" fill="#ef4444" opacity="0.7">75€</text>
  <text x="900" y="420" font-family="Inter, Arial" font-weight="800" font-size="110" fill="#ef4444" opacity="0.75">/mois</text>

  <!-- Barre -->
  <rect x="100" y="550" width="1000" height="6" fill="#3454D1"/>

  <!-- Message principal -->
  <text x="600" y="700" font-family="Inter, Arial" font-weight="800" font-size="72" fill="#FFFFFF" text-anchor="middle">ASSEZ.</text>

  <!-- Sous-texte -->
  <text x="600" y="820" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">On change les règles.</text>
  <text x="600" y="880" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">On cherche des Zaliers.</text>

  <!-- Logo Z -->
  <circle cx="600" cy="1020" r="60" fill="#3454D1"/>
  <text x="600" y="1045" font-family="Inter, Arial" font-weight="800" font-size="70" fill="#FFFFFF" text-anchor="middle">Z</text>

  <!-- CTA -->
  <text x="600" y="1140" font-family="Inter, Arial" font-weight="600" font-size="28" fill="#6B9FFF" text-anchor="middle">Pré-inscription ouverte</text>
</svg>
