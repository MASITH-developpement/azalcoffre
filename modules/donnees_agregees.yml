# =============================================================================
# AZALPLUS - Module Donnees Agregees (B2B Data Anonymization)
# =============================================================================
nom: Donnees Agregees
icone: chart-pie
menu: Systeme
description: Agregation et anonymisation donnees pour B2B

champs:
  - nom: reference
    type: text
    obligatoire: true
    unique: true
    description: Reference extraction

  - nom: nom
    type: text
    obligatoire: true
    description: Nom du dataset

  - nom: status
    type: select
    obligatoire: true
    defaut: EN_COURS
    options: [EN_COURS, PRET, VENDU, EXPIRE, ERREUR]
    description: Statut

  - nom: type
    type: select
    obligatoire: true
    options: [BENCHMARK_SECTEUR, TENDANCES_MARCHE, STATS_REGIONALES, PANEL_PRIX, CUSTOM]
    description: Type donnees

  - nom: secteur_naf
    type: text
    obligatoire: false
    description: Secteur NAF cible

  - nom: region
    type: text
    obligatoire: false
    description: Region geographique

  - nom: periode_debut
    type: date
    obligatoire: true
    description: Debut periode

  - nom: periode_fin
    type: date
    obligatoire: true
    description: Fin periode

  - nom: nb_entreprises_source
    type: number
    obligatoire: false
    readonly: true
    description: Entreprises sources

  - nom: seuil_anonymisation
    type: number
    obligatoire: false
    defaut: 5
    description: Seuil k-anonymat

  - nom: metriques
    type: json
    obligatoire: false
    description: Metriques calculees

  - nom: format_sortie
    type: select
    obligatoire: false
    defaut: JSON
    options: [JSON, CSV, PARQUET, API]
    description: Format sortie

  - nom: taille_fichier
    type: number
    obligatoire: false
    description: Taille fichier (octets)

  - nom: checksum
    type: text
    obligatoire: false
    description: Checksum SHA256

  - nom: prix_vente
    type: number
    obligatoire: false
    description: Prix vente

  - nom: acheteur
    type: text
    obligatoire: false
    description: Acheteur (si vendu)

  - nom: date_vente
    type: datetime
    obligatoire: false
    description: Date vente

  - nom: licence
    type: select
    obligatoire: false
    defaut: USAGE_UNIQUE
    options: [USAGE_UNIQUE, ANNUELLE, ILLIMITEE]
    description: Type licence

  - nom: rgpd_conformite
    type: boolean
    obligatoire: false
    defaut: true
    description: Conformite RGPD verifiee

  - nom: validation_dpo
    type: boolean
    obligatoire: false
    defaut: false
    description: Validation DPO

  - nom: date_expiration
    type: date
    obligatoire: false
    description: Date expiration donnees

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

workflow:
  EN_COURS -> PRET: valider
  PRET -> VENDU: vendre
  PRET -> EXPIRE: expirer
  EN_COURS -> ERREUR: echouer

actions:
  - generer
  - valider_anonymisation
  - previsualiser
  - exporter
  - vendre

marceau:
  alertes:
    - si nb_entreprises_source < seuil_anonymisation: "Echantillon trop petit pour anonymisation"
    - si date_expiration < aujourd'hui + 30 jours: "Donnees expirent bientot"
    - si rgpd_conformite = false: "Conformite RGPD non verifiee"
