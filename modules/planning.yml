# =============================================================================
# AZALPLUS - Module Planning Complet
# =============================================================================
# Gestion planning: agenda, réunions, ressources, rendez-vous

nom: Planning
nom_pluriel: Planning
icone: calendar
menu: Planning
description: "Planning: agenda, réunions, rendez-vous, ressources"
ordre_menu: 1

champs:
  # ==========================================================================
  # IDENTIFICATION
  # ==========================================================================
  - nom: numero
    type: text
    groupe: Identification
    libelle: "Numéro"
    unique: true
    auto_genere: true
    format: "EVT-{AAAA}{MM}{JJ}-{####}"

  - nom: type_evenement
    type: select
    groupe: Informations
    libelle: "Type"
    obligatoire: true
    options:
      - REUNION
      - RDV_CLIENT
      - RDV_PROSPECT
      - INTERVENTION
      - FORMATION
      - CONGE
      - ABSENCE
      - TACHE
      - RAPPEL
      - AUTRE
    defaut: REUNION

  - nom: titre
    type: text
    groupe: Identification
    libelle: "Titre"
    obligatoire: true

  - nom: description
    type: textarea
    groupe: Informations
    libelle: "Description"

  # ==========================================================================
  # DATES ET HEURES
  # ==========================================================================
  - nom: date_debut
    type: datetime
    groupe: Dates
    libelle: "Début"
    obligatoire: true

  - nom: date_fin
    type: datetime
    groupe: Dates
    libelle: "Fin"
    obligatoire: true

  - nom: journee_entiere
    type: boolean
    groupe: Informations
    libelle: "Journée entière"
    defaut: false

  - nom: duree_minutes
    type: number
    groupe: Informations
    libelle: "Durée (min)"

  - nom: fuseau_horaire
    type: text
    groupe: Informations
    libelle: "Fuseau horaire"
    defaut: "Europe/Paris"

  # ==========================================================================
  # RÉCURRENCE
  # ==========================================================================
  - nom: recurrent
    type: boolean
    groupe: Informations
    libelle: "Récurrent"
    defaut: false

  - nom: recurrence_type
    type: select
    groupe: Informations
    libelle: "Type récurrence"
    options: $frequences.valeurs

  - nom: recurrence_interval
    type: number
    groupe: Informations
    libelle: "Intervalle"
    defaut: 1

  - nom: recurrence_jours
    type: json
    groupe: Metadata
    libelle: "Jours"
    description: "Pour hebdomadaire"

  - nom: recurrence_fin
    type: date
    groupe: Dates
    libelle: "Fin récurrence"

  - nom: recurrence_nombre
    type: number
    groupe: Quantites
    libelle: "Nb occurrences"

  - nom: evenement_parent_id
    type: text
    groupe: Relations
    libelle: "Événement parent"

  # ==========================================================================
  # ORGANISATEUR
  # ==========================================================================
  - nom: organisateur_id
    type: relation
    groupe: Relations
    libelle: "Organisateur"
    relation: employes
    obligatoire: true

  - nom: organisateur_nom
    type: text
    groupe: Identification
    libelle: "Nom organisateur"

  - nom: organisateur_email
    type: email
    groupe: Contact
    libelle: "Email organisateur"

  # ==========================================================================
  # PARTICIPANTS
  # ==========================================================================
  - nom: participants
    type: json
    groupe: Metadata
    libelle: "Participants"
    description: "Liste des participants internes"

  - nom: participants_externes
    type: json
    groupe: Metadata
    libelle: "Participants externes"

  - nom: nombre_participants
    type: number
    groupe: Informations
    libelle: "Nb participants"

  - nom: reponses
    type: json
    groupe: Metadata
    libelle: "Réponses"
    description: "Accepté/Refusé/Peut-être"

  # ==========================================================================
  # LIEU
  # ==========================================================================
  - nom: lieu
    type: text
    groupe: Informations
    libelle: "Lieu"

  - nom: salle_id
    type: text
    groupe: Relations
    libelle: "Salle"

  - nom: adresse
    type: textarea
    groupe: Contact
    libelle: "Adresse"

  - nom: visioconference
    type: boolean
    groupe: Informations
    libelle: "Visioconférence"
    defaut: false

  - nom: lien_visio
    type: text
    groupe: Informations
    libelle: "Lien visio"

  - nom: plateforme_visio
    type: select
    groupe: Informations
    libelle: "Plateforme"
    options:
      - TEAMS
      - ZOOM
      - GOOGLE_MEET
      - WEBEX
      - AUTRE

  # ==========================================================================
  # RESSOURCES
  # ==========================================================================
  - nom: ressources
    type: json
    groupe: Metadata
    libelle: "Ressources"
    description: "Salles, équipements réservés"

  - nom: equipements
    type: tags
    groupe: Metadata
    libelle: "Équipements"

  # ==========================================================================
  # CONTEXTE COMMERCIAL
  # ==========================================================================
  - nom: client_id
    type: relation
    groupe: Relations
    libelle: "Client"
    relation: clients

  - nom: contact_client
    type: text
    groupe: Relations
    libelle: "Contact client"

  - nom: opportunite_id
    type: text
    groupe: Relations
    libelle: "Opportunité"

  - nom: projet_id
    type: text
    groupe: Relations
    libelle: "Projet"

  # ==========================================================================
  # PRÉPARATION
  # ==========================================================================
  - nom: ordre_jour
    type: textarea
    groupe: Notes
    libelle: "Ordre du jour"

  - nom: documents
    type: json
    groupe: Metadata
    libelle: "Documents"

  - nom: preparation_notes
    type: textarea
    groupe: Notes
    libelle: "Notes préparation"

  # ==========================================================================
  # COMPTE RENDU
  # ==========================================================================
  - nom: compte_rendu
    type: textarea
    groupe: Notes
    libelle: "Compte rendu"

  - nom: decisions
    type: textarea
    groupe: Notes
    libelle: "Décisions"

  - nom: actions_suivantes
    type: json
    groupe: Metadata
    libelle: "Actions à suivre"

  - nom: compte_rendu_envoye
    type: boolean
    groupe: Informations
    libelle: "CR envoyé"
    defaut: false

  # ==========================================================================
  # RAPPELS
  # ==========================================================================
  - nom: rappel_actif
    type: boolean
    groupe: Informations
    libelle: "Rappel"
    defaut: true

  - nom: rappel_delai
    type: number
    groupe: Informations
    libelle: "Rappel avant (min)"
    defaut: 15

  - nom: rappels_envoyes
    type: json
    groupe: Metadata
    libelle: "Rappels envoyés"

  # ==========================================================================
  # SYNCHRONISATION
  # ==========================================================================
  - nom: sync_google
    type: boolean
    groupe: Informations
    libelle: "Sync Google"
    defaut: false

  - nom: google_event_id
    type: text
    groupe: Relations
    libelle: "Google Event ID"

  - nom: sync_outlook
    type: boolean
    groupe: Informations
    libelle: "Sync Outlook"
    defaut: false

  - nom: outlook_event_id
    type: text
    groupe: Relations
    libelle: "Outlook Event ID"

  - nom: ical_uid
    type: text
    groupe: Informations
    libelle: "iCal UID"

  # ==========================================================================
  # CONFIDENTIALITÉ
  # ==========================================================================
  - nom: prive
    type: boolean
    groupe: Informations
    libelle: "Privé"
    defaut: false

  - nom: visible_par
    type: json
    groupe: Metadata
    libelle: "Visible par"

  # ==========================================================================
  # STATUT
  # ==========================================================================
  - nom: statut
    type: select
    groupe: Statut
    libelle: "Statut"
    options:
      - PLANIFIE
      - CONFIRME
      - EN_COURS
      - TERMINE
      - ANNULE
      - REPORTE
    defaut: PLANIFIE

  - nom: annulation_motif
    type: text
    groupe: Informations
    libelle: "Motif annulation"

  - nom: couleur
    type: text
    groupe: Informations
    libelle: "Couleur"
    defaut: "#3B82F6"

  - nom: notes
    type: textarea
    groupe: Notes
    libelle: "Notes"

# Index
index:
  - organisateur_id
  - date_debut
  - type_evenement
  - statut
  - client_id

recherche:
  - numero
  - titre
  - client_id
  - organisateur_id

affichage_liste:
  - titre
  - type_evenement
  - date_debut
  - duree_minutes
  - lieu
  - statut

workflow:
  PLANIFIE -> CONFIRME: "Confirmer"
  CONFIRME -> EN_COURS: null
  EN_COURS -> TERMINE: "Terminer"
  PLANIFIE -> ANNULE: "Annuler"
  CONFIRME -> ANNULE: "Annuler"
  PLANIFIE -> REPORTE: "Reporter"
  CONFIRME -> REPORTE: "Reporter"

actions:
  - inviter_participants
  - envoyer_rappel
  - rediger_cr
  - envoyer_cr
  - dupliquer
  - reporter
  - sync_calendrier
  - generer_lien_visio
