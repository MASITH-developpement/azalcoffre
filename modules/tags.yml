    couleur_texte: "#FFFFFF"
  - nom: "Jaune"
    couleur: "#F59E0B"
    couleur_texte: "#000000"
  - nom: "Rouge"
    couleur: "#EF4444"
    couleur_texte: "#FFFFFF"
  - nom: "Violet"
    couleur: "#8B5CF6"
    couleur_texte: "#FFFFFF"
  - nom: "Rose"
    couleur: "#EC4899"
    couleur_texte: "#FFFFFF"
  - nom: "Cyan"
    couleur: "#06B6D4"
    couleur_texte: "#FFFFFF"
  - nom: "Orange"
