# AZALPLUS - Module Contacts Unifies
nom: Contacts
icone: address-book
menu: CRM
description: Gestion unifiee des contacts (Clients et Fournisseurs)

champs:
  - nom: code
    type: text
    obligatoire: false
    description: Code auto-genere CONT-YYYY-XXXX
    autocompletion: true

  - nom: entity_type
    type: select
    obligatoire: true
    defaut: COMPANY
    options: [INDIVIDUAL, COMPANY]
    description: Type d'entite (Particulier ou Societe)

  - nom: relation_types
    type: tags
    obligatoire: true
    options: [CUSTOMER, SUPPLIER]
    description: Types de relation (Client et/ou Fournisseur)

  - nom: civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite

  - nom: name
    type: text
    obligatoire: true
    description: Nom principal (raison sociale ou nom complet)
    autocompletion: true

  - nom: legal_name
    type: text
    obligatoire: false
    description: Raison sociale officielle (si societe)
    autocompletion: true

  - nom: first_name
    type: text
    obligatoire: false
    description: Prenom (si particulier)
    autocompletion: true

  - nom: last_name
    type: text
    obligatoire: false
    description: Nom de famille (si particulier)
    autocompletion: true

  - nom: email
    type: email
    obligatoire: false
    autocompletion: true

  - nom: phone
    type: tel
    obligatoire: false

  - nom: mobile
    type: tel
    obligatoire: false

  - nom: website
    type: text
    obligatoire: false
    autocompletion: true

  - nom: address_line1
    type: text
    obligatoire: false
    autocompletion: true

  - nom: address_line2
    type: text
    obligatoire: false
    autocompletion: true

  - nom: city
    type: text
    obligatoire: false
    autocompletion: true

  - nom: postal_code
    type: text
    obligatoire: false
    autocompletion: true

  - nom: country_code
    type: text
    obligatoire: false
    defaut: FR
    autocompletion: true

  - nom: tax_id
    type: text
    obligatoire: false
    description: Numero TVA intracommunautaire
    autocompletion: true

  - nom: registration_number
    type: text
    obligatoire: false
    description: SIRET/SIREN
    autocompletion: true

  - nom: legal_form
    type: text
    obligatoire: false
    description: Forme juridique (SAS, SARL, EURL, etc.)
    autocompletion: true

  - nom: customer_type
    type: select
    obligatoire: false
    defaut: PROSPECT
    options: [PROSPECT, LEAD, CUSTOMER, VIP, PARTNER, CHURNED]
    description: Type de client CRM

  - nom: customer_payment_terms
    type: select
    obligatoire: false
    options: [IMMEDIATE, NET_15, NET_30, NET_45, NET_60, NET_90, END_OF_MONTH]
    description: Conditions de paiement client

  - nom: customer_credit_limit
    type: number
    obligatoire: false
    defaut: 0
    description: Limite de credit client

  - nom: customer_discount_rate
    type: number
    obligatoire: false
    defaut: 0
    description: Remise globale client (%)

  - nom: assigned_to
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Commercial assigne
    autocompletion: true

  - nom: industry
    type: text
    obligatoire: false
    description: Secteur d'activite
    autocompletion: true

  - nom: source
    type: select
    obligatoire: false
    options: [WEB, REFERRAL, SALON, PUBLICITE, RESEAU, APPEL_ENTRANT, PROSPECTION, PARTENAIRE, AUTRE]
    description: Source d'acquisition

  - nom: lead_score
    type: number
    obligatoire: false
    defaut: 0
    description: Score prospect (0-100)

  - nom: health_score
    type: number
    obligatoire: false
    defaut: 100
    description: Score sante client (0-100)

  - nom: supplier_status
    type: select
    obligatoire: false
    defaut: PROSPECT
    options: [PROSPECT, PENDING, APPROVED, BLOCKED, INACTIVE]
    description: Statut fournisseur

  - nom: supplier_type
    type: select
    obligatoire: false
    defaut: BOTH
    options: [GOODS, SERVICES, BOTH, RAW_MATERIALS, EQUIPMENT]
    description: Type de fournisseur

  - nom: supplier_payment_terms
    type: select
    obligatoire: false
    options: [IMMEDIATE, NET_15, NET_30, NET_45, NET_60, NET_90, END_OF_MONTH]
    description: Conditions de paiement fournisseur

  - nom: tags
    type: tags
    obligatoire: false
    description: Tags pour filtrage

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes publiques

  - nom: internal_notes
    type: textarea
    obligatoire: false
    description: Notes internes

  - nom: is_active
    type: boolean
    obligatoire: false
    defaut: true
    description: Contact actif

actions:
  - creer_devis
  - creer_facture
  - creer_bon_commande
  - creer_opportunite
  - voir_historique
  - envoyer_email
  - ajouter_activite
  - creer_ticket_support
  - fusionner_contacts

marceau:
  alertes:
    - si lead_score > 70 et customer_type = PROSPECT: "Prospect chaud a contacter"
    - si health_score < 50: "Attention client a risque"
    - si customer_type = CHURNED: "Client perdu - action de reconquete?"
    - si supplier_status = BLOCKED: "Fournisseur bloque"
