        CACHE DECORATOR

        from functools import wraps

        def cache(ttl: int = 300):
            def decorator(func):
                @wraps(func)
                async def wrapper(*args, **kwargs):
                    # Construire cle cache
                    cache_key = f"{func.__name__}:{args}:{kwargs}"

                    # Verifier cache
                    cached = redis_client.get(cache_key)
                    if cached:
                        return json.loads(cached)

                    # Executer fonction
                    result = await func(*args, **kwargs)

                    # Stocker en cache
                    redis_client.setex(
                        cache_key,
                        ttl,
                        json.dumps(result)
                    )

                    return result
                return wrapper
            return decorator

        @cache(ttl=3600)
        async def get_expensive_data(item_id: int):
            # Requete lente...
            return data

