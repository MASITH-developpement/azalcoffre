# =============================================================================
# AZALPLUS - Module Business Plan
# =============================================================================
# Accompagnement création d'entreprise et business plan pour TPE.
# Génération assistée par IA avec export PDF professionnel.

nom: Business Plan
nom_affichage: Business Plan
icone: rocket
menu: Création
description: Créer et gérer vos business plans

champs:
  # -----------------------------------------------------
  # Identification du projet
  # -----------------------------------------------------
  - nom: nom_projet
    type: text
    obligatoire: true
    label: Nom du projet
    description: Nom de votre future entreprise ou projet

  - nom: statut
    type: select
    obligatoire: true
    defaut: BROUILLON
    options:
      - BROUILLON
      - EN_COURS
      - TERMINE
      - VALIDE
      - FINANCE
    label: Statut

  - nom: date_creation
    type: date
    obligatoire: true
    defaut: aujourd'hui
    label: Date de création

  - nom: date_lancement_prevu
    type: date
    obligatoire: false
    label: Date de lancement prévue

  # -----------------------------------------------------
  # Le porteur de projet
  # -----------------------------------------------------
  - nom: porteur_nom
    type: text
    obligatoire: true
    label: Nom du porteur
    autocompletion: true

  - nom: porteur_prenom
    type: text
    obligatoire: true
    label: Prénom du porteur
    autocompletion: true

  - nom: porteur_email
    type: email
    obligatoire: true
    label: Email

  - nom: porteur_telephone
    type: tel
    obligatoire: false
    label: Téléphone

  - nom: porteur_experience
    type: textarea
    obligatoire: false
    label: Expérience et compétences
    description: Parcours, formations, compétences clés pour ce projet

  - nom: porteur_motivation
    type: textarea
    obligatoire: false
    label: Motivation
    description: Pourquoi ce projet ? Qu'est-ce qui vous motive ?

  # -----------------------------------------------------
  # L'idée / Le concept
  # -----------------------------------------------------
  - nom: pitch
    type: textarea
    obligatoire: true
    label: Pitch (résumé en 3 lignes)
    description: Décrivez votre projet en 3 phrases maximum

  - nom: probleme
    type: textarea
    obligatoire: true
    label: Problème identifié
    description: Quel problème résolvez-vous ?

  - nom: solution
    type: textarea
    obligatoire: true
    label: Votre solution
    description: Comment résolvez-vous ce problème ?

  - nom: proposition_valeur
    type: textarea
    obligatoire: false
    label: Proposition de valeur unique
    description: Qu'est-ce qui vous différencie de la concurrence ?

  - nom: secteur_activite
    type: select
    obligatoire: true
    options:
      - Artisanat
      - Commerce
      - Services aux particuliers
      - Services aux entreprises
      - Restauration
      - BTP / Construction
      - Santé / Bien-être
      - Transport / Logistique
      - Informatique / Digital
      - Formation / Conseil
      - Industrie
      - Agriculture
      - Immobilier
      - Autre
    label: Secteur d'activité

  - nom: code_naf_prevu
    type: text
    obligatoire: false
    label: Code NAF/APE prévu
    autocompletion: true

  # -----------------------------------------------------
  # Le marché
  # -----------------------------------------------------
  - nom: marche_cible
    type: textarea
    obligatoire: true
    label: Marché cible
    description: Qui sont vos clients potentiels ?

  - nom: zone_geographique
    type: select
    obligatoire: true
    options:
      - Local (ville)
      - Départemental
      - Régional
      - National
      - International
    label: Zone géographique

  - nom: zone_details
    type: text
    obligatoire: false
    label: Précision zone
    description: Ville, département, région concernée

  - nom: taille_marche
    type: select
    obligatoire: false
    options:
      - "< 100 K€"
      - "100 K€ - 500 K€"
      - "500 K€ - 1 M€"
      - "1 M€ - 5 M€"
      - "5 M€ - 10 M€"
      - "> 10 M€"
    label: Taille du marché estimée

  - nom: concurrents
    type: textarea
    obligatoire: false
    label: Concurrents identifiés
    description: Listez vos principaux concurrents et leurs forces/faiblesses

  - nom: avantages_concurrentiels
    type: textarea
    obligatoire: false
    label: Vos avantages concurrentiels
    description: Pourquoi les clients vous choisiront ?

  # -----------------------------------------------------
  # Stratégie commerciale
  # -----------------------------------------------------
  - nom: offre_produits
    type: textarea
    obligatoire: true
    label: Produits / Services proposés
    description: Décrivez votre offre

  - nom: politique_prix
    type: textarea
    obligatoire: false
    label: Politique de prix
    description: Comment fixez-vous vos prix ?

  - nom: canaux_distribution
    type: tags
    obligatoire: false
    label: Canaux de distribution
    description: "Boutique, e-commerce, marketplace, réseaux..."

  - nom: strategie_communication
    type: textarea
    obligatoire: false
    label: Stratégie de communication
    description: Comment allez-vous vous faire connaître ?

  # -----------------------------------------------------
  # Structure juridique
  # -----------------------------------------------------
  - nom: forme_juridique
    type: select
    obligatoire: false
    options:
      - A définir
      - Micro-entreprise
      - EI (Entreprise Individuelle)
      - EURL
      - SARL
      - SASU
      - SAS
      - SA
      - SCI
      - Association
      - Autre
    defaut: A définir
    label: Forme juridique envisagée

  - nom: capital_prevu
    type: number
    obligatoire: false
    label: Capital social prévu (€)

  - nom: associes
    type: textarea
    obligatoire: false
    label: Associés
    description: Noms et parts de chaque associé

  - nom: siege_social
    type: text
    obligatoire: false
    label: Siège social prévu
    autocompletion: true

  # -----------------------------------------------------
  # Prévisionnel financier
  # -----------------------------------------------------
  - nom: investissement_initial
    type: number
    obligatoire: false
    label: Investissement initial (€)
    description: Montant total pour démarrer

  - nom: apport_personnel
    type: number
    obligatoire: false
    label: Apport personnel (€)

  - nom: financement_recherche
    type: number
    obligatoire: false
    label: Financement recherché (€)

  - nom: sources_financement
    type: tags
    obligatoire: false
    label: Sources de financement envisagées
    description: "Prêt bancaire, love money, crowdfunding, subventions..."

  - nom: ca_annee_1
    type: number
    obligatoire: false
    label: CA prévisionnel Année 1 (€)

  - nom: ca_annee_2
    type: number
    obligatoire: false
    label: CA prévisionnel Année 2 (€)

  - nom: ca_annee_3
    type: number
    obligatoire: false
    label: CA prévisionnel Année 3 (€)

  - nom: charges_fixes_mensuelles
    type: number
    obligatoire: false
    label: Charges fixes mensuelles (€)
    description: Loyer, assurances, abonnements, salaires...

  - nom: charges_variables_pct
    type: number
    obligatoire: false
    label: Charges variables (% du CA)
    description: Achats, matières premières...

  - nom: seuil_rentabilite
    type: number
    obligatoire: false
    readonly: true
    label: Seuil de rentabilité (€)
    calcul: "charges_fixes_mensuelles * 12 / (1 - charges_variables_pct / 100)"

  - nom: resultat_annee_1
    type: number
    obligatoire: false
    label: Résultat net Année 1 (€)

  - nom: resultat_annee_2
    type: number
    obligatoire: false
    label: Résultat net Année 2 (€)

  - nom: resultat_annee_3
    type: number
    obligatoire: false
    label: Résultat net Année 3 (€)

  - nom: tresorerie_depart
    type: number
    obligatoire: false
    label: Trésorerie de départ (€)

  - nom: bfr
    type: number
    obligatoire: false
    label: BFR estimé (€)
    description: Besoin en Fonds de Roulement

  # -----------------------------------------------------
  # Ressources humaines
  # -----------------------------------------------------
  - nom: effectif_depart
    type: number
    obligatoire: false
    defaut: 1
    label: Effectif au démarrage

  - nom: effectif_annee_3
    type: number
    obligatoire: false
    label: Effectif prévu Année 3

  - nom: postes_a_creer
    type: textarea
    obligatoire: false
    label: Postes à créer
    description: Quels profils allez-vous recruter ?

  # -----------------------------------------------------
  # Planning
  # -----------------------------------------------------
  - nom: etapes_cles
    type: json
    obligatoire: false
    label: Étapes clés du projet
    description: |
      Format: [
        {"etape": "Étude de marché", "date": "2026-04", "fait": false},
        {"etape": "Choix statut", "date": "2026-05", "fait": false},
        ...
      ]

  - nom: risques_identifies
    type: textarea
    obligatoire: false
    label: Risques identifiés
    description: Quels sont les principaux risques et comment les atténuer ?

  # -----------------------------------------------------
  # Accompagnement
  # -----------------------------------------------------
  - nom: accompagnement
    type: tags
    obligatoire: false
    label: Accompagnement sollicité
    description: "CMA, CCI, BGE, Initiative France, Pôle Emploi..."

  - nom: contact_accompagnement
    type: text
    obligatoire: false
    label: Contact accompagnateur
    autocompletion: true

  - nom: notes
    type: textarea
    obligatoire: false
    label: Notes et remarques

  # -----------------------------------------------------
  # Documents joints
  # -----------------------------------------------------
  - nom: cv_porteur
    type: text
    obligatoire: false
    label: CV du porteur (URL)

  - nom: etude_marche
    type: text
    obligatoire: false
    label: Étude de marché (URL)

  - nom: previsionnel_detaille
    type: text
    obligatoire: false
    label: Prévisionnel détaillé (URL)

  - nom: pdf_genere
    type: text
    obligatoire: false
    label: Business Plan PDF (URL)

  # -----------------------------------------------------
  # IA Assistance
  # -----------------------------------------------------
  - nom: ia_suggestions
    type: json
    obligatoire: false
    label: Suggestions IA
    description: Recommandations générées par l'IA

  - nom: ia_score_completude
    type: number
    obligatoire: false
    readonly: true
    label: Score de complétude (%)
    description: Calculé automatiquement

  - nom: ia_points_vigilance
    type: textarea
    obligatoire: false
    readonly: true
    label: Points de vigilance IA

  # -----------------------------------------------------
  # Métadonnées
  # -----------------------------------------------------
  - nom: created_at
    type: datetime
    obligatoire: false

  - nom: updated_at
    type: datetime
    obligatoire: false

  - nom: created_by
    type: relation
    obligatoire: false
    relation: Utilisateurs

# =============================================================================
# Workflow
# =============================================================================
workflow:
  BROUILLON -> EN_COURS: si pitch et probleme et solution
  EN_COURS -> TERMINE: si ca_annee_1 et investissement_initial
  TERMINE -> VALIDE: action valider
  VALIDE -> FINANCE: action marquer_finance

# =============================================================================
# Actions
# =============================================================================
actions:
  - generer_pdf
  - analyser_ia
  - simuler_statut
  - calculer_seuil_rentabilite
  - exporter_previsionnel
  - dupliquer
  - partager
  - valider
  - marquer_finance

# =============================================================================
# Marceau (Assistant IA)
# =============================================================================
marceau:
  alertes:
    - si statut = BROUILLON et updated_at < aujourd'hui - 30j: "Business plan en attente depuis plus d'un mois"
    - si ca_annee_1 > 0 et resultat_annee_1 < 0: "Résultat négatif prévu - vérifier la viabilité"
    - si financement_recherche > apport_personnel * 4: "Ratio apport/financement faible - risque refus bancaire"
    - si effectif_depart > 3 et ca_annee_1 < 150000: "CA faible pour l'effectif prévu"

  suggestions:
    - "Compléter l'étude de marché"
    - "Ajouter les concurrents identifiés"
    - "Préciser les canaux de distribution"
    - "Contacter un accompagnateur CMA/CCI/BGE"

  kpis:
    - nom: "Business plans en cours"
      calcul: "compte(statut = EN_COURS)"
      format: nombre

    - nom: "Taux de complétion moyen"
      calcul: "moyenne(ia_score_completude)"
      format: pourcentage

    - nom: "Financements obtenus"
      calcul: "somme(financement_recherche) WHERE statut = FINANCE"
      format: monnaie
