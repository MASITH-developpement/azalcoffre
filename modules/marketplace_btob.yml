# =============================================================================
# AZALPLUS - Module Etudes de Marche B2B
# =============================================================================
nom: marketplace_btob
nom_affichage: Etudes de Marche
icone: chart-bar
menu: Commercial
description: Rapports et etudes de marche a vendre

champs:
  - nom: reference
    type: text
    groupe: Identification
    libelle: "Reference"
    obligatoire: true
    unique: true

  - nom: titre
    type: text
    groupe: Identification
    libelle: "Titre de l'etude"
    obligatoire: true

  - nom: statut
    type: select
    groupe: Statut
    libelle: "Statut"
    obligatoire: true
    defaut: BROUILLON
    options:
      - BROUILLON
      - DISPONIBLE
      - VENDU
      - ARCHIVE

  - nom: categorie
    type: select
    groupe: Informations
    libelle: "Categorie"
    obligatoire: true
    options:
      - ANALYSE_SECTORIELLE
      - TENDANCES_MARCHE
      - ETUDE_REGIONALE
      - COMPARATIF_PRIX
      - RAPPORT_PERSONNALISE

  - nom: secteur
    type: text
    groupe: Informations
    libelle: "Secteur d'activite"

  - nom: region
    type: text
    groupe: Contact
    libelle: "Region"

  - nom: date_debut
    type: date
    groupe: Dates
    libelle: "Periode - Debut"
    obligatoire: true

  - nom: date_fin
    type: date
    groupe: Dates
    libelle: "Periode - Fin"
    obligatoire: true

  - nom: nb_entreprises
    type: number
    groupe: Quantites
    libelle: "Nombre d'entreprises analysees"
    readonly: true

  - nom: format
    type: select
    groupe: Informations
    libelle: "Format du rapport"
    defaut: PDF
    options:
      - PDF
      - EXCEL
      - POWERPOINT

  - nom: prix
    type: money
    groupe: Montants
    libelle: "Prix de vente"

  - nom: acheteur
    type: text
    groupe: Informations
    libelle: "Acheteur"

  - nom: date_vente
    type: date
    groupe: Dates
    libelle: "Date de vente"

  - nom: licence
    type: select
    groupe: Informations
    libelle: "Type de licence"
    defaut: USAGE_UNIQUE
    options:
      - USAGE_UNIQUE
      - ANNUELLE
      - ILLIMITEE

  - nom: date_expiration
    type: date
    groupe: Dates
    libelle: "Date d'expiration"

  - nom: description
    type: textarea
    groupe: Informations
    libelle: "Description"

  - nom: notes
    type: textarea
    groupe: Notes
    libelle: "Notes internes"

recherche:
  - reference
  - titre
  - secteur
  - acheteur

affichage_liste:
  - reference
  - titre
  - categorie
  - statut
  - prix

champ_affichage: titre

workflow:
  BROUILLON -> DISPONIBLE: Publier
  DISPONIBLE -> VENDU: Marquer vendu
  DISPONIBLE -> ARCHIVE: Archiver
  VENDU -> ARCHIVE: Archiver
