# AZALPLUS - Module Mouvements Stock
nom: MouvementsStock
icone: package
menu: Inventaire

champs:
  - nom: produit_id
    type: relation
    relation: Produits
    obligatoire: true
    description: Produit
    autocompletion: true

  - nom: type
    type: select
    obligatoire: true
    options: [ENTREE, SORTIE, AJUSTEMENT, TRANSFERT, INVENTAIRE]
    description: Type de mouvement

  - nom: sous_type
    type: select
    obligatoire: false
    options: [ACHAT, VENTE, INTERVENTION, RETOUR, PERTE, CORRECTION]
    description: Sous-type

  - nom: quantite
    type: number
    obligatoire: true
    description: Quantite

  - nom: quantite_avant
    type: number
    obligatoire: false
    description: Stock avant mouvement

  - nom: quantite_apres
    type: number
    obligatoire: false
    description: Stock apres mouvement

  - nom: cout_unitaire
    type: number
    obligatoire: false
    description: Cout unitaire

  - nom: reference
    type: text
    obligatoire: false
    description: Reference document
    autocompletion: true

  - nom: facture_id
    type: relation
    relation: Factures
    obligatoire: false
    description: Facture liee
    autocompletion: true

  - nom: intervention_id
    type: relation
    relation: Interventions
    obligatoire: false
    description: Intervention liee
    autocompletion: true

  - nom: date
    type: datetime
    obligatoire: true
    description: Date du mouvement

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

  - nom: statut
    type: select
    defaut: BROUILLON
    options: [BROUILLON, VALIDE, ANNULE]
    description: Statut
