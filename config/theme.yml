# =============================================================================
# AZALPLUS - Thème Dark Professionnel
# =============================================================================
# Design moderne inspiré de la landing page AZALPLUS
# Modifier ici = change TOUT le design automatiquement

nom: "AZALPLUS Dark"

# -----------------------------------------------------------------------------
# Couleurs
# -----------------------------------------------------------------------------
couleurs:
  # Bleu AZALPLUS
  primaire: "#3454D1"
  primaire_fonce: "#2a44a8"
  primaire_clair: "#6B9FFF"

  # Sidebar sombre AZALPLUS
  sidebar_fond: "#0a0e1a"
  sidebar_texte: "#94A3B8"
  sidebar_texte_actif: "#FFFFFF"
  sidebar_hover: "#1a1f36"
  sidebar_actif: "#3454D1"

  # Statuts
  succes: "#10b981"
  succes_clair: "#065f46"
  attention: "#f59e0b"
  attention_clair: "#92400e"
  erreur: "#ef4444"
  erreur_clair: "#991b1b"
  info: "#3b82f6"
  info_clair: "#1e40af"

  # Palette Dark Mode
  blanc: "#FFFFFF"
  noir: "#0f1225"

  # Gris inversés pour dark mode
  gris_50: "#0f1225"        # Fond principal (le plus sombre)
  gris_100: "#1a1f36"       # Cartes, surfaces élevées
  gris_200: "#252d47"       # Bordures, séparateurs
  gris_300: "#3a4558"       # Bordures actives
  gris_400: "#4a5568"       # Texte désactivé
  gris_500: "#64748b"       # Texte secondaire
  gris_600: "#94a3b8"       # Texte normal
  gris_700: "#cbd5e1"       # Texte important
  gris_800: "#e2e8f0"       # Titres
  gris_900: "#f8fafc"       # Texte principal (le plus clair)

# -----------------------------------------------------------------------------
# Typographie
# -----------------------------------------------------------------------------
typographie:
  police: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  taille_base: "14px"
  taille_petite: "13px"
  taille_grande: "16px"
  taille_titre: "20px"

# -----------------------------------------------------------------------------
# Espacement
# -----------------------------------------------------------------------------
espacement:
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"

# -----------------------------------------------------------------------------
# Bordures
# -----------------------------------------------------------------------------
bordures:
  rayon: "8px"
  rayon_grand: "12px"
  couleur: "#252d47"

# -----------------------------------------------------------------------------
# Ombres (adaptées au dark mode)
# -----------------------------------------------------------------------------
ombres:
  petite: "0 2px 4px rgba(0,0,0,0.3)"
  moyenne: "0 4px 8px rgba(0,0,0,0.4)"
  grande: "0 8px 24px rgba(0,0,0,0.5)"

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
layout:
  sidebar_largeur: "240px"
  header_hauteur: "60px"
  contenu_max: "1400px"

# -----------------------------------------------------------------------------
# Breakpoints (Mobile-First Responsive Design)
# -----------------------------------------------------------------------------
breakpoints:
  mobile: "480px"
  tablet: "768px"
  desktop: "1024px"
  wide: "1440px"

# -----------------------------------------------------------------------------
# Mobile Settings
# -----------------------------------------------------------------------------
mobile:
  touch_target_min: "44px"
  sidebar_behavior: "overlay"
  form_layout: "stacked"
  table_layout: "cards"

# -----------------------------------------------------------------------------
# Composants - Boutons
# -----------------------------------------------------------------------------
boutons:
  padding: "12px 20px"
  rayon: "8px"
  primaire_fond: "#3454D1"
  primaire_texte: "#FFFFFF"
  primaire_hover: "#2a44a8"
  secondaire_fond: "#1a1f36"
  secondaire_texte: "#FFFFFF"
  secondaire_bordure: "#3a4558"
  secondaire_hover: "#252d47"
  danger_fond: "#ef4444"
  danger_texte: "#FFFFFF"
  danger_hover: "#dc2626"

# -----------------------------------------------------------------------------
# Composants - Inputs
# -----------------------------------------------------------------------------
inputs:
  padding: "12px 14px"
  rayon: "8px"
  fond: "#0f1225"
  bordure: "#252d47"
  bordure_focus: "#3454D1"
  texte: "#f8fafc"
  placeholder: "#64748b"

# -----------------------------------------------------------------------------
# Composants - Cartes
# -----------------------------------------------------------------------------
cartes:
  rayon: "12px"
  padding: "24px"
  fond: "#1a1f36"
  bordure: "#252d47"
  ombre: "0 4px 12px rgba(0,0,0,0.3)"

# -----------------------------------------------------------------------------
# Composants - Tables
# -----------------------------------------------------------------------------
tables:
  header_fond: "#0f1225"
  header_texte: "#94a3b8"
  ligne_fond: "#1a1f36"
  ligne_hover: "#252d47"
  ligne_texte: "#e2e8f0"
  bordure: "#252d47"
  padding: "14px 16px"

# -----------------------------------------------------------------------------
# Composants - Badges
# -----------------------------------------------------------------------------
badges:
  padding: "6px 12px"
  rayon: "20px"

  # Badges de statut
  brouillon_fond: "#252d47"
  brouillon_texte: "#94a3b8"

  envoye_fond: "rgba(59, 130, 246, 0.2)"
  envoye_texte: "#60a5fa"

  accepte_fond: "rgba(16, 185, 129, 0.2)"
  accepte_texte: "#34d399"

  refuse_fond: "rgba(239, 68, 68, 0.2)"
  refuse_texte: "#f87171"

  attente_fond: "rgba(245, 158, 11, 0.2)"
  attente_texte: "#fbbf24"

  termine_fond: "rgba(16, 185, 129, 0.2)"
  termine_texte: "#34d399"

  annule_fond: "rgba(239, 68, 68, 0.2)"
  annule_texte: "#f87171"

# -----------------------------------------------------------------------------
# Header
# -----------------------------------------------------------------------------
header:
  fond: "#1a1f36"
  texte: "#f8fafc"
  recherche_fond: "#0f1225"
  recherche_bordure: "#252d47"
  recherche_largeur: "350px"
  bouton_ajouter: true
  notifications: true

# -----------------------------------------------------------------------------
# Login
# -----------------------------------------------------------------------------
login:
  fond: "linear-gradient(135deg, #0a0e1a 0%, #0f1225 100%)"
  carte_fond: "#1a1f36"
  carte_largeur: "420px"
  carte_rayon: "16px"
  carte_ombre: "0 20px 60px rgba(0,0,0,0.5)"

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  kpi_fond: "#1a1f36"
  kpi_bordure: "#252d47"
  kpi_icone_fond: "rgba(52, 84, 209, 0.15)"
  kpi_icone_couleur: "#6B9FFF"
  graphique_fond: "#1a1f36"

# -----------------------------------------------------------------------------
# Style des Documents (Devis/Factures)
# -----------------------------------------------------------------------------
documents:
  # Couleur principale du document
  couleur: "#3454D1"

  # Structure: "moderne" | "classique" | "minimal"
  structure: "moderne"

  # Style tableaux
  tableaux: "simple"

  # Angles
  angles: "arrondis"

  # Lignes séparatrices
  lignes: "fines"

  # Images produits
  images_produits: "petites"

  # Police du document
  police: "Inter"

  # Taille police
  taille_police: "12px"

  # Afficher logo
  logo: true

  # Marges (en mm pour PDF)
  marges: "15mm"

  # Fond (pour PDF en dark mode on garde blanc pour impression)
  fond_impression: "#FFFFFF"
  texte_impression: "#0f172a"

# -----------------------------------------------------------------------------
# Animations
# -----------------------------------------------------------------------------
animations:
  transition: "all 0.2s ease"
  hover_scale: "1.02"

# -----------------------------------------------------------------------------
# Liste / Tableaux
# -----------------------------------------------------------------------------
liste:
  item_fond: "#1a1f36"
  item_hover: "#252d47"
  item_actif: "rgba(52, 84, 209, 0.15)"
  item_bordure: "#252d47"
  item_rayon: "10px"
  item_padding: "16px"
