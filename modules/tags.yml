    couleur: "#F59E0B"
    couleur_texte: "#000000"
    groupe: "Client"
    global: false
    module: Clients
    is_system: true

  - nom: "Urgent"
    couleur: "#EF4444"
    couleur_texte: "#FFFFFF"
    groupe: "Priorite"
    global: true
    is_system: true

  - nom: "A relancer"
    couleur: "#F97316"
    couleur_texte: "#FFFFFF"
    groupe: "Suivi"
    global: true
    is_system: true

  - nom: "Nouveau"
    couleur: "#22C55E"
    couleur_texte: "#FFFFFF"
    groupe: "Statut"
    global: true
    is_system: true

  - nom: "En attente"
    couleur: "#6B7280"
    couleur_texte: "#FFFFFF"
    groupe: "Statut"
    global: true
    is_system: true

  - nom: "Important"
    couleur: "#8B5CF6"
    couleur_texte: "#FFFFFF"
    groupe: "Priorite"
    global: true
    is_system: true
