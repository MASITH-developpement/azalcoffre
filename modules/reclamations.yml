# AZALPLUS - Module Reclamations Clients
nom: Reclamations
icone: message-square
menu: Service Client
description: Gestion des reclamations clients conforme ISO 10002

champs:
  - nom: reference
    type: text
    obligatoire: true
    description: Reference unique (auto-generee REC-YYYY-XXXX)
    autocompletion: true

  - nom: category
    type: select
    obligatoire: false
    defaut: other
    options: [product_quality, product_defect, delivery, delivery_delay, billing, pricing, service, communication, website, contract, returns, warranty, gdpr, fraud, other]
    description: Categorie de reclamation

  - nom: priority
    type: select
    obligatoire: false
    defaut: medium
    options: [low, medium, high, urgent, critical]
    description: Priorite de la reclamation

  - nom: status
    type: select
    obligatoire: true
    defaut: new
    options: [draft, new, acknowledged, in_progress, pending_info, pending_customer, under_investigation, escalated, pending_approval, resolved, closed, reopened, cancelled]
    description: Statut de la reclamation

  - nom: channel
    type: select
    obligatoire: false
    defaut: email
    options: [email, phone, web_form, chat, social_media, letter, in_person, mobile_app, api]
    description: Canal de reception

  - nom: subject
    type: text
    obligatoire: true
    description: Objet de la reclamation
    autocompletion: true

  - nom: description
    type: textarea
    obligatoire: true
    description: Description detaillee

  - nom: customer_id
    type: relation
    obligatoire: false
    relation: Clients
    description: Client
    autocompletion: true

  - nom: customer_civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite du client

  - nom: customer_name
    type: text
    obligatoire: false
    description: Nom du client
    autocompletion: true

  - nom: customer_email
    type: email
    obligatoire: false
    description: Email du client
    autocompletion: true

  - nom: customer_phone
    type: tel
    obligatoire: false
    description: Telephone du client

  - nom: is_vip_customer
    type: boolean
    obligatoire: false
    defaut: false
    description: Client VIP

  - nom: order_id
    type: relation
    obligatoire: false
    relation: Commandes
    description: Commande concernee
    autocompletion: true

  - nom: invoice_id
    type: relation
    obligatoire: false
    relation: Factures
    description: Facture concernee
    autocompletion: true

  - nom: product_id
    type: relation
    obligatoire: false
    relation: Produits
    description: Produit concerne
    autocompletion: true

  - nom: disputed_amount
    type: number
    obligatoire: false
    description: Montant conteste

  - nom: currency
    type: select
    obligatoire: false
    defaut: EUR
    options: [EUR, USD, GBP, CHF, CAD]
    description: Devise

  - nom: team_id
    type: relation
    obligatoire: false
    relation: Equipes
    description: Equipe assignee
    autocompletion: true

  - nom: assigned_to_id
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Agent assigne
    autocompletion: true

  - nom: sla_policy_id
    type: relation
    obligatoire: false
    relation: SLA
    description: Politique SLA
    autocompletion: true

  - nom: acknowledgment_due
    type: datetime
    obligatoire: false
    description: Echeance accuse reception

  - nom: acknowledged_at
    type: datetime
    obligatoire: false
    description: Date accuse reception

  - nom: acknowledgment_breached
    type: boolean
    obligatoire: false
    defaut: false
    description: Violation SLA accuse reception

  - nom: resolution_due
    type: datetime
    obligatoire: false
    description: Echeance resolution

  - nom: resolved_at
    type: datetime
    obligatoire: false
    description: Date resolution

  - nom: resolution_breached
    type: boolean
    obligatoire: false
    defaut: false
    description: Violation SLA resolution

  - nom: current_escalation_level
    type: select
    obligatoire: false
    defaut: level_1
    options: [level_1, level_2, level_3, level_4, legal, mediator, external]
    description: Niveau d'escalade

  - nom: escalation_count
    type: number
    obligatoire: false
    defaut: 0
    description: Nombre d'escalades

  - nom: resolution_type
    type: select
    obligatoire: false
    options: [explanation, refund, partial_refund, replacement, repair, credit_note, commercial_gesture, voucher, compensation, apology, no_action, escalated_external]
    description: Type de resolution

  - nom: resolution_summary
    type: textarea
    obligatoire: false
    description: Resume de la resolution
    autocompletion: true

  - nom: compensation_amount
    type: number
    obligatoire: false
    description: Montant du dedommagement

  - nom: root_cause_category
    type: select
    obligatoire: false
    options: [product, process, people, system, supplier, communication, external, unknown]
    description: Categorie de cause racine

  - nom: root_cause_description
    type: textarea
    obligatoire: false
    description: Description de la cause racine
    autocompletion: true

  - nom: satisfaction_rating
    type: select
    obligatoire: false
    options: [very_dissatisfied, dissatisfied, neutral, satisfied, very_satisfied]
    description: Note de satisfaction

  - nom: nps_score
    type: number
    obligatoire: false
    description: Score NPS (0-10)

  - nom: tags
    type: tags
    obligatoire: false
    description: Tags

  - nom: exchange_count
    type: number
    obligatoire: false
    defaut: 0
    description: Nombre d'echanges

  - nom: reopen_count
    type: number
    obligatoire: false
    defaut: 0
    description: Nombre de reouvertures

  - nom: closed_at
    type: datetime
    obligatoire: false
    description: Date de cloture

workflow:
  new -> acknowledged: action accuser_reception
  acknowledged -> in_progress: action prendre_en_charge
  in_progress -> pending_info: action demander_info
  in_progress -> pending_customer: action attendre_client
  in_progress -> under_investigation: action investiguer
  in_progress -> escalated: action escalader
  escalated -> in_progress: action reprendre
  in_progress -> pending_approval: action soumettre_approbation
  pending_approval -> resolved: approbation obtenue
  in_progress -> resolved: action resoudre
  resolved -> closed: action cloturer
  closed -> reopened: action rouvrir
  reopened -> in_progress: reprise traitement

actions:
  - accuser_reception
  - prendre_en_charge
  - assigner
  - repondre
  - ajouter_note
  - demander_info
  - escalader
  - investiguer
  - resoudre
  - cloturer
  - rouvrir
  - creer_avoir
  - envoyer_enquete_satisfaction

marceau:
  alertes:
    - si status = new et acknowledgment_due < maintenant: "Reclamation non accusee reception"
    - si acknowledgment_breached = true: "Violation SLA accuse reception"
    - si resolution_breached = true: "Violation SLA resolution"
    - si priority in [urgent, critical] et status in [new, acknowledged]: "Reclamation prioritaire non traitee"
    - si reopen_count > 1: "Reclamation rouverte plusieurs fois"
    - si is_vip_customer = true et status not in [resolved, closed]: "Client VIP avec reclamation ouverte"
