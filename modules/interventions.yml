# =============================================================================
# AZALPLUS - Module Interventions/SAV Complet
# =============================================================================
# Gestion SAV: interventions, maintenances, équipements, garanties

nom: Interventions
nom_pluriel: Interventions
icone: wrench
menu: SAV
description: "SAV: interventions, maintenances, équipements, garanties"
ordre_menu: 1

champs:
  # ==========================================================================
  # IDENTIFICATION
  # ==========================================================================
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "INT-{AAAA}{MM}-{####}"

  - nom: type_fiche
    type: select
    libelle: "Type"
    options:
      - INTERVENTION
      - MAINTENANCE
      - EQUIPEMENT
      - GARANTIE
    defaut: INTERVENTION

  - nom: type_intervention
    type: select
    libelle: "Type intervention"
    options:
      - DEPANNAGE
      - INSTALLATION
      - MAINTENANCE_PREVENTIVE
      - MAINTENANCE_CURATIVE
      - MISE_EN_SERVICE
      - FORMATION
      - AUDIT
      - AUTRE

  - nom: objet
    type: text
    libelle: "Objet"
    obligatoire: true

  - nom: description
    type: textarea
    libelle: "Description"

  # ==========================================================================
  # CLIENT
  # ==========================================================================
  - nom: client_id
    type: relation
    libelle: "Client"
    relation: clients
    obligatoire: true

  - nom: donneur_ordre_id
    type: relation
    libelle: "Donneur d'ordre"
    relation: donneur_ordre

  - nom: numero_os
    type: text
    libelle: "N° OS"
    description: "Numéro d'ordre de service"

  - nom: facture_a_id
    type: relation
    libelle: "Facturé à"
    relation: clients

  - nom: contact_nom
    type: text
    libelle: "Contact"

  - nom: contact_telephone
    type: tel
    libelle: "Téléphone"

  - nom: contact_email
    type: email
    libelle: "Email"

  # ==========================================================================
  # SITE D'INTERVENTION
  # ==========================================================================
  - nom: adresse_intervention
    type: textarea
    libelle: "Adresse"

  - nom: code_postal
    type: text
    libelle: "Code postal"

  - nom: ville
    type: text
    libelle: "Ville"

  - nom: acces_site
    type: textarea
    libelle: "Accès site"
    description: "Codes, badges, contacts"

  # ==========================================================================
  # ÉQUIPEMENT
  # ==========================================================================
  - nom: equipement_id
    type: text
    libelle: "Équipement"

  - nom: equipement_designation
    type: text
    libelle: "Désignation équipement"

  - nom: equipement_numero_serie
    type: text
    libelle: "N° série"

  - nom: equipement_marque
    type: text
    libelle: "Marque"

  - nom: equipement_modele
    type: text
    libelle: "Modèle"

  - nom: date_installation
    type: date
    libelle: "Date installation"

  - nom: date_mise_service
    type: date
    libelle: "Mise en service"

  # ==========================================================================
  # GARANTIE
  # ==========================================================================
  - nom: sous_garantie
    type: boolean
    libelle: "Sous garantie"
    defaut: false

  - nom: garantie_debut
    type: date
    libelle: "Début garantie"

  - nom: garantie_fin
    type: date
    libelle: "Fin garantie"

  - nom: type_garantie
    type: select
    libelle: "Type garantie"
    options:
      - CONSTRUCTEUR
      - ETENDUE
      - CONTRACTUELLE
      - AUCUNE

  - nom: contrat_maintenance_id
    type: text
    libelle: "Contrat maintenance"

  # ==========================================================================
  # PLANIFICATION
  # ==========================================================================
  - nom: date_demande
    type: datetime
    libelle: "Date demande"

  - nom: date_prevue
    type: datetime
    libelle: "Date prévue"

  - nom: date_debut
    type: datetime
    libelle: "Début réel"

  - nom: date_fin
    type: datetime
    libelle: "Fin réelle"

  - nom: duree_prevue
    type: number
    libelle: "Durée prévue (h)"

  - nom: duree_reelle
    type: number
    libelle: "Durée réelle (h)"

  - nom: temps_trajet
    type: number
    libelle: "Temps trajet (h)"

  # ==========================================================================
  # PRIORITÉ ET SLA
  # ==========================================================================
  - nom: priorite
    type: select
    libelle: "Priorité"
    options:
      - CRITIQUE
      - HAUTE
      - NORMALE
      - BASSE
    defaut: NORMALE

  - nom: urgence
    type: boolean
    libelle: "Urgence"
    defaut: false

  - nom: sla_delai
    type: number
    libelle: "SLA délai (h)"

  - nom: sla_respecte
    type: boolean
    libelle: "SLA respecté"
    defaut: true

  # ==========================================================================
  # TECHNICIEN
  # ==========================================================================
  - nom: technicien_id
    type: relation
    libelle: "Technicien"
    relation: employes

  - nom: equipe
    type: json
    libelle: "Équipe"

  - nom: competences_requises
    type: tags
    libelle: "Compétences requises"

  # ==========================================================================
  # DIAGNOSTIC
  # ==========================================================================
  - nom: symptome
    type: textarea
    libelle: "Symptôme"

  - nom: diagnostic
    type: textarea
    libelle: "Diagnostic"

  - nom: cause
    type: text
    libelle: "Cause"

  - nom: code_panne
    type: text
    libelle: "Code panne"

  # ==========================================================================
  # TRAVAUX RÉALISÉS
  # ==========================================================================
  - nom: travaux_realises
    type: textarea
    libelle: "Travaux réalisés"

  - nom: pieces_changees
    type: json
    libelle: "Pièces changées"

  - nom: recommandations
    type: textarea
    libelle: "Recommandations"

  - nom: intervention_suivante
    type: text
    libelle: "Intervention suivante"

  # ==========================================================================
  # PIÈCES ET FOURNITURES
  # ==========================================================================
  - nom: pieces
    type: json
    libelle: "Pièces"

  - nom: montant_pieces
    type: money
    libelle: "Montant pièces"

  - nom: fournitures
    type: json
    libelle: "Fournitures"

  - nom: montant_fournitures
    type: money
    libelle: "Montant fournitures"

  # ==========================================================================
  # MAIN D'ŒUVRE
  # ==========================================================================
  - nom: heures_mo
    type: number
    libelle: "Heures MO"

  - nom: taux_horaire
    type: money
    libelle: "Taux horaire"

  - nom: montant_mo
    type: money
    libelle: "Montant MO"

  - nom: majoration
    type: number
    libelle: "Majoration (%)"
    description: "Nuit, weekend, férié"

  # ==========================================================================
  # DÉPLACEMENTS
  # ==========================================================================
  - nom: km_parcourus
    type: number
    libelle: "Km parcourus"

  - nom: indemnite_km
    type: money
    libelle: "Indemnité km"

  - nom: frais_deplacement
    type: money
    libelle: "Frais déplacement"

  - nom: frais_hebergement
    type: money
    libelle: "Hébergement"

  # ==========================================================================
  # FACTURATION
  # ==========================================================================
  - nom: facturable
    type: boolean
    libelle: "Facturable"
    defaut: true

  - nom: montant_ht
    type: money
    libelle: "Montant HT"

  - nom: tva
    type: money
    libelle: "TVA"

  - nom: montant_ttc
    type: money
    libelle: "Montant TTC"

  - nom: facture_id
    type: text
    libelle: "Facture"

  - nom: facture
    type: boolean
    libelle: "Facturé"
    defaut: false

  # ==========================================================================
  # RAPPORT
  # ==========================================================================
  - nom: rapport_intervention
    type: textarea
    libelle: "Rapport"

  - nom: photos
    type: json
    libelle: "Photos"

  - nom: signature_client
    type: text
    libelle: "Signature client"

  - nom: date_signature
    type: datetime
    libelle: "Date signature"

  - nom: nom_signataire
    type: text
    libelle: "Nom signataire"

  - nom: pdf_rapport
    type: text
    libelle: "PDF rapport"

  - nom: envoye_client
    type: boolean
    libelle: "Envoyé client"
    defaut: false

  # ==========================================================================
  # SATISFACTION
  # ==========================================================================
  - nom: satisfaction_score
    type: number
    libelle: "Satisfaction"

  - nom: satisfaction_commentaire
    type: textarea
    libelle: "Commentaire"

  # ==========================================================================
  # MAINTENANCE PRÉVENTIVE
  # ==========================================================================
  - nom: est_preventive
    type: boolean
    libelle: "Préventive"
    defaut: false

  - nom: frequence_maintenance
    type: select
    libelle: "Fréquence"
    options:
      - MENSUELLE
      - TRIMESTRIELLE
      - SEMESTRIELLE
      - ANNUELLE

  - nom: prochaine_maintenance
    type: date
    libelle: "Prochaine maintenance"

  - nom: checklist
    type: json
    libelle: "Checklist"

  # ==========================================================================
  # STATUT
  # ==========================================================================
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - DEMANDE
      - PLANIFIEE
      - EN_COURS
      - TERMINEE
      - A_FACTURER
      - FACTUREE
      - ANNULEE
    defaut: DEMANDE

  - nom: notes
    type: textarea
    libelle: "Notes"

# Index
index:
  - numero
  - client_id
  - technicien_id
  - type_fiche
  - statut
  - date_prevue

recherche:
  - numero
  - objet
  - client_id
  - equipement_numero_serie

affichage_liste:
  - numero
  - client_id
  - donneur_ordre_id
  - numero_os
  - type_intervention
  - objet
  - date_prevue
  - priorite
  - statut

workflow:
  DEMANDE -> PLANIFIEE: "Planifier"
  PLANIFIEE -> EN_COURS: "Démarrer"
  EN_COURS -> TERMINEE: "Terminer"
  TERMINEE -> A_FACTURER: null
  A_FACTURER -> FACTUREE: null
  DEMANDE -> ANNULEE: "Annuler"
  PLANIFIEE -> ANNULEE: "Annuler"

actions:
  - planifier
  - affecter_technicien
  - demarrer
  - terminer
  - generer_rapport
  - faire_signer
  - envoyer_rapport
  - facturer
  - planifier_preventive
