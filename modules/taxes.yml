# =============================================================================
# AZALPLUS - Module Taxes / TVA
# =============================================================================
# Gestion complete des taxes (TVA et autres) pour les documents commerciaux.
# Compatible avec la facturation electronique (Factur-X, Chorus Pro).

nom: Taxes
icone: percent
menu: Configuration

champs:
  # Identification
  - nom: code
    type: text
    obligatoire: true
    unique: true
    description: "Code taxe unique (ex: TVA20, TVA10, TVA55, TVA0)"
    validation:
      pattern: "^[A-Z0-9_]{2,20}$"
      message: "Code en majuscules, chiffres et underscore uniquement"
    autocompletion: true

  - nom: nom
    type: text
    obligatoire: true
    description: "Nom d'affichage (ex: TVA 20%, TVA 10% Restauration)"
    autocompletion: true

  - nom: description
    type: textarea
    obligatoire: false
    description: Description detaillee de l'application de cette taxe

  # Taux et type
  - nom: taux
    type: number
    obligatoire: true
    defaut: 20
    min: 0
    max: 100
    precision: 2
    description: Taux de la taxe (en %)

  - nom: type
    type: select
    obligatoire: true
    defaut: pourcentage
    options: [pourcentage, montant_fixe]
    description: Type de calcul de la taxe

  - nom: montant_fixe
    type: number
    obligatoire: false
    precision: 2
    description: Montant fixe (si type = montant_fixe)
    visible_si: "type == 'montant_fixe'"

  # Comportement
  - nom: inclus_prix
    type: boolean
    obligatoire: false
    defaut: false
    description: Taxe incluse dans le prix de vente (TTC vs HT)

  - nom: deductible
    type: boolean
    obligatoire: false
    defaut: true
    description: Taxe deductible (pour les achats)

  - nom: collectee
    type: boolean
    obligatoire: false
    defaut: true
    description: Taxe collectee (pour les ventes)

  # Comptabilite
  - nom: compte_collecte
    type: text
    obligatoire: false
    defaut: "44571"
    description: Compte comptable TVA collectee (ventes)
    autocompletion: true

  - nom: compte_deductible
    type: text
    obligatoire: false
    defaut: "44566"
    description: Compte comptable TVA deductible (achats)
    autocompletion: true

  - nom: compte_intracommunautaire
    type: text
    obligatoire: false
    defaut: "44572"
    description: Compte comptable TVA intracommunautaire
    autocompletion: true

  - nom: compte_importation
    type: text
    obligatoire: false
    defaut: "44562"
    description: Compte comptable TVA importation
    autocompletion: true

  # Facturation electronique (Factur-X / Chorus Pro)
  - nom: code_categorie_tax
    type: select
    obligatoire: false
    defaut: S
    options: [S, Z, E, AE, K, G, O, L, M]
    description: |
      Code categorie TVA (EN16931):
      S = Standard
      Z = Zero (TVA applicable mais taux 0)
      E = Exempt (Exonere)
      AE = Autoliquidation
      K = Intracommunautaire
      G = Export hors UE
      O = Non soumis TVA
      L = Taxes Canaries
      M = Taxes Ceuta/Melilla

  - nom: code_exemption
    type: text
    obligatoire: false
    description: Code d'exoneration (art. 293 B CGI, etc.)
    autocompletion: true

  - nom: mention_legale
    type: textarea
    obligatoire: false
    description: Mention legale a afficher sur les factures

  # Application
  - nom: pays
    type: select
    obligatoire: false
    defaut: FR
    options: [FR, BE, CH, LU, DE, ES, IT, PT, GB, AUTRE]
    description: Pays d'application

  - nom: zone
    type: select
    obligatoire: false
    defaut: france_metropolitaine
    options: [france_metropolitaine, dom, corse, monaco, ue, hors_ue]
    description: Zone geographique d'application

  - nom: applicable_ventes
    type: boolean
    obligatoire: false
    defaut: true
    description: Applicable aux ventes

  - nom: applicable_achats
    type: boolean
    obligatoire: false
    defaut: true
    description: Applicable aux achats

  # Dates de validite
  - nom: date_debut
    type: date
    obligatoire: false
    description: Date de debut de validite

  - nom: date_fin
    type: date
    obligatoire: false
    description: Date de fin de validite

  # Statut
  - nom: actif
    type: boolean
    obligatoire: false
    defaut: true
    description: Taxe active et utilisable

  - nom: defaut_vente
    type: boolean
    obligatoire: false
    defaut: false
    description: Taxe par defaut pour les ventes

  - nom: defaut_achat
    type: boolean
    obligatoire: false
    defaut: false
    description: Taxe par defaut pour les achats

  # Ordre d'affichage
  - nom: ordre
    type: number
    obligatoire: false
    defaut: 0
    description: Ordre d'affichage dans les listes

  # Metadonnees
  - nom: created_by
    type: relation
    obligatoire: false
    relation: Utilisateurs
    autocompletion: true

  - nom: created_at
    type: datetime
    obligatoire: false

  - nom: updated_at
    type: datetime
    obligatoire: false

# Donnees par defaut (France)
