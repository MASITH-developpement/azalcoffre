# =============================================================================
# WORKFLOW
# =============================================================================
# Définition des transitions d'état autorisées
#
# SYNTAXE:
# --------
# ÉTAT_SOURCE -> ÉTAT_CIBLE: "Libellé action"
# ÉTAT_SOURCE -> ÉTAT_CIBLE: null                 (transition automatique)
# ÉTAT_SOURCE -> ÉTAT_CIBLE: si condition         (transition conditionnelle)
# ÉTAT_SOURCE -> ÉTAT_CIBLE: action nom_action    (exécute une action)
#
# ÉTATS RECOMMANDÉS (adapter selon module):
# -----------------------------------------
# Documents: BROUILLON → VALIDÉ → ENVOYÉ → ACCEPTÉ/REFUSÉ → ARCHIVÉ
# Processus: À_FAIRE → EN_COURS → TERMINÉ → ARCHIVÉ
# Ressources: ACTIF → INACTIF → ARCHIVÉ
#
# RÉFÉRENCER UN WORKFLOW GLOBAL:
# workflow: $workflows.{nom_workflow}

workflow:
  BROUILLON -> EN_ATTENTE: "Soumettre"
  EN_ATTENTE -> VALIDE: "Valider"
  EN_ATTENTE -> REFUSE: "Refuser"
  VALIDE -> EN_COURS: null                        # Transition automatique
  EN_COURS -> TERMINE: "Terminer"
  TERMINE -> ARCHIVE: null
  BROUILLON -> ANNULE: "Annuler"
  EN_ATTENTE -> ANNULE: "Annuler"


# =============================================================================
# ACTIONS
# =============================================================================
# Actions disponibles dans l'interface (boutons, menus contextuels)
#
# PROPRIÉTÉS DISPONIBLES:
# -----------------------
# nom             → Identifiant technique (snake_case)
# libelle         → Texte du bouton
# icone           → Icône Lucide
# statut_requis   → Statut(s) requis pour afficher l'action
# ouvre           → Module à ouvrir en création
# prefill         → Champs à pré-remplir ({id} = ID courant)
# confirmation    → true pour demander confirmation
# export          → Format d'export (pdf, csv, xlsx)
# template        → Nom du template pour export
# condition       → Condition d'affichage (expression)

actions:
  # --------------------------------------------------------------------------
  # Action: Créer un document lié
  # --------------------------------------------------------------------------
  - nom: creer_devis
    libelle: "Créer un devis"
    icone: file-text
    ouvre: devis                          # Ouvre le module devis
    prefill:
      client_id: "{client_id}"            # Pré-remplit avec le client actuel
      {champ}_id: "{id}"                  # Pré-remplit avec l'ID courant

  - nom: creer_facture
    libelle: "Créer une facture"
    icone: receipt
    statut_requis: [VALIDE, TERMINE]      # Disponible uniquement si validé/terminé
    ouvre: factures
    prefill:
      client_id: "{client_id}"
      {champ}_id: "{id}"

  # --------------------------------------------------------------------------
  # Action: Changement de statut avec confirmation
  # --------------------------------------------------------------------------
  - nom: valider
    libelle: "Valider"
    icone: check-circle
    statut_requis: BROUILLON
    confirmation: true                    # Demande confirmation

  - nom: annuler
    libelle: "Annuler"
    icone: x-circle
    statut_requis: [BROUILLON, EN_ATTENTE]
    confirmation: true

  # --------------------------------------------------------------------------
  # Action: Communication
  # --------------------------------------------------------------------------
  - nom: envoyer_email
    libelle: "Envoyer par email"
    icone: mail

  - nom: planifier_rdv
    libelle: "Planifier un RDV"
    icone: calendar
    ouvre: planning
    prefill:
      client_id: "{client_id}"
      {champ}_id: "{id}"

  # --------------------------------------------------------------------------
  # Action: Export
  # --------------------------------------------------------------------------
  - nom: exporter_pdf
    libelle: "Exporter en PDF"
    icone: download
    export: pdf
    template: fiche_{module}              # Template Jinja2 à utiliser

  - nom: exporter_excel
    libelle: "Exporter en Excel"
    icone: file-spreadsheet
    export: xlsx

  # --------------------------------------------------------------------------
  # Action: Duplication
  # --------------------------------------------------------------------------
  - nom: dupliquer
    libelle: "Dupliquer"
    icone: copy

  # --------------------------------------------------------------------------
  # Action: Archivage
  # --------------------------------------------------------------------------
  - nom: archiver
    libelle: "Archiver"
    icone: archive
    statut_requis: [TERMINE, ANNULE]
    confirmation: true


# =============================================================================
# ALERTES IA (Marceau)
# =============================================================================
# Règles d'alertes intelligentes analysées par l'IA
#
# SYNTAXE:
# --------
# condition      → Expression SQL/logique évaluée
# condition_sup  → Condition supplémentaire (AND)
# message        → Message affiché (peut être $référence)
# severite       → info | warning | error
#
# VARIABLES DISPONIBLES:
# ----------------------
# Tous les champs du module
# $seuils.xxx (valeurs de constants.yml)
# NOW() pour date courante
# INTERVAL 'X days/months' pour calculs de date

marceau:
  alertes:
    # --------------------------------------------------------------------------
    # Alerte: Échéance proche
    # --------------------------------------------------------------------------
    - condition: date_echeance <= NOW() + INTERVAL '7 days'
      condition_sup: statut NOT IN ('TERMINE', 'ANNULE', 'ARCHIVE')
      message: "Échéance dans moins de 7 jours"
      severite: warning

    # --------------------------------------------------------------------------
    # Alerte: Échéance dépassée
    # --------------------------------------------------------------------------
    - condition: date_echeance < NOW()
      condition_sup: statut NOT IN ('TERMINE', 'ANNULE', 'ARCHIVE')
      message: "Échéance dépassée"
      severite: error

    # --------------------------------------------------------------------------
    # Alerte: Inactivité
    # --------------------------------------------------------------------------
    - condition: derniere_activite < NOW() - INTERVAL '$seuils.inactivite_jours days'
      condition_sup: statut = 'EN_COURS'
      message: $alertes.client_inactif
      severite: info

    # --------------------------------------------------------------------------
    # Alerte: Montant élevé sans validation
    # --------------------------------------------------------------------------
    - condition: montant_ttc > 10000
      condition_sup: statut = 'BROUILLON'
      message: "Document > 10K EUR en attente de validation"
      severite: warning

    # --------------------------------------------------------------------------
    # Alerte: Champ obligatoire manquant
    # --------------------------------------------------------------------------
    - condition: email IS NULL OR email = ''
      message: "Email non renseigné"
      severite: info


