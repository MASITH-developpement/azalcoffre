# AZALPLUS - Module Maintenances
nom: Maintenances
icone: wrench
menu: Equipement

champs:
  - nom: equipement_id
    type: relation
    relation: Equipements
    obligatoire: true
    description: Equipement
    autocompletion: true

  - nom: type
    type: select
    defaut: PREVENTIVE
    options: [PREVENTIVE, CURATIVE, AMELIORATIVE]
    description: Type de maintenance

  - nom: date_planifiee
    type: date
    obligatoire: false
    description: Date planifiee

  - nom: date_realisee
    type: date
    obligatoire: false
    description: Date realisee

  - nom: technicien_id
    type: relation
    relation: Utilisateurs
    obligatoire: false
    description: Technicien
    autocompletion: true

  - nom: description
    type: textarea
    obligatoire: true
    description: Description des travaux

  - nom: pieces_utilisees
    type: textarea
    obligatoire: false
    description: Pieces utilisees

  - nom: cout
    type: number
    obligatoire: false
    description: Cout total

  - nom: statut
    type: select
    defaut: PLANIFIEE
    options: [PLANIFIEE, EN_COURS, TERMINEE, ANNULEE]
    description: Statut

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

workflow:
  "PLANIFIEE -> EN_COURS": "action demarrer"
  "EN_COURS -> TERMINEE": "action terminer"
  "PLANIFIEE -> ANNULEE": "action annuler"
