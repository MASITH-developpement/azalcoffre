# =============================================================================
# AZALPLUS - Module Gestion Immobiliere
# =============================================================================
nom: Immobilier
icone: house
menu: Immobilier
description: Gestion locative

champs:
  - nom: reference
    type: text
    obligatoire: true
    unique: true
    description: Reference bien

  - nom: type
    type: select
    obligatoire: true
    options: [APPARTEMENT, MAISON, LOCAL_COMMERCIAL, BUREAU, PARKING, CAVE, TERRAIN]
    description: Type de bien

  - nom: status
    type: select
    obligatoire: true
    defaut: DISPONIBLE
    options: [DISPONIBLE, LOUE, EN_TRAVAUX, VENDU]
    description: Statut

  - nom: adresse
    type: textarea
    obligatoire: true
    description: Adresse complete

  - nom: code_postal
    type: text
    obligatoire: true
    description: Code postal

  - nom: ville
    type: text
    obligatoire: true
    description: Ville

  - nom: surface
    type: number
    obligatoire: false
    description: Surface (m2)

  - nom: nb_pieces
    type: number
    obligatoire: false
    description: Nombre de pieces

  - nom: etage
    type: text
    obligatoire: false
    description: Etage

  - nom: dpe
    type: select
    obligatoire: false
    options: [A, B, C, D, E, F, G]
    description: DPE

  - nom: loyer_hc
    type: number
    obligatoire: false
    description: Loyer HC

  - nom: charges
    type: number
    obligatoire: false
    description: Charges mensuelles

  - nom: loyer_cc
    type: number
    obligatoire: false
    readonly: true
    description: Loyer CC

  - nom: depot_garantie
    type: number
    obligatoire: false
    description: Depot de garantie

  - nom: date_acquisition
    type: date
    obligatoire: false
    description: Date acquisition

  - nom: prix_acquisition
    type: number
    obligatoire: false
    description: Prix acquisition

  - nom: valeur_actuelle
    type: number
    obligatoire: false
    description: Valeur estimee actuelle

  - nom: locataire_id
    type: relation
    obligatoire: false
    relation: Clients
    description: Locataire actuel

  - nom: date_debut_bail
    type: date
    obligatoire: false
    description: Debut bail

  - nom: date_fin_bail
    type: date
    obligatoire: false
    description: Fin bail

  - nom: type_bail
    type: select
    obligatoire: false
    options: [VIDE, MEUBLE, COMMERCIAL, PROFESSIONNEL]
    description: Type de bail

  - nom: revenus_annuels
    type: number
    obligatoire: false
    readonly: true
    description: Revenus annuels

  - nom: charges_annuelles
    type: number
    obligatoire: false
    readonly: true
    description: Charges annuelles

  - nom: rendement
    type: number
    obligatoire: false
    readonly: true
    description: Rendement (%)

  - nom: photos
    type: json
    obligatoire: false
    description: Photos

  - nom: documents
    type: json
    obligatoire: false
    description: Documents (bail, diagnostics)

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

actions:
  - generer_quittance
  - revision_loyer
  - etat_des_lieux
  - regularisation_charges
  - generer_declaration_2044

marceau:
  alertes:
    - si date_fin_bail < aujourd'hui + 90 jours: "Bail arrive a echeance"
    - si status = LOUE et locataire_id = null: "Bien loue sans locataire renseigne"
