# =============================================================================
# SYSTÈME
# =============================================================================
systeme:
  version: "1.0.0"
  nom: "AZALPLUS"
  description: "ERP No-Code Multi-Tenant"
  tenant_systeme: "00000000-0000-0000-0000-000000000000"

  jwt:
    algorithme: HS256
    expire_minutes: 1440
    refresh_expire_jours: 7

  totp:
    expire_minutes: 5
    longueur: 6

  styles: [odoo, axo, penny, sage]
  ambiances: [energique, calme, premium, corporate]

# =============================================================================
# RGPD
# =============================================================================
rgpd:
  types_demande: [ACCES, PORTABILITE, EFFACEMENT, RECTIFICATION, LIMITATION, OPPOSITION]
  types_consentement: [MARKETING_EMAIL, MARKETING_SMS, MARKETING_TEL, TRAITEMENT_DONNEES, PROFILAGE, NEWSLETTER, COOKIES]
  sources_consentement: [FORMULAIRE_WEB, EMAIL, TELEPHONE, PORTAIL_CLIENT, IMPORT, API]
  delai_reponse_jours: 30
  retention_logs_mois: 36

# =============================================================================
# MÉTHODES D'AMORTISSEMENT (immobilisations)
# =============================================================================
amortissements:
  methodes:
    - {code: LINEAIRE, nom: "Linéaire", description: "Amortissement constant sur la durée"}
    - {code: DEGRESSIF, nom: "Dégressif", description: "Amortissement accéléré au début"}
    - {code: UNITES_PRODUCTION, nom: "Unités de production", description: "Basé sur l'utilisation"}
    - {code: EXCEPTIONNEL, nom: "Exceptionnel", description: "Amortissement ponctuel"}
  defaut: LINEAIRE

# =============================================================================
# CATÉGORIES IMMOBILISATIONS
# =============================================================================
categories_immobilisations:
  - {code: TERRAIN, nom: "Terrains", duree_amortissement: 0}
  - {code: CONSTRUCTION, nom: "Constructions", duree_amortissement: 25}
  - {code: MATERIEL_INDUSTRIEL, nom: "Matériel industriel", duree_amortissement: 10}
  - {code: MATERIEL_TRANSPORT, nom: "Matériel de transport", duree_amortissement: 5}
  - {code: MATERIEL_BUREAU, nom: "Matériel de bureau", duree_amortissement: 5}
  - {code: MATERIEL_INFORMATIQUE, nom: "Matériel informatique", duree_amortissement: 3}
  - {code: MOBILIER, nom: "Mobilier", duree_amortissement: 10}
  - {code: LOGICIEL, nom: "Logiciels", duree_amortissement: 3}
  - {code: BREVET, nom: "Brevets", duree_amortissement: 20}

# =============================================================================
# FORMATS IMPORT BANCAIRE
# =============================================================================
formats_import_bancaire:
  - {code: OFX, nom: "Open Financial Exchange", extension: ofx}
  - {code: QIF, nom: "Quicken Interchange Format", extension: qif}
  - {code: CSV, nom: "CSV générique", extension: csv}
  - {code: MT940, nom: "SWIFT MT940", extension: sta}
  - {code: CAMT053, nom: "ISO 20022 camt.053", extension: xml}
