# =============================================================================
# AZALPLUS - Base de Connaissances Stack Technique AZAL
# =============================================================================
# Technologies utilisees dans la suite AZAL (AZALPLUS, AZALCOFFRE, etc.)
#
# Stack :
#   - FastAPI (API REST)
#   - SQLAlchemy 2.0 (ORM)
