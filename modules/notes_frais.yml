# =============================================================================
# AZALPLUS - Module Notes de Frais (Expense Reports)
# =============================================================================
# Gestion des notes de frais des employes avec workflow d'approbation.
# Les lignes de frais sont definies dans le module lignes_frais.yml
# =============================================================================

nom: Notes de Frais
icone: wallet
menu: Ressources Humaines
description: Gestion des notes de frais et remboursements

champs:
  # Identification
  - nom: numero
    type: text
    obligatoire: true
    auto: true
    format: "NF-{AAAA}-{####}"
    description: Numero de la note de frais (auto-genere)

  # Relation employe
  - nom: employe_id
    type: relation
    obligatoire: true
    relation: Employes
    description: Employe demandeur
    autocompletion: true

  # Dates
  - nom: date_soumission
    type: date
    obligatoire: false
    description: Date de soumission de la note

  - nom: periode_debut
    type: date
    obligatoire: true
    description: Date de debut de la periode de frais

  - nom: periode_fin
    type: date
    obligatoire: true
    description: Date de fin de la periode de frais

  # Montants (calcules depuis les lignes)
  - nom: total_ht
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    precision: 2
    calcul: "somme(lignes.montant)"
    description: Total HT (somme des lignes)

  - nom: total_tva
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    precision: 2
    calcul: "somme(lignes.tva)"
    description: Total TVA (somme des lignes)

  - nom: total
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    precision: 2
    calcul: "total_ht + total_tva"
    description: Total TTC

  - nom: total_remboursable
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    precision: 2
    calcul: "somme(lignes.montant) WHERE lignes.remboursable = true"
    description: Total remboursable (lignes marquees remboursables)

  - nom: nombre_lignes
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    calcul: "compte(lignes)"
    description: Nombre de lignes de frais

  - nom: nombre_justificatifs
    type: number
    obligatoire: false
    defaut: 0
    readonly: true
    calcul: "compte(lignes) WHERE lignes.justificatif IS NOT NULL"
    description: Nombre de justificatifs attaches

  # Devise
  - nom: devise
    type: relation
    obligatoire: false
    relation: Devises
    defaut: EUR
    description: Devise de la note de frais
    autocompletion: true

  # Statut et workflow
  - nom: statut
    type: select
    obligatoire: true
    defaut: BROUILLON
    options: [BROUILLON, SOUMIS, EN_REVISION, APPROUVE, REJETE, REMBOURSE, ANNULE]
    description: |
      Statut de la note de frais:
      - BROUILLON: En cours de creation par l'employe
      - SOUMIS: Soumis pour approbation
      - EN_REVISION: En attente de modifications par l'employe
      - APPROUVE: Approuve par le manager
      - REJETE: Rejete definitivement
      - REMBOURSE: Remboursement effectue
      - ANNULE: Annulee par l'employe

  # Approbation
  - nom: approuve_par
    type: relation
    obligatoire: false
    relation: Employes
    description: Manager qui a approuve la note
    autocompletion: true

  - nom: date_approbation
    type: datetime
    obligatoire: false
    description: Date et heure de l'approbation

  - nom: commentaire_approbation
    type: textarea
    obligatoire: false
    description: Commentaire du manager lors de l'approbation

  # Rejet
  - nom: motif_rejet
    type: textarea
    obligatoire: false
    description: Motif du rejet (obligatoire si rejete)

  - nom: date_rejet
    type: datetime
    obligatoire: false
    description: Date et heure du rejet

  - nom: rejete_par
    type: relation
    obligatoire: false
    relation: Employes
    description: Manager qui a rejete la note
    autocompletion: true

  # Revision
  - nom: commentaire_revision
    type: textarea
    obligatoire: false
    description: Commentaires demandant des modifications

  - nom: date_demande_revision
    type: datetime
    obligatoire: false
    description: Date de la demande de revision

  # Remboursement
  - nom: date_remboursement
    type: date
    obligatoire: false
    description: Date du remboursement effectif

  - nom: reference_virement
    type: text
    obligatoire: false
    description: Reference du virement de remboursement
    autocompletion: true

  - nom: rembourse_par
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Utilisateur finance qui a traite le remboursement
    autocompletion: true

  - nom: montant_rembourse
    type: number
    obligatoire: false
    defaut: 0
    precision: 2
    description: Montant effectivement rembourse

  # Commentaires
  - nom: commentaires
    type: textarea
    obligatoire: false
    description: Commentaires de l'employe

  - nom: notes_internes
    type: textarea
    obligatoire: false
    description: Notes internes (visibles uniquement par finance/RH)

  # Projet/Mission (optionnel)
  - nom: projet_id
    type: relation
    obligatoire: false
    relation: Projets
    description: Projet lie (pour imputation comptable)
    autocompletion: true

  - nom: mission
    type: text
    obligatoire: false
    description: Description de la mission
    autocompletion: true

  # Centre de cout
  - nom: centre_cout
    type: text
    obligatoire: false
    description: Centre de cout pour imputation comptable
    autocompletion: true

  # Documents
  - nom: recapitulatif_pdf
    type: text
    obligatoire: false
    description: URL du PDF recapitulatif genere

  # Metadonnees
  - nom: created_by
    type: relation
    obligatoire: false
    relation: Utilisateurs
    autocompletion: true

  - nom: created_at
    type: datetime
    obligatoire: false

  - nom: updated_at
    type: datetime
    obligatoire: false

# =============================================================================
# Lignes de frais (relation definie dans lignes_frais.yml)
# =============================================================================
lignes:
  module: LignesFrais
  relation: note_id
  description: Lignes de depenses de cette note de frais

# =============================================================================
# Workflow de validation
# =============================================================================
workflow:
  # Employe soumet sa note
  BROUILLON -> SOUMIS:
    action: soumettre
    conditions:
      - lignes.count > 0
      - periode_debut <= periode_fin
    effets:
      - date_soumission = maintenant

  # Manager approuve
  SOUMIS -> APPROUVE:
    action: approuver
    role: manager
    conditions:
      - approuve_par IS NOT NULL
    effets:
      - date_approbation = maintenant

  # Manager demande des modifications
  SOUMIS -> EN_REVISION:
    action: demander_revision
    role: manager
    conditions:
      - commentaire_revision IS NOT NULL
    effets:
      - date_demande_revision = maintenant

  # Employe resoumet apres modifications
  EN_REVISION -> SOUMIS:
    action: resoumettre
    conditions:
      - lignes.count > 0

  # Manager rejette
  SOUMIS -> REJETE:
    action: rejeter
    role: manager
    conditions:
      - motif_rejet IS NOT NULL
    effets:
      - date_rejet = maintenant

  # Finance effectue le remboursement
  APPROUVE -> REMBOURSE:
    action: rembourser
    role: finance
    conditions:
      - montant_rembourse > 0
      - date_remboursement IS NOT NULL
    effets:
      - statut = REMBOURSE

  # Annulation par l'employe (avant approbation)
  BROUILLON -> ANNULE:
    action: annuler

  SOUMIS -> ANNULE:
    action: annuler
    role: employe

  EN_REVISION -> ANNULE:
    action: annuler
    role: employe

# =============================================================================
# Actions disponibles
# =============================================================================
actions:
  - soumettre
  - approuver
  - rejeter
  - demander_revision
  - resoumettre
  - rembourser
  - annuler
  - generer_pdf
  - dupliquer
  - ajouter_ligne
  - voir_lignes
  - exporter

# =============================================================================
# Vues et filtres
# =============================================================================
vues:
  # Vue employe: Mes notes de frais
  mes_notes:
    nom: "Mes notes de frais"
    filtre: "employe_id = utilisateur_courant.employe_id"
    tri: "-created_at"
    colonnes: [numero, periode_debut, periode_fin, total, statut]

  # Vue manager: Notes a approuver
  a_approuver:
    nom: "A approuver"
    filtre: "statut = SOUMIS AND employe_id.manager = utilisateur_courant.employe_id"
    tri: "-date_soumission"
    colonnes: [numero, employe_id, periode_debut, periode_fin, total, date_soumission]
    role: manager

  # Vue finance: A rembourser
  a_rembourser:
    nom: "A rembourser"
    filtre: "statut = APPROUVE"
    tri: "date_approbation"
    colonnes: [numero, employe_id, total_remboursable, date_approbation, approuve_par]
    role: finance

  # Vue finance: Historique remboursements
  rembourses:
    nom: "Rembourses"
    filtre: "statut = REMBOURSE"
    tri: "-date_remboursement"
    colonnes: [numero, employe_id, montant_rembourse, date_remboursement, reference_virement]
    role: finance

# =============================================================================
# Permissions
# =============================================================================
permissions:
  employe:
    - creer (ses propres notes)
    - modifier (ses notes en BROUILLON ou EN_REVISION)
    - voir (ses notes)
    - soumettre
    - annuler (ses notes avant APPROUVE)

  manager:
    - voir (notes de son equipe)
    - approuver
    - rejeter
    - demander_revision

  finance:
    - voir (toutes les notes)
    - rembourser
    - exporter

  admin:
    - tout

# =============================================================================
# IA Marceau
# =============================================================================
marceau:
  alertes:
    - si statut=SOUMIS et date_soumission < maintenant - 5j: "Note de frais en attente d'approbation depuis plus de 5 jours"
    - si statut=APPROUVE et date_approbation < maintenant - 10j: "Note approuvee en attente de remboursement depuis plus de 10 jours"
    - si statut=EN_REVISION et date_demande_revision < maintenant - 7j: "Note en revision depuis plus de 7 jours"
    - si nombre_justificatifs < nombre_lignes: "Justificatifs manquants pour certaines lignes"
    - si total > 1000 et statut=SOUMIS: "Note de frais superieure a 1000 EUR - verification recommandee"

  suggestions:
    - "Traiter les notes de frais en attente d'approbation"
    - "Effectuer les remboursements des notes approuvees"
    - "Relancer les employes pour les justificatifs manquants"
    - "Verifier les notes avec des montants eleves"

  kpis:
    - nom: "Notes en attente d'approbation"
      calcul: "compte(statut = SOUMIS)"
      format: "nombre"
      alerte_si: "> 10"

    - nom: "Montant a rembourser"
      calcul: "somme(total_remboursable) WHERE statut = APPROUVE"
      format: "monnaie"

    - nom: "Delai moyen d'approbation"
      calcul: "moyenne(DATEDIFF(date_approbation, date_soumission)) WHERE statut IN [APPROUVE, REMBOURSE]"
      format: "jours"

    - nom: "Delai moyen de remboursement"
      calcul: "moyenne(DATEDIFF(date_remboursement, date_approbation)) WHERE statut = REMBOURSE"
      format: "jours"

    - nom: "Total rembourse (mois)"
      calcul: "somme(montant_rembourse) WHERE date_remboursement >= debut_mois"
      format: "monnaie"

