nom: Waitlist
icone: users
menu: Système
description: Liste d'attente pré-lancement AZALPLUS
acces: createur_only

champs:
  - nom: email
    type: email
    groupe: Contact
    obligatoire: true
    unique: true
    label: "Email"

  - nom: prenom
    type: text
    groupe: Informations
    obligatoire: true
    label: "Prénom"

  - nom: activite
    type: select
    groupe: Informations
    options:
      - Artisan
      - Commerçant
      - Indépendant / Freelance
      - TPE (1-10 salariés)
      - Autre
    label: "Activité"

  - nom: source
    type: select
    groupe: Informations
    options:
      - Ami
      - LinkedIn
      - Facebook
      - Groupe Zaliers
      - CMA (Chambre de Métiers)
      - CCI (Chambre de Commerce)
      - BGE
      - Initiative France
      - Réseau Entreprendre
      - Pôle Emploi
      - Bouche à oreille
      - Recherche Google
      - Autre
    label: "Comment nous avez-vous connu ?"

  - nom: ami_email
    type: email
    groupe: Contact
    label: "Email de l'ami (parrainage)"
    description: "Pour remercier l'ami qui a recommandé AZALPLUS"

  - nom: utm_source
    type: text
    groupe: Informations
    label: "UTM Source"

  - nom: utm_campaign
    type: text
    groupe: Informations
    label: "UTM Campaign"

  - nom: utm_content
    type: text
    groupe: Informations
    label: "UTM Content"

  - nom: inscrit_le
    type: datetime
    groupe: Dates
    auto: now
    label: "Date d'inscription"

  - nom: converti
    type: boolean
    groupe: Informations
    defaut: false
    label: "Compte créé"

  - nom: notes
    type: textarea
    groupe: Notes
    label: "Notes"
