# AZALPLUS - Module Equipements
nom: Equipements
icone: tool
menu: Equipement

champs:
  - nom: code
    type: text
    obligatoire: true
    description: Code equipement
    autocompletion: true

  - nom: nom
    type: text
    obligatoire: true
    description: Nom
    autocompletion: true

  - nom: numero_serie
    type: text
    obligatoire: false
    description: Numero de serie
    autocompletion: true

  - nom: marque
    type: text
    obligatoire: false
    description: Marque
    autocompletion: true

  - nom: modele
    type: text
    obligatoire: false
    description: Modele
    autocompletion: true

  - nom: categorie
    type: text
    obligatoire: false
    description: Categorie
    autocompletion: true

  - nom: date_achat
    type: date
    obligatoire: false
    description: Date achat

  - nom: date_mise_service
    type: date
    obligatoire: false
    description: Date mise en service

  - nom: date_fin_garantie
    type: date
    obligatoire: false
    description: Date fin garantie

  - nom: fournisseur_id
    type: relation
    relation: Fournisseurs
    obligatoire: false
    description: Fournisseur
    autocompletion: true

  - nom: client_id
    type: relation
    relation: Clients
    obligatoire: false
    description: Client assigne
    autocompletion: true

  - nom: emplacement
    type: text
    obligatoire: false
    description: Emplacement
    autocompletion: true

  - nom: statut
    type: select
    defaut: ACTIF
    options: [ACTIF, EN_MAINTENANCE, HORS_SERVICE, VENDU]
    description: Statut

  - nom: valeur_achat
    type: number
    obligatoire: false
    description: Valeur achat

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

actions:
  - planifier_maintenance
  - voir_historique
