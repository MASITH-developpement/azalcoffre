# AZALPLUS - Module Clients
nom: Clients
icone: users
menu: Commercial
description: Gestion des clients et prospects

champs:
  # Identification
  - nom: code
    type: text
    obligatoire: true
    description: Code client unique
    autocompletion: true

  - nom: name
    type: text
    obligatoire: true
    description: Nom du client
    autocompletion: true

  - nom: legal_name
    type: text
    obligatoire: false
    description: Raison sociale
    autocompletion: true

  - nom: adresse1
    type: text
    obligatoire: false
    description: Adresse ligne 1
    autocompletion: true
    groupe: identification

  - nom: adresse2
    type: text
    obligatoire: false
    description: Adresse ligne 2
    autocompletion: true
    groupe: identification

  - nom: cp
    type: text
    obligatoire: false
    description: Code postal
    autocompletion: true
    groupe: identification

  - nom: ville
    type: text
    obligatoire: false
    description: Ville
    autocompletion: true
    groupe: identification

  - nom: region
    type: text
    obligatoire: false
    description: Region
    autocompletion: true
    groupe: identification

  - nom: pays
    type: text
    obligatoire: false
    description: Pays
    defaut: France
    autocompletion: true
    groupe: identification

  - nom: type
    type: select
    obligatoire: false
    defaut: PROSPECT
    options: [PROSPECT, LEAD, CUSTOMER, VIP, PARTNER, CHURNED, SUPPLIER]
    description: Type de client/fournisseur

  # Contact principal
  - nom: civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite du contact principal

  - nom: contact_name
    type: text
    obligatoire: false
    description: Nom du contact principal
    autocompletion: true

  - nom: email
    type: email
    obligatoire: false
    autocompletion: true

  - nom: phone
    type: tel
    obligatoire: false

  - nom: mobile
    type: tel
    obligatoire: false

  - nom: website
    type: text
    obligatoire: false
    autocompletion: true


  # Informations legales
  - nom: tax_id
    type: text
    obligatoire: false
    description: Numero TVA intracommunautaire
    autocompletion: true

  - nom: registration_number
    type: text
    obligatoire: false
    description: SIRET/SIREN
    autocompletion: true

  - nom: legal_form
    type: text
    obligatoire: false
    description: Forme juridique (SARL, SAS, etc.)
    autocompletion: true

  # Commercial
  - nom: assigned_to
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Commercial assigne
    autocompletion: true

  - nom: industry
    type: text
    obligatoire: false
    description: Secteur d'activite
    autocompletion: true

  - nom: size
    type: select
    obligatoire: false
    options: [TPE, PME, ETI, GE]
    description: Taille de l'entreprise

  - nom: annual_revenue
    type: number
    obligatoire: false
    description: CA annuel

  - nom: employee_count
    type: number
    obligatoire: false
    description: Nombre d'employes

  # Conditions commerciales
  - nom: payment_terms
    type: select
    obligatoire: false
    defaut: NET_30
    options: [IMMEDIATE, NET_15, NET_30, NET_45, NET_60, NET_90, END_OF_MONTH, CUSTOM]
    description: Conditions de paiement

  - nom: payment_method
    type: select
    obligatoire: false
    options: [BANK_TRANSFER, CHECK, CREDIT_CARD, CASH, DIRECT_DEBIT, PAYPAL, OTHER]
    description: Methode de paiement preferee

  - nom: credit_limit
    type: number
    obligatoire: false
    defaut: 0
    description: Limite de credit accordee au client

  - nom: solde_credit
    type: number
    obligatoire: false
    defaut: 0
    description: Solde du compte client

  - nom: bloquer_si_depassement
    type: boolean
    obligatoire: false
    defaut: false
    description: Bloquer la facturation si depassement limite

  - nom: currency
    type: relation
    obligatoire: false
    relation: Devises
    defaut: EUR
    description: Devise par defaut
    autocompletion: true

  - nom: discount_rate
    type: number
    obligatoire: false
    defaut: 0
    description: Remise globale (%)

  # Classification
  - nom: tags
    type: tags
    obligatoire: false
    description: Tags pour filtrage

  - nom: segment
    type: text
    obligatoire: false
    description: Segment marketing
    autocompletion: true

  - nom: source
    type: text
    obligatoire: false
    description: Source acquisition
    autocompletion: true

  # Scoring
  - nom: lead_score
    type: number
    obligatoire: false
    defaut: 0
    description: Score prospect (0-100)

  - nom: health_score
    type: number
    obligatoire: false
    defaut: 100
    description: Score sante client (0-100)

  # Statistiques
  - nom: total_revenue
    type: number
    obligatoire: false
    defaut: 0
    description: CA total cumule

  - nom: order_count
    type: number
    obligatoire: false
    defaut: 0
    description: Nombre de commandes

  - nom: last_order_date
    type: date
    obligatoire: false
    description: Date derniere commande

  - nom: first_order_date
    type: date
    obligatoire: false
    description: Date premiere commande

  # Notes
  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes visibles

  - nom: internal_notes
    type: textarea
    obligatoire: false
    description: Notes internes

  # Metadonnees
  - nom: is_active
    type: boolean
    obligatoire: false
    defaut: true
    description: Client actif

# Sous-entite: Contact
contacts:
  champs:
    - nom: civilite
      type: select
      obligatoire: false
      options: [Mr, Mme, Melle]
      description: Civilite

    - nom: first_name
      type: text
      obligatoire: true
      autocompletion: true

    - nom: last_name
      type: text
      obligatoire: true
      autocompletion: true

    - nom: job_title
      type: text
      obligatoire: false
      description: Fonction
      autocompletion: true

    - nom: department
      type: text
      obligatoire: false
      description: Service
      autocompletion: true

    - nom: email
      type: email
      obligatoire: false
      autocompletion: true

    - nom: phone
      type: tel
      obligatoire: false

    - nom: mobile
      type: tel
      obligatoire: false

    - nom: linkedin
      type: text
      obligatoire: false
      autocompletion: true

    - nom: is_primary
      type: boolean
      obligatoire: false
      defaut: false
      description: Contact principal

    - nom: is_billing
      type: boolean
      obligatoire: false
      defaut: false
      description: Contact facturation

    - nom: is_shipping
      type: boolean
      obligatoire: false
      defaut: false
      description: Contact livraison

    - nom: is_decision_maker
      type: boolean
      obligatoire: false
      defaut: false
      description: Decideur

    - nom: preferred_language
      type: text
      obligatoire: false
      defaut: fr
      autocompletion: true

    - nom: preferred_contact_method
      type: select
      obligatoire: false
      options: [email, phone, sms]

    - nom: do_not_call
      type: boolean
      obligatoire: false
      defaut: false

    - nom: do_not_email
      type: boolean
      obligatoire: false
      defaut: false

    - nom: notes
      type: textarea
      obligatoire: false

    - nom: is_active
      type: boolean
      obligatoire: false
      defaut: true

actions:
  - creer_devis
  - creer_facture
  - voir_historique
  - envoyer_email
  - creer_opportunite
  - ajouter_activite
  - voir_releve_compte
  - voir_balance_agee

marceau:
  alertes:
    - si type = PROSPECT et lead_score > 70: "Prospect chaud a contacter"
    - si health_score < 50: "Attention client a risque"
