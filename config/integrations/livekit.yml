# =============================================================================
# AZALPLUS - LiveKit Server Configuration
# =============================================================================
# Configuration pour le serveur LiveKit (WebRTC SFU)
# Documentation: https://docs.livekit.io/guides/deploy/server/config
# =============================================================================

# Logging
logging:
  level: info
  json: true

# API Keys - IMPORTANT: Changer en production!
keys:
  devkey: secret
  # Production: generer avec `livekit-server generate-keys`
  # Exemple: APIxxxxxxxxxxxx: yyyyyyyyyyyyyyyyyyyyyyyyyyy

# Port configuration
port: 7880
bind_addresses:
  - ""

# RTC (WebRTC) configuration
rtc:
  # Port range pour les connexions UDP
  port_range_start: 50000
  port_range_end: 60000

  # Utiliser UDP mux pour reduire les ports necessaires
  use_external_ip: true

  # STUN servers pour NAT traversal
  stun_servers:
    - "stun:stun.l.google.com:19302"
    - "stun:stun1.l.google.com:19302"

  # TCP fallback si UDP bloque
  tcp_fallback_enabled: true

  # ICE configuration
  ice_lite: false

# TURN server configuration (optionnel mais recommande)
turn:
  enabled: false
  # Decommenter pour activer TURN
  # domain: turn.yourdomain.com
  # tls_port: 5349
  # udp_port: 3478
  # external_tls: true
  # cert_file: /path/to/cert.pem
  # key_file: /path/to/key.pem

# Room configuration
room:
  # Fermer automatiquement les rooms vides
  empty_timeout: 300s

  # Duree max d'une room
  max_duration: 8h

  # Participants max par room
  max_participants: 500

  # Activer le chat natif LiveKit
  enable_chat: false

# Audio configuration
audio:
  # Parametres par defaut
  active_speaker_timeout: 1500ms
  smoothing_samples: 20

# Video configuration
video:
  # Qualite par defaut
  dynacast: true

  # Simulcast (plusieurs qualites)
  simulcast:
    enabled: true
    layers:
      - quality: HIGH
        bitrate: 3000000
        width: 1920
        height: 1080
      - quality: MEDIUM
        bitrate: 1000000
        width: 1280
        height: 720
      - quality: LOW
        bitrate: 300000
        width: 640
        height: 360

# Egress (enregistrement)
egress:
  # Activer l'egress
  enabled: true

  # Stockage S3/MinIO
  s3:
    access_key: "${MINIO_ACCESS_KEY}"
    secret: "${MINIO_SECRET_KEY}"
    region: us-east-1
    endpoint: "http://minio:9000"
    bucket: "azalplus-recordings"
    force_path_style: true

  # Ou stockage local
  # file:
  #   output_directory: /recordings

  # Templates de fichier
  file_template: "{room_name}_{time}_{type}"

# Ingress (entree RTMP/WHIP - optionnel)
ingress:
  enabled: false

# Webhook configuration
webhook:
  # URLs pour recevoir les evenements
  urls: []
  # Exemple:
  # - "http://app:8000/api/videoconf/livekit-webhook"

  # Secret pour signer les webhooks
  api_key: devkey

# Redis pour la coordination multi-node (optionnel)
redis:
  address: "redis:6379"
  # password: ""
  # db: 0

# Region (pour multi-region)
region: local

# Node ID (auto-genere si vide)
node_id: ""

# Limite de bande passante par participant (bits/s, 0 = illimite)
limit:
  max_bandwidth_per_participant: 0
  max_bandwidth_per_room: 0

# Prometheus metrics
prometheus:
  enabled: true
  port: 6789
