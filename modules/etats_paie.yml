# =============================================================================
# AZALPLUS - États de Paie
# =============================================================================
# Rapports et états récapitulatifs de la paie

nom: État Paie
nom_pluriel: États Paie
icone: file-bar-chart
menu: Paie
description: "Rapports de paie: livre, journal, récapitulatifs"
ordre_menu: 17

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "EP-{AAAA}{MM}-{###}"

  - nom: type_etat
    type: select
    libelle: "Type d'état"
    obligatoire: true
    options:
      - LIVRE_PAIE
      - JOURNAL_PAIE
      - RECAP_COTISATIONS
      - RECAP_URSSAF
      - RECAP_RETRAITE
      - RECAP_PREVOYANCE
      - ETAT_CHARGES
      - MASSE_SALARIALE
      - PROVISION_CP
      - PROVISION_RTT
      - BILAN_SOCIAL
      - ETAT_EFFECTIFS
      - RECAP_PAS
      - DUCS
      - DSN_CONTROLE

  - nom: libelle
    type: text
    libelle: "Libellé"
    obligatoire: true

  # Période
  - nom: periode_type
    type: select
    libelle: "Type période"
    options:
      - MENSUEL
      - TRIMESTRIEL
      - ANNUEL
      - PERSONNALISE
    defaut: MENSUEL

  - nom: periode
    type: text
    libelle: "Période"
    placeholder: "AAAA-MM"

  - nom: date_debut
    type: date
    libelle: "Date début"

  - nom: date_fin
    type: date
    libelle: "Date fin"

  - nom: annee
    type: number
    libelle: "Année"

  - nom: trimestre
    type: number
    libelle: "Trimestre"

  # Périmètre
  - nom: etablissement_id
    type: relation
    libelle: "Établissement"
    relation: etablissements
    description: "Vide = tous"

  - nom: service_id
    type: relation
    libelle: "Service"
    relation: services
    description: "Vide = tous"

  - nom: categorie_employe
    type: select
    libelle: "Catégorie"
    options:
      - TOUS
      - CADRE
      - NON_CADRE
      - CADRE_DIRIGEANT
    defaut: TOUS

  # Livre de paie
  - nom: nombre_bulletins
    type: number
    libelle: "Nombre bulletins"

  - nom: total_brut
    type: money
    libelle: "Total brut"

  - nom: total_cotisations_salariales
    type: money
    libelle: "Cotisations salariales"

  - nom: total_cotisations_patronales
    type: money
    libelle: "Cotisations patronales"

  - nom: total_net_a_payer
    type: money
    libelle: "Total net à payer"

  - nom: total_net_imposable
    type: money
    libelle: "Total net imposable"

  # Récap cotisations
  - nom: urssaf_salarial
    type: money
    libelle: "URSSAF salarial"

  - nom: urssaf_patronal
    type: money
    libelle: "URSSAF patronal"

  - nom: urssaf_total
    type: money
    libelle: "URSSAF total"

  - nom: retraite_salarial
    type: money
    libelle: "Retraite salarial"

  - nom: retraite_patronal
    type: money
    libelle: "Retraite patronal"

  - nom: retraite_total
    type: money
    libelle: "Retraite total"

  - nom: prevoyance_salarial
    type: money
    libelle: "Prévoyance salarial"

  - nom: prevoyance_patronal
    type: money
    libelle: "Prévoyance patronal"

  - nom: mutuelle_salarial
    type: money
    libelle: "Mutuelle salarial"

  - nom: mutuelle_patronal
    type: money
    libelle: "Mutuelle patronal"

  - nom: formation_patronal
    type: money
    libelle: "Formation"

  - nom: taxe_apprentissage
    type: money
    libelle: "Taxe apprentissage"

  # PAS
  - nom: pas_total
    type: money
    libelle: "Total PAS"

  - nom: pas_nombre_salaries
    type: number
    libelle: "Salariés concernés PAS"

  # Réductions
  - nom: reduction_fillon
    type: money
    libelle: "Réduction Fillon"

  - nom: exoneration_heures_sup
    type: money
    libelle: "Exo heures sup"

  - nom: autres_exonerations
    type: money
    libelle: "Autres exonérations"

  # Provisions
  - nom: provision_cp
    type: money
    libelle: "Provision CP"

  - nom: provision_rtt
    type: money
    libelle: "Provision RTT"

  - nom: provision_prime_13
    type: money
    libelle: "Provision 13ème mois"

  - nom: provision_indemnite_fin_cdd
    type: money
    libelle: "Provision fin CDD"

  # Effectifs
  - nom: effectif_debut
    type: number
    libelle: "Effectif début"

  - nom: effectif_fin
    type: number
    libelle: "Effectif fin"

  - nom: effectif_moyen
    type: number
    libelle: "Effectif moyen"

  - nom: etp
    type: number
    libelle: "ETP"

  - nom: entrees
    type: number
    libelle: "Entrées"

  - nom: sorties
    type: number
    libelle: "Sorties"

  # Détails JSON
  - nom: detail_rubriques
    type: json
    libelle: "Détail rubriques"
    description: "Ventilation par rubrique"

  - nom: detail_cotisations
    type: json
    libelle: "Détail cotisations"
    description: "Ventilation par caisse"

  - nom: detail_ctp
    type: json
    libelle: "Détail CTP"
    description: "Par code type personnel"

  - nom: detail_etablissements
    type: json
    libelle: "Détail établissements"

  - nom: detail_services
    type: json
    libelle: "Détail services"

  # Fichier généré
  - nom: format_sortie
    type: select
    libelle: "Format"
    options:
      - PDF
      - EXCEL
      - CSV
      - JSON
    defaut: PDF

  - nom: fichier
    type: text
    libelle: "Fichier"
    description: "Chemin du fichier généré"

  - nom: taille_fichier
    type: number
    libelle: "Taille (octets)"

  # Génération
  - nom: date_generation
    type: datetime
    libelle: "Date génération"

  - nom: genere_par
    type: text
    libelle: "Généré par"

  - nom: duree_generation
    type: number
    libelle: "Durée (sec)"

  # Comparaison
  - nom: variation_brut
    type: money
    libelle: "Variation brut"
    description: "vs période précédente"

  - nom: variation_effectif
    type: number
    libelle: "Variation effectif"

  - nom: variation_pourcentage
    type: number
    libelle: "Variation (%)"

  # Statut
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - EN_COURS
      - GENERE
      - VALIDE
      - ARCHIVE
    defaut: EN_COURS

  - nom: valide_par
    type: text
    libelle: "Validé par"

  - nom: date_validation
    type: datetime
    libelle: "Date validation"

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

# Index pour performance
index:
  - type_etat
  - periode
  - annee

recherche:
  - numero
  - type_etat
  - periode

affichage_liste:
  - numero
  - type_etat
  - libelle
  - periode
  - total_brut
  - statut
  - date_generation

workflow:
  EN_COURS -> GENERE: "Générer"
  GENERE -> VALIDE: "Valider"
  VALIDE -> ARCHIVE: "Archiver"

actions:
  - generer_etat
  - exporter_excel
  - exporter_pdf
  - envoyer_email
  - comparer_periode
