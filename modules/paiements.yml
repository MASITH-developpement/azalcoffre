# AZALPLUS - Module Paiements
# Suivi des paiements de factures

nom: Paiements
icone: credit-card
menu: Comptabilite

champs:
  # Identification
  - nom: reference
    type: text
    obligatoire: false
    description: Référence du paiement (auto-générée)
    autocompletion: true

  # Lien vers la facture
  - nom: facture_id
    type: relation
    obligatoire: true
    relation: Factures
    description: Facture associée
    autocompletion: true

  # Montant du paiement
  - nom: montant
    type: number
    obligatoire: true
    description: Montant du paiement

  - nom: devise
    type: relation
    obligatoire: false
    relation: Devises
    defaut: EUR
    description: Devise du paiement
    autocompletion: true

  - nom: taux_change
    type: number
    obligatoire: false
    defaut: 1.0
    description: Taux de change au moment du paiement

  - nom: montant_base
    type: number
    obligatoire: false
    description: Montant en devise de base (EUR)

  # Date du paiement
  - nom: date_paiement
    type: date
    obligatoire: true
    defaut: aujourd'hui
    description: Date du paiement

  - nom: date_reception
    type: date
    obligatoire: false
    description: Date de réception effective

  # Mode de paiement
  - nom: mode
    type: select
    obligatoire: true
    options: [CB, VIREMENT, CHEQUE, ESPECES, PRELEVEMENT, PAYPAL, STRIPE, AUTRE]
    description: Mode de paiement

  # Références bancaires
  - nom: reference_transaction
    type: text
    obligatoire: false
    description: Référence de la transaction
    autocompletion: true

  - nom: banque
    type: text
    obligatoire: false
    description: Banque émettrice
    autocompletion: true

  - nom: numero_cheque
    type: text
    obligatoire: false
    description: Numéro de chèque
    autocompletion: true

  - nom: compte_bancaire
    type: text
    obligatoire: false
    description: Compte bancaire de réception
    autocompletion: true

  # Statut du paiement
  - nom: statut
    type: select
    obligatoire: true
    defaut: EN_ATTENTE
    options: [EN_ATTENTE, VALIDE, REJETE, ANNULE]
    description: Statut du paiement

  # Validation
  - nom: date_validation
    type: datetime
    obligatoire: false
    description: Date de validation

  - nom: valide_par
    type: relation
    obligatoire: false
    relation: Utilisateurs
    description: Validé par
    autocompletion: true

  # Rejet/Annulation
  - nom: motif_rejet
    type: textarea
    obligatoire: false
    description: Motif de rejet ou annulation

  - nom: date_rejet
    type: datetime
    obligatoire: false
    description: Date de rejet

  # Client (dénormalisé pour faciliter les recherches)
  - nom: client_id
    type: relation
    obligatoire: false
    relation: Clients
    description: Client (auto-rempli depuis la facture)
    autocompletion: true

  # Notes
  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes internes

  # Métadonnées
  - nom: created_by
    type: relation
    obligatoire: false
    relation: Utilisateurs
    autocompletion: true

  - nom: created_at
    type: datetime
    obligatoire: false

  - nom: updated_at
    type: datetime
    obligatoire: false

workflow:
  EN_ATTENTE -> VALIDE: action valider_paiement
  EN_ATTENTE -> REJETE: action rejeter_paiement
  VALIDE -> ANNULE: action annuler_paiement
  EN_ATTENTE -> ANNULE: action annuler_paiement

actions:
  - valider_paiement
  - rejeter_paiement
  - annuler_paiement
  - generer_recu
  - envoyer_confirmation

marceau:
  alertes:
    - si statut=EN_ATTENTE et date_paiement < maintenant - 3j: "Paiement en attente de validation depuis plus de 3 jours"
    - si statut=REJETE: "Paiement rejeté - vérifier les informations"
    - si mode=CHEQUE et statut=EN_ATTENTE: "Chèque en attente d'encaissement"
  suggestions:
    - "Valider les paiements en attente"
    - "Vérifier les paiements rejetés"
    - "Rapprocher les paiements avec les relevés bancaires"
