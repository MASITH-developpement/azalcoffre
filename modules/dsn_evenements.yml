# =============================================================================
# AZALPLUS - Événements DSN
# =============================================================================
# Signalements d'événements pour la DSN événementielle

nom: Événement DSN
nom_pluriel: Événements DSN
icone: alert-circle
menu: Paie
description: "Événements DSN: arrêts, fins de contrat, reprises"
ordre_menu: 11

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "EVT-{AAAA}{MM}{JJ}-{####}"

  - nom: type_evenement
    type: select
    libelle: "Type d'événement"
    obligatoire: true
    options:
      - ARRET_TRAVAIL
      - REPRISE_TRAVAIL
      - FIN_CONTRAT
      - DEBUT_CONTRAT
      - MODIFICATION_CONTRAT

  - nom: employe_id
    type: relation
    libelle: "Employé"
    relation: employes
    obligatoire: true

  - nom: dsn_id
    type: relation
    libelle: "DSN"
    relation: dsn
    description: "DSN événementielle générée"

  # Dates de l'événement
  - nom: date_evenement
    type: date
    libelle: "Date événement"
    obligatoire: true

  - nom: date_debut
    type: date
    libelle: "Date début"
    description: "Début de l'arrêt ou du contrat"

  - nom: date_fin
    type: date
    libelle: "Date fin"
    description: "Fin prévisionnelle"

  - nom: date_fin_reelle
    type: date
    libelle: "Date fin réelle"

  # Arrêt de travail
  - nom: motif_arret
    type: select
    libelle: "Motif arrêt"
    options:
      - "01 - Maladie"
      - "02 - Maternité"
      - "03 - Paternité/Accueil enfant"
      - "04 - Accident de travail"
      - "05 - Accident de trajet"
      - "06 - Maladie professionnelle"
      - "07 - Temps partiel thérapeutique"
      - "08 - Congé pathologique prénatal"
      - "09 - Congé pathologique postnatal"

  - nom: date_dernier_jour_travail
    type: date
    libelle: "Dernier jour travaillé"

  - nom: subrogation
    type: boolean
    libelle: "Subrogation"
    defaut: false
    description: "Employeur perçoit les IJSS"

  - nom: date_debut_subrogation
    type: date
    libelle: "Début subrogation"

  - nom: date_fin_subrogation
    type: date
    libelle: "Fin subrogation"

  - nom: iban_subrogation
    type: text
    libelle: "IBAN subrogation"

  # Fin de contrat
  - nom: motif_rupture
    type: select
    libelle: "Motif rupture"
    options:
      - "011 - Licenciement suite FE ou FI"
      - "012 - Licenciement suite liquidation judiciaire"
      - "014 - Licenciement pour motif économique"
      - "015 - Licenciement pour fin de chantier"
      - "020 - Licenciement pour autre motif"
      - "025 - Autre fin de contrat"
      - "026 - Rupture anticipée du CDD"
      - "031 - Démission"
      - "032 - Rupture conventionnelle"
      - "033 - Prise d'acte de rupture"
      - "034 - Départ à la retraite"
      - "035 - Mise à la retraite"
      - "036 - Décès"
      - "038 - Fin de période d'essai"
      - "039 - Fin de CDD"
      - "043 - Rupture conventionnelle collective"
      - "065 - Fin de mandat"
      - "081 - Fin de contrat d'apprentissage"
      - "082 - Fin contrat professionnalisation"
      - "089 - Mise à pied"
      - "091 - Transfert"
      - "998 - Autres"

  - nom: date_notification
    type: date
    libelle: "Date notification"

  - nom: date_fin_preavis
    type: date
    libelle: "Fin préavis"

  - nom: preavis_effectue
    type: boolean
    libelle: "Préavis effectué"
    defaut: true

  - nom: dernier_jour_travail
    type: date
    libelle: "Dernier jour travaillé"

  - nom: date_fin_contrat
    type: date
    libelle: "Date fin contrat"

  # Indemnités
  - nom: indemnite_licenciement
    type: money
    libelle: "Indemnité licenciement"

  - nom: indemnite_cp
    type: money
    libelle: "Indemnité CP"

  - nom: indemnite_preavis
    type: money
    libelle: "Indemnité préavis"

  - nom: autres_indemnites
    type: money
    libelle: "Autres indemnités"

  - nom: transaction
    type: money
    libelle: "Transaction"

  # Reprise
  - nom: date_reprise
    type: date
    libelle: "Date de reprise"

  - nom: reprise_temps_partiel
    type: boolean
    libelle: "Reprise temps partiel"
    defaut: false

  - nom: taux_reprise
    type: number
    libelle: "Taux reprise (%)"
    description: "Si temps partiel thérapeutique"

  # Transmission
  - nom: date_transmission
    type: datetime
    libelle: "Date transmission"

  - nom: delai_transmission
    type: number
    libelle: "Délai (jours)"
    description: "Jours depuis l'événement"

  - nom: urgent
    type: boolean
    libelle: "Urgent"
    defaut: false
    description: "À transmettre sous 5 jours"

  # Statut
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - A_TRANSMETTRE
      - TRANSMIS
      - ACCEPTE
      - REFUSE
      - ANNULE
    defaut: A_TRANSMETTRE

  - nom: retour_organisme
    type: textarea
    libelle: "Retour organisme"

  # Documents
  - nom: arret_travail_document
    type: text
    libelle: "Document arrêt"
    description: "Chemin du scan"

  - nom: attestation_employeur
    type: boolean
    libelle: "Attestation générée"
    defaut: false

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

recherche:
  - numero
  - employe_id
  - type_evenement
  - date_evenement

affichage_liste:
  - numero
  - employe_id
  - type_evenement
  - date_evenement
  - statut

workflow:
  A_TRANSMETTRE -> TRANSMIS: "Transmettre"
  TRANSMIS -> ACCEPTE: null
  TRANSMIS -> REFUSE: null
  REFUSE -> A_TRANSMETTRE: "Corriger"
  A_TRANSMETTRE -> ANNULE: "Annuler"

actions:
  - generer_signalement
  - transmettre
  - generer_attestation
