# =============================================================================
# AZALPLUS - Primes et Gratifications
# =============================================================================
# Gestion des différentes primes versées aux salariés

nom: Prime
nom_pluriel: Primes
icone: gift
menu: Paie
description: "Primes, gratifications et éléments exceptionnels"
ordre_menu: 6

champs:
  # Identification
  - nom: code
    type: text
    libelle: "Code prime"
    obligatoire: true
    unique: true
    placeholder: "Ex: PRIME_ANCIENNETE, 13EME_MOIS"

  - nom: libelle
    type: text
    libelle: "Libellé"
    obligatoire: true

  - nom: libelle_bulletin
    type: text
    libelle: "Libellé bulletin"
    description: "Texte affiché sur le bulletin"

  # Classification
  - nom: type_prime
    type: select
    libelle: "Type"
    obligatoire: true
    options:
      - ANCIENNETE
      - 13EME_MOIS
      - VACANCES
      - INTERESSEMENT
      - PARTICIPATION
      - EXCEPTIONNELLE
      - OBJECTIFS
      - ASSIDUITÉ
      - PERFORMANCE
      - TRANSPORT
      - PANIER
      - SALISSURE
      - OUTILLAGE
      - ASTREINTE
      - TELETRAVAIL
      - COOPTATION
      - AUTRE

  - nom: periodicite
    type: select
    libelle: "Périodicité"
    options:
      - MENSUELLE
      - TRIMESTRIELLE
      - SEMESTRIELLE
      - ANNUELLE
      - PONCTUELLE
    defaut: MENSUELLE

  - nom: mois_versement
    type: tags
    libelle: "Mois de versement"
    description: "Pour primes périodiques"

  # Calcul
  - nom: mode_calcul
    type: select
    libelle: "Mode de calcul"
    obligatoire: true
    options:
      - MONTANT_FIXE
      - POURCENTAGE_BRUT
      - POURCENTAGE_BASE
      - FORMULE
      - BAREME_ANCIENNETE
      - OBJECTIFS
    defaut: MONTANT_FIXE

  - nom: montant
    type: money
    libelle: "Montant"
    description: "Si montant fixe"

  - nom: taux
    type: number
    libelle: "Taux (%)"
    description: "Si pourcentage"

  - nom: base_calcul
    type: select
    libelle: "Base de calcul"
    options:
      - SALAIRE_BASE
      - SALAIRE_BRUT
      - MINIMUM_CONVENTIONNEL
      - PLAFOND_SS

  - nom: formule
    type: textarea
    libelle: "Formule"
    description: "Expression de calcul"

  # Barème ancienneté
  - nom: bareme_anciennete
    type: json
    libelle: "Barème ancienneté"
    description: "Taux par années d'ancienneté"

  # Conditions
  - nom: anciennete_minimum
    type: number
    libelle: "Ancienneté minimum (mois)"
    description: "Ancienneté requise"

  - nom: presence_requise
    type: boolean
    libelle: "Présence requise"
    defaut: false
    description: "Prorata en cas d'absence"

  - nom: condition
    type: textarea
    libelle: "Condition"
    description: "Condition d'attribution"

  - nom: categories_salaries
    type: tags
    libelle: "Catégories"
    description: "Cadre, Non-cadre, Tous..."

  - nom: convention_collective_id
    type: relation
    libelle: "Convention collective"
    relation: conventions_collectives

  # Plafonnement
  - nom: plafond_montant
    type: money
    libelle: "Plafond"
    description: "Montant maximum"

  - nom: plancher_montant
    type: money
    libelle: "Plancher"
    description: "Montant minimum"

  # Régime social et fiscal
  - nom: soumis_cotisations
    type: boolean
    libelle: "Soumis cotisations"
    defaut: true

  - nom: soumis_csg
    type: boolean
    libelle: "Soumis CSG/CRDS"
    defaut: true

  - nom: imposable
    type: boolean
    libelle: "Imposable"
    defaut: true

  - nom: exoneration_cotisations
    type: money
    libelle: "Exonération cotisations"
    description: "Montant exonéré"

  - nom: exoneration_impot
    type: money
    libelle: "Exonération impôt"
    description: "Montant exonéré"

  # Rubrique paie
  - nom: rubrique_paie_id
    type: relation
    libelle: "Rubrique paie"
    relation: rubriques_paie

  # Comptabilisation
  - nom: compte_charge
    type: text
    libelle: "Compte charge"

  - nom: provision
    type: boolean
    libelle: "Provisionner"
    defaut: false

  - nom: compte_provision
    type: text
    libelle: "Compte provision"

  # Métadonnées
  - nom: actif
    type: boolean
    libelle: "Actif"
    defaut: true

  - nom: date_debut
    type: date
    libelle: "Date début"

  - nom: date_fin
    type: date
    libelle: "Date fin"

  - nom: notes
    type: textarea
    libelle: "Notes"

recherche:
  - code
  - libelle
  - type_prime

affichage_liste:
  - code
  - libelle
  - type_prime
  - mode_calcul
  - montant
  - actif
