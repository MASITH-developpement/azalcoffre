# AZALPLUS - Module Devises (Multi-Currency)
nom: Devises
icone: globe
menu: Paramètres
description: Gestion des devises et taux de change

champs:
  - nom: code
    type: text
    obligatoire: true
    description: Code ISO de la devise (EUR, USD, etc.)

  - nom: name
    type: text
    obligatoire: true
    description: Nom de la devise

  - nom: symbole
    type: text
    obligatoire: true
    description: Symbole de la devise

  - nom: taux
    type: number
    obligatoire: false
    defaut: 1.0
    description: Taux de change par rapport à EUR

  - nom: decimales
    type: number
    obligatoire: false
    defaut: 2
    description: Nombre de décimales

  - nom: position_symbole
    type: select
    obligatoire: false
    options: [AVANT, APRES]
    defaut: APRES
    description: Position du symbole

  - nom: separateur_milliers
    type: text
    obligatoire: false
    defaut: " "
    description: Séparateur de milliers

  - nom: separateur_decimal
    type: text
    obligatoire: false
    defaut: ","
    description: Séparateur décimal

  - nom: actif
    type: boolean
    obligatoire: false
    defaut: true
    description: Devise active

  - nom: date_maj_taux
    type: date
    obligatoire: false
    description: Date de mise à jour du taux

actions:
  - actualiser_taux
  - activer
  - desactiver
