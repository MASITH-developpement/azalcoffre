# =============================================================================
# AZALPLUS - Solde de Tout Compte
# =============================================================================
# Gestion des fins de contrat et documents de sortie

nom: Solde de Tout Compte
nom_pluriel: Soldes de Tout Compte
icone: user-x
menu: Paie
description: "Documents de fin de contrat et calcul STC"
ordre_menu: 16

champs:
  # Identification
  - nom: numero
    type: text
    libelle: "Numéro"
    obligatoire: true
    unique: true
    auto_genere: true
    format: "STC-{AAAA}-{####}"

  - nom: employe_id
    type: relation
    libelle: "Employé"
    relation: employes
    obligatoire: true

  - nom: contrat_id
    type: relation
    libelle: "Contrat"
    relation: contrats
    obligatoire: true

  # Dates clés
  - nom: date_notification
    type: date
    libelle: "Date notification"
    description: "Date de notification de la rupture"

  - nom: date_fin_preavis
    type: date
    libelle: "Fin préavis"

  - nom: date_fin_contrat
    type: date
    libelle: "Date fin contrat"
    obligatoire: true

  - nom: dernier_jour_travail
    type: date
    libelle: "Dernier jour travaillé"
    obligatoire: true

  - nom: date_sortie_effective
    type: date
    libelle: "Sortie effective"
    description: "Avec préavis non effectué"

  # Motif de rupture
  - nom: motif_rupture
    type: select
    libelle: "Motif rupture"
    obligatoire: true
    options:
      - "011 - Licenciement suite FE ou FI"
      - "012 - Licenciement liquidation judiciaire"
      - "014 - Licenciement économique"
      - "015 - Licenciement fin de chantier"
      - "020 - Licenciement autre motif"
      - "025 - Autre fin de contrat"
      - "026 - Rupture anticipée CDD"
      - "031 - Démission"
      - "032 - Rupture conventionnelle"
      - "033 - Prise d'acte"
      - "034 - Départ retraite"
      - "035 - Mise à la retraite"
      - "036 - Décès"
      - "038 - Fin période d'essai"
      - "039 - Fin de CDD"
      - "043 - Rupture conv. collective"
      - "065 - Fin de mandat"
      - "081 - Fin apprentissage"
      - "082 - Fin professionnalisation"
      - "091 - Transfert"
      - "998 - Autres"

  - nom: initiative_rupture
    type: select
    libelle: "À l'initiative de"
    options:
      - EMPLOYEUR
      - SALARIE
      - ACCORD
      - JUDICIAIRE

  # Préavis
  - nom: preavis_du
    type: number
    libelle: "Préavis dû (j)"
    description: "Durée légale/conventionnelle"

  - nom: preavis_effectue
    type: number
    libelle: "Préavis effectué (j)"

  - nom: preavis_non_effectue
    type: number
    libelle: "Préavis non effectué (j)"

  - nom: dispense_preavis
    type: boolean
    libelle: "Dispense préavis"
    defaut: false

  - nom: initiative_dispense
    type: select
    libelle: "Dispense à l'initiative"
    options:
      - EMPLOYEUR
      - SALARIE

  # Ancienneté
  - nom: date_anciennete
    type: date
    libelle: "Date ancienneté"

  - nom: anciennete_annees
    type: number
    libelle: "Ancienneté (années)"

  - nom: anciennete_mois
    type: number
    libelle: "Ancienneté (mois)"

  # Congés payés
  - nom: cp_acquis_n1
    type: number
    libelle: "CP acquis N-1"

  - nom: cp_pris_n1
    type: number
    libelle: "CP pris N-1"

  - nom: cp_solde_n1
    type: number
    libelle: "Solde CP N-1"

  - nom: cp_acquis_n
    type: number
    libelle: "CP acquis N"

  - nom: cp_pris_n
    type: number
    libelle: "CP pris N"

  - nom: cp_solde_n
    type: number
    libelle: "Solde CP N"

  - nom: cp_total
    type: number
    libelle: "Total CP à indemniser"

  - nom: valeur_jour_cp
    type: money
    libelle: "Valeur jour CP"

  # RTT
  - nom: rtt_solde
    type: number
    libelle: "Solde RTT"

  - nom: valeur_jour_rtt
    type: money
    libelle: "Valeur jour RTT"

  # Indemnités légales et conventionnelles
  - nom: indemnite_licenciement_legale
    type: money
    libelle: "Ind. licenciement légale"

  - nom: indemnite_licenciement_conv
    type: money
    libelle: "Ind. licenciement conv."

  - nom: indemnite_licenciement
    type: money
    libelle: "Indemnité licenciement"
    description: "Plus favorable"

  - nom: indemnite_rupture_conv
    type: money
    libelle: "Ind. rupture conv."
    description: "Rupture conventionnelle"

  - nom: indemnite_preavis
    type: money
    libelle: "Indemnité préavis"

  - nom: indemnite_cp
    type: money
    libelle: "Indemnité CP"

  - nom: indemnite_rtt
    type: money
    libelle: "Indemnité RTT"

  - nom: indemnite_non_concurrence
    type: money
    libelle: "Ind. non-concurrence"

  # Autres indemnités
  - nom: prime_depart_retraite
    type: money
    libelle: "Prime départ retraite"

  - nom: dommages_interets
    type: money
    libelle: "Dommages et intérêts"

  - nom: transaction
    type: money
    libelle: "Transaction"

  - nom: autres_indemnites
    type: money
    libelle: "Autres indemnités"

  - nom: detail_autres
    type: textarea
    libelle: "Détail autres indemnités"

  # Régularisations
  - nom: salaire_du
    type: money
    libelle: "Salaire dû"
    description: "Dernier mois prorata"

  - nom: primes_dues
    type: money
    libelle: "Primes dues"

  - nom: regularisation_variable
    type: money
    libelle: "Régularisation EV"

  - nom: heures_sup_dues
    type: money
    libelle: "Heures sup dues"

  # Retenues
  - nom: acomptes_a_deduire
    type: money
    libelle: "Acomptes à déduire"

  - nom: avances_a_deduire
    type: money
    libelle: "Avances à déduire"

  - nom: trop_percu
    type: money
    libelle: "Trop-perçu"

  - nom: materiel_non_restitue
    type: money
    libelle: "Matériel non restitué"

  - nom: autres_retenues
    type: money
    libelle: "Autres retenues"

  # Totaux
  - nom: total_brut
    type: money
    libelle: "Total brut"

  - nom: total_cotisations
    type: money
    libelle: "Cotisations"

  - nom: total_csg_crds
    type: money
    libelle: "CSG/CRDS"

  - nom: total_net_avant_impot
    type: money
    libelle: "Net avant impôt"

  - nom: impot_source
    type: money
    libelle: "Impôt source"

  - nom: total_net_a_payer
    type: money
    libelle: "Net à payer"

  # Régime fiscal et social des indemnités
  - nom: indemnites_exonerees_ss
    type: money
    libelle: "Exonérées SS"

  - nom: indemnites_exonerees_ir
    type: money
    libelle: "Exonérées IR"

  - nom: indemnites_soumises
    type: money
    libelle: "Ind. soumises"

  # Documents générés
  - nom: certificat_travail
    type: boolean
    libelle: "Certificat travail"
    defaut: false

  - nom: date_certificat
    type: date
    libelle: "Date certificat"

  - nom: chemin_certificat
    type: text
    libelle: "Fichier certificat"

  - nom: attestation_pole_emploi
    type: boolean
    libelle: "Attestation Pôle Emploi"
    defaut: false

  - nom: date_attestation
    type: date
    libelle: "Date attestation"

  - nom: chemin_attestation
    type: text
    libelle: "Fichier attestation"

  - nom: recu_stc
    type: boolean
    libelle: "Reçu STC"
    defaut: false

  - nom: date_recu
    type: date
    libelle: "Date reçu"

  - nom: chemin_recu
    type: text
    libelle: "Fichier reçu"

  - nom: solde_stc_signe
    type: boolean
    libelle: "Reçu signé"
    defaut: false

  - nom: date_signature
    type: date
    libelle: "Date signature"

  # DSN Fin de contrat
  - nom: dsn_evenement_id
    type: relation
    libelle: "Événement DSN"
    relation: dsn_evenements

  - nom: transmis_dsn
    type: boolean
    libelle: "Transmis DSN"
    defaut: false

  # Bulletin de solde
  - nom: bulletin_paie_id
    type: relation
    libelle: "Bulletin solde"
    relation: bulletins_paie

  # Paiement
  - nom: date_paiement
    type: date
    libelle: "Date paiement"

  - nom: mode_paiement
    type: select
    libelle: "Mode paiement"
    options:
      - VIREMENT
      - CHEQUE
    defaut: VIREMENT

  - nom: reference_paiement
    type: text
    libelle: "Référence paiement"

  # Statut
  - nom: statut
    type: select
    libelle: "Statut"
    options:
      - BROUILLON
      - CALCULE
      - VALIDE
      - DOCUMENTS_GENERES
      - PAYE
      - CLOTURE
    defaut: BROUILLON

  - nom: valide_par
    type: text
    libelle: "Validé par"

  - nom: date_validation
    type: datetime
    libelle: "Date validation"

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

recherche:
  - numero
  - employe_id
  - date_fin_contrat

affichage_liste:
  - numero
  - employe_id
  - motif_rupture
  - date_fin_contrat
  - total_net_a_payer
  - statut

workflow:
  BROUILLON -> CALCULE: "Calculer"
  CALCULE -> BROUILLON: "Modifier"
  CALCULE -> VALIDE: "Valider"
  VALIDE -> DOCUMENTS_GENERES: "Générer documents"
  DOCUMENTS_GENERES -> PAYE: "Payer"
  PAYE -> CLOTURE: "Clôturer"

actions:
  - calculer_stc
  - generer_certificat_travail
  - generer_attestation_pole_emploi
  - generer_recu_stc
  - generer_bulletin_solde
  - creer_evenement_dsn
  - envoyer_documents
