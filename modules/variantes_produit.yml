# AZALPLUS - Module Variantes Produit
nom: VariantesProduit
icone: layers
menu: Inventaire
description: Declinaisons de produits avec attributs specifiques

champs:
  - nom: produit_id
    type: relation
    obligatoire: true
    relation: Produits
    description: Produit parent
    autocompletion: true

  - nom: attributs
    type: json
    obligatoire: true
    description: Attributs definissant la variante (taille, couleur, etc.)

  - nom: sku
    type: text
    obligatoire: true
    description: SKU unique de la variante
    autocompletion: true

  - nom: nom_variante
    type: text
    obligatoire: false
    description: Nom affiche de la variante
    autocompletion: true

  - nom: barcode
    type: text
    obligatoire: false
    description: Code-barres unique de la variante
    autocompletion: true

  - nom: ean13
    type: text
    obligatoire: false
    description: Code EAN13 de la variante
    autocompletion: true

  - nom: prix
    type: number
    obligatoire: false
    description: Prix de vente HT (surcharge produit parent)

  - nom: prix_achat
    type: number
    obligatoire: false
    description: Prix d'achat HT (surcharge produit parent)

  - nom: ecarts_prix
    type: json
    obligatoire: false
    description: Ecarts de prix par attribut

  - nom: stock
    type: number
    obligatoire: false
    defaut: 0
    description: Quantite en stock

  - nom: stock_reserve
    type: number
    obligatoire: false
    defaut: 0
    description: Quantite reservee

  - nom: stock_minimum
    type: number
    obligatoire: false
    description: Seuil d'alerte stock bas

  - nom: poids_kg
    type: number
    obligatoire: false
    description: Poids en kg

  - nom: dimensions
    type: json
    obligatoire: false
    description: Dimensions specifiques

  - nom: image_url
    type: text
    obligatoire: false
    description: URL de l'image de la variante

  - nom: actif
    type: boolean
    obligatoire: false
    defaut: true
    description: Variante active

  - nom: disponible_vente
    type: boolean
    obligatoire: false
    defaut: true
    description: Disponible a la vente

  - nom: fournisseur_id
    type: relation
    obligatoire: false
    relation: Fournisseurs
    description: Fournisseur specifique pour cette variante
    autocompletion: true

  - nom: reference_fournisseur
    type: text
    obligatoire: false
    description: Reference fournisseur de cette variante
    autocompletion: true

  - nom: ordre
    type: number
    obligatoire: false
    defaut: 0
    description: Ordre d'affichage

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes internes

actions:
  - modifier_prix
  - modifier_stock
  - dupliquer
  - activer
  - desactiver
  - generer_barcode
