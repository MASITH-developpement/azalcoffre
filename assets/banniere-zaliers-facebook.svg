<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 856">
  <!-- Fond dégradé bleu -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A45B0"/>
      <stop offset="100%" style="stop-color:#3454D1"/>
    </linearGradient>
  </defs>
  <rect width="1640" height="856" fill="url(#bgGradient)"/>

  <!-- Motif de points décoratifs -->
  <circle cx="150" cy="150" r="8" fill="#6B9FFF" opacity="0.3"/>
  <circle cx="1500" cy="200" r="12" fill="#6B9FFF" opacity="0.4"/>
  <circle cx="1400" cy="700" r="10" fill="#6B9FFF" opacity="0.3"/>
  <circle cx="200" cy="650" r="15" fill="#6B9FFF" opacity="0.2"/>
  <circle cx="800" cy="100" r="6" fill="#6B9FFF" opacity="0.4"/>
  <circle cx="1300" cy="400" r="8" fill="#6B9FFF" opacity="0.3"/>

  <!-- Logo Z (cercle) -->
  <circle cx="820" cy="320" r="140" fill="#FFFFFF"/>
  <circle cx="820" cy="320" r="130" fill="#3454D1"/>
  <circle cx="900" cy="220" r="16" fill="#6B9FFF"/>
  <text x="820" y="365"
        font-family="Inter, Montserrat, Arial, sans-serif"
        font-weight="800"
        font-size="160"
        fill="#FFFFFF"
        text-anchor="middle">Z</text>

  <!-- Texte principal -->
  <text x="820" y="550"
        font-family="Inter, Montserrat, Arial, sans-serif"
        font-weight="800"
        font-size="90"
        fill="#FFFFFF"
        text-anchor="middle">LES ZALIERS</text>

  <!-- Sous-titre -->
  <text x="820" y="640"
        font-family="Inter, Montserrat, Arial, sans-serif"
        font-weight="500"
        font-size="40"
        fill="#FFFFFF"
        opacity="0.9"
        text-anchor="middle">TPE sans filtre — On parle cash</text>

  <!-- Ligne décorative -->
  <rect x="620" y="670" width="400" height="4" rx="2" fill="#6B9FFF" opacity="0.6"/>

  <!-- Tagline -->
  <text x="820" y="750"
        font-family="Inter, Montserrat, Arial, sans-serif"
        font-weight="600"
        font-size="28"
        fill="#FFFFFF"
        opacity="0.7"
        text-anchor="middle">Artisans • Commerçants • Indépendants</text>
</svg>
