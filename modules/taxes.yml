actions:
  - voir_produits_associes
  - dupliquer
  - desactiver
  - activer

contraintes:
  - type: unique
    champs: [code]
    message: "Ce code taxe existe deja"

  - type: validation
    condition: "taux >= 0 AND taux <= 100"
    message: "Le taux doit etre entre 0 et 100"

  - type: validation
    condition: "type != 'montant_fixe' OR montant_fixe IS NOT NULL"
    message: "Le montant fixe est requis pour ce type de taxe"

  - type: coherence
    condition: "defaut_vente = true IMPLIES actif = true"
    message: "Une taxe par defaut doit etre active"

marceau:
  alertes:
    - si date_fin < aujourd'hui et actif: "Taxe expiree mais toujours active"
    - si defaut_vente et not actif: "Taxe par defaut desactivee"

  suggestions:
    - "Verifier les taux de TVA pour le nouvel exercice"
    - "Mettre a jour les codes d'exemption pour Factur-X"

  kpis:
    - nom: "Taxes actives"
      calcul: "compte(actif = true)"
      format: "nombre"

    - nom: "TVA collectee (mois)"
      calcul: "somme(factures.tva_montant) WHERE date >= debut_mois"
      format: "monnaie"

    - nom: "TVA deductible (mois)"
      calcul: "somme(achats.tva_montant) WHERE date >= debut_mois"
      format: "monnaie"
