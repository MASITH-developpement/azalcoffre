# ALEMBIC (MIGRATIONS)
# =============================================================================

alembic:
  migrations:
    - id: alembic_001
      titre: "Alembic - Migrations de base de donnees"
      contenu: |
        INSTALLATION ET CONFIGURATION

        pip install alembic

        # Initialiser
        alembic init alembic

        # alembic.ini - Configurer URL
        sqlalchemy.url = postgresql://user:pass@localhost/dbname

        # alembic/env.py - Importer les modeles
        from moteur.models import Base
        target_metadata = Base.metadata

        COMMANDES COURANTES

        # Creer une migration auto
        alembic revision --autogenerate -m "description"

        # Appliquer les migrations
        alembic upgrade head

        # Voir l'etat
        alembic current
        alembic history

        # Rollback
        alembic downgrade -1

        MIGRATION MANUELLE

        # alembic/versions/xxxx_add_column.py
        def upgrade():
            op.add_column(
                'items',
                sa.Column('nouveau_champ', sa.String(100))
            )

        def downgrade():
            op.drop_column('items', 'nouveau_champ')

        OPERATIONS COURANTES

        # Ajouter colonne
        op.add_column('table', sa.Column('col', sa.String(50)))

        # Supprimer colonne
        op.drop_column('table', 'col')

        # Renommer colonne
        op.alter_column('table', 'old_name', new_column_name='new_name')

        # Creer table
        op.create_table(
            'nouvelle_table',
            sa.Column('id', sa.UUID(), primary_key=True),
            sa.Column('nom', sa.String(100), nullable=False),
        )

        # Ajouter index
        op.create_index('ix_table_col', 'table', ['col'])

        # Ajouter foreign key
        op.create_foreign_key(
            'fk_items_categorie',
            'items', 'categories',
            ['categorie_id'], ['id']
        )

