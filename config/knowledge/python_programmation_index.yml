bibliotheques:
  utiles:
    - id: py_lib_001
      titre: "datetime - Dates et heures"
      contenu: |
        MODULE DATETIME

        from datetime import datetime, date, time, timedelta

        # Date actuelle
        maintenant = datetime.now()
        aujourdhui = date.today()

        # Creer une date
        d = date(2024, 12, 25)
        dt = datetime(2024, 12, 25, 14, 30, 0)

        # Formater
        dt.strftime("%d/%m/%Y")        # "25/12/2024"
        dt.strftime("%Y-%m-%d %H:%M")  # "2024-12-25 14:30"

        # Parser
        datetime.strptime("25/12/2024", "%d/%m/%Y")

        # Calculs
        demain = aujourdhui + timedelta(days=1)
        dans_une_semaine = maintenant + timedelta(weeks=1)
        diff = date(2024, 12, 31) - aujourdhui
        print(diff.days)

        # Codes de format courants
        # %Y - annee 4 chiffres
        # %m - mois 2 chiffres
        # %d - jour 2 chiffres
        # %H - heure 24h
        # %M - minutes
        # %S - secondes

    - id: py_lib_002
