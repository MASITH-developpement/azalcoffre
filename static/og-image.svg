<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background vert emeraude -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>

    <!-- Subtle pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="100" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="900" cy="500" r="150" fill="rgba(255,255,255,0.02)"/>

  <!-- Main content container -->
  <g transform="translate(600, 280)">
    <!-- Logo icon -->
    <g transform="translate(-280, -80)" filter="url(#shadow)">
      <rect x="0" y="0" width="100" height="100" rx="20" fill="white"/>
      <text x="50" y="72" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#10b981" text-anchor="middle">A+</text>
    </g>

    <!-- Company name -->
    <text x="-155" y="0" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="white" filter="url(#glow)">AZALPLUS</text>

    <!-- Tagline -->
    <text x="-280" y="60" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.9)">ERP No-Code 100% Gratuit</text>

    <!-- Features line -->
    <g transform="translate(-280, 120)">
      <rect x="0" y="0" width="8" height="8" rx="4" fill="#a7f3d0"/>
      <text x="20" y="8" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">67 Modules</text>

      <rect x="140" y="0" width="8" height="8" rx="4" fill="#a7f3d0"/>
      <text x="160" y="8" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">Multi-tenant</text>

      <rect x="290" y="0" width="8" height="8" rx="4" fill="#a7f3d0"/>
      <text x="310" y="8" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">RGPD</text>

      <rect x="380" y="0" width="8" height="8" rx="4" fill="#a7f3d0"/>
      <text x="400" y="8" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">IA integree</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="60" y="618" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">azalplus.fr</text>
  <text x="1140" y="618" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="end">TPE / PME / ETI</text>

  <!-- Module icons -->
  <g transform="translate(920, 280)">
    <g transform="translate(0, -80)" opacity="0.15">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white"/>
      <text x="30" y="42" font-size="28" text-anchor="middle">👥</text>
    </g>
    <g transform="translate(80, -40)" opacity="0.15">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white"/>
      <text x="30" y="42" font-size="28" text-anchor="middle">📄</text>
    </g>
    <g transform="translate(40, 20)" opacity="0.15">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white"/>
      <text x="30" y="42" font-size="28" text-anchor="middle">📦</text>
    </g>
    <g transform="translate(100, 60)" opacity="0.12">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="white"/>
      <text x="25" y="36" font-size="24" text-anchor="middle">💼</text>
    </g>
  </g>

  <!-- France flag indicator -->
  <g transform="translate(1100, 50)">
    <rect x="0" y="0" width="12" height="24" fill="#002395"/>
    <rect x="12" y="0" width="12" height="24" fill="#ffffff"/>
    <rect x="24" y="0" width="12" height="24" fill="#ed2939"/>
    <text x="55" y="18" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="end">Made in France</text>
  </g>

  <!-- FREE badge -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="25" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">100% GRATUIT</text>
  </g>
</svg>
