# =============================================================================
# AZALPLUS - Module E-commerce
# =============================================================================
nom: Ecommerce
icone: shopping-cart
menu: Commercial
description: Boutique en ligne et marketplace

champs:
  - nom: reference
    type: text
    obligatoire: true
    unique: true
    description: Reference commande web

  - nom: status
    type: select
    obligatoire: true
    defaut: NOUVELLE
    options: [NOUVELLE, CONFIRMEE, EN_PREPARATION, EXPEDIEE, LIVREE, ANNULEE, REMBOURSEE]
    description: Statut commande

  - nom: source
    type: select
    obligatoire: true
    defaut: SITE_WEB
    options: [SITE_WEB, MARKETPLACE_AMAZON, MARKETPLACE_CDISCOUNT, MARKETPLACE_FNAC, INSTAGRAM, FACEBOOK]
    description: Source commande

  - nom: client_id
    type: relation
    obligatoire: false
    relation: Clients
    description: Client (si existant)

  - nom: email_client
    type: email
    obligatoire: true
    description: Email client

  - nom: nom_client
    type: text
    obligatoire: true
    description: Nom client

  - nom: telephone
    type: tel
    obligatoire: false
    description: Telephone

  - nom: adresse_livraison
    type: textarea
    obligatoire: true
    description: Adresse livraison

  - nom: adresse_facturation
    type: textarea
    obligatoire: false
    description: Adresse facturation

  - nom: lignes
    type: json
    obligatoire: false
    description: Lignes commande

  - nom: montant_ht
    type: number
    obligatoire: false
    readonly: true
    description: Montant HT

  - nom: montant_tva
    type: number
    obligatoire: false
    readonly: true
    description: Montant TVA

  - nom: frais_port
    type: number
    obligatoire: false
    defaut: 0
    description: Frais de port

  - nom: montant_ttc
    type: number
    obligatoire: false
    readonly: true
    description: Montant TTC

  - nom: mode_paiement
    type: select
    obligatoire: false
    options: [CB, PAYPAL, VIREMENT, STRIPE, ALMA]
    description: Mode paiement

  - nom: paiement_status
    type: select
    obligatoire: false
    defaut: EN_ATTENTE
    options: [EN_ATTENTE, PAYE, ECHOUE, REMBOURSE]
    description: Statut paiement

  - nom: transaction_id
    type: text
    obligatoire: false
    description: ID transaction paiement

  - nom: transporteur
    type: select
    obligatoire: false
    options: [COLISSIMO, CHRONOPOST, MONDIAL_RELAY, UPS, DHL, RETRAIT_MAGASIN]
    description: Transporteur

  - nom: tracking_number
    type: text
    obligatoire: false
    description: Numero suivi

  - nom: date_commande
    type: datetime
    obligatoire: true
    description: Date commande

  - nom: date_expedition
    type: datetime
    obligatoire: false
    description: Date expedition

  - nom: date_livraison
    type: datetime
    obligatoire: false
    description: Date livraison estimee

  - nom: facture_id
    type: relation
    obligatoire: false
    relation: Factures
    description: Facture generee

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

  - nom: ip_client
    type: text
    obligatoire: false
    description: IP client

  - nom: user_agent
    type: text
    obligatoire: false
    description: User agent

workflow:
  NOUVELLE -> CONFIRMEE: confirmer
  CONFIRMEE -> EN_PREPARATION: preparer
  EN_PREPARATION -> EXPEDIEE: expedier
  EXPEDIEE -> LIVREE: livrer
  NOUVELLE -> ANNULEE: annuler
  CONFIRMEE -> ANNULEE: annuler
  LIVREE -> REMBOURSEE: rembourser

actions:
  - confirmer
  - preparer
  - generer_facture
  - expedier
  - envoyer_tracking
  - rembourser

marceau:
  alertes:
    - si status = NOUVELLE et date_commande < aujourd'hui - 1 jour: "Commande non traitee"
    - si paiement_status = ECHOUE: "Paiement echoue"
