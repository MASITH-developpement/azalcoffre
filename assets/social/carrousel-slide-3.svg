<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#1a1a2e"/>

  <!-- Question -->
  <text x="540" y="400" font-family="Inter, Arial" font-weight="800" font-size="64" fill="#FFFFFF" text-anchor="middle">Et si on vous disait</text>
  <text x="540" y="500" font-family="Inter, Arial" font-weight="800" font-size="64" fill="#FFFFFF" text-anchor="middle">que c'est fini ?</text>

  <!-- Barre -->
  <rect x="340" y="580" width="400" height="6" fill="#3454D1"/>

  <!-- Message -->
  <text x="540" y="720" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">Fini de payer pour</text>
  <text x="540" y="790" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">des fonctions basiques.</text>

  <text x="540" y="920" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">Fini les limites artificielles.</text>

  <text x="540" y="1020" font-family="Inter, Arial" font-weight="500" font-size="42" fill="#FFFFFF" opacity="0.9" text-anchor="middle">Fini les mauvaises surprises.</text>

  <!-- Swipe -->
  <text x="540" y="1200" font-family="Inter, Arial" font-weight="500" font-size="28" fill="#FFFFFF" opacity="0.7" text-anchor="middle">Glissez →</text>

  <!-- Pagination -->
  <circle cx="480" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="510" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="540" cy="1280" r="8" fill="#FFFFFF"/>
  <circle cx="570" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="600" cy="1280" r="8" fill="#FFFFFF" opacity="0.4"/>
</svg>
