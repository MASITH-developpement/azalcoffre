# AZALPLUS - Module Fournisseurs
nom: Fournisseurs
icone: building
menu: Achats
description: Gestion des fournisseurs

champs:
  - nom: reference
    type: text
    obligatoire: true
    description: Reference fournisseur (auto-generee)
    autocompletion: true

  - nom: type
    type: select
    obligatoire: false
    defaut: SOCIETE
    options: [SOCIETE, PARTICULIER, AUTO_ENTREPRENEUR]
    description: Type de fournisseur

  # Identification
  - nom: raison_sociale
    type: text
    obligatoire: false
    description: Raison sociale
    autocompletion: true

  - nom: civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite (si particulier)

  - nom: nom
    type: text
    obligatoire: true
    description: Nom
    autocompletion: true

  - nom: prenom
    type: text
    obligatoire: false
    description: Prenom (si particulier)
    autocompletion: true

  # Contact principal
  - nom: contact_civilite
    type: select
    obligatoire: false
    options: [Mr, Mme, Melle]
    description: Civilite du contact

  - nom: contact_nom
    type: text
    obligatoire: false
    description: Nom du contact
    autocompletion: true

  - nom: contact_fonction
    type: text
    obligatoire: false
    description: Fonction du contact
    autocompletion: true

  - nom: email
    type: email
    obligatoire: true
    autocompletion: true

  - nom: telephone
    type: tel
    obligatoire: false

  - nom: mobile
    type: tel
    obligatoire: false

  - nom: site_web
    type: text
    obligatoire: false
    autocompletion: true

  # Adresse
  - nom: adresse
    type: textarea
    obligatoire: false
    autocompletion: true

  - nom: adresse_complement
    type: text
    obligatoire: false
    autocompletion: true

  - nom: code_postal
    type: text
    obligatoire: false
    autocompletion: true

  - nom: ville
    type: text
    obligatoire: false
    autocompletion: true

  - nom: pays
    type: text
    obligatoire: false
    defaut: France
    autocompletion: true

  # Informations legales
  - nom: siret
    type: text
    obligatoire: false
    description: Numero SIRET
    autocompletion: true

  - nom: siren
    type: text
    obligatoire: false
    description: Numero SIREN
    autocompletion: true

  - nom: tva_intra
    type: text
    obligatoire: false
    description: Numero TVA intracommunautaire
    autocompletion: true

  - nom: code_ape
    type: text
    obligatoire: false
    description: Code APE/NAF
    autocompletion: true

  - nom: capital
    type: number
    obligatoire: false
    description: Capital social

  - nom: forme_juridique
    type: text
    obligatoire: false
    description: Forme juridique
    autocompletion: true

  # Conditions commerciales
  - nom: conditions_paiement
    type: number
    obligatoire: false
    defaut: 30
    description: Delai de paiement (jours)

  - nom: mode_paiement
    type: select
    obligatoire: false
    defaut: VIREMENT
    options: [VIREMENT, CHEQUE, PRELEVEMENT, CB, ESPECES]
    description: Mode de paiement

  - nom: remise_globale
    type: number
    obligatoire: false
    defaut: 0
    description: Remise globale (%)

  - nom: franco
    type: number
    obligatoire: false
    description: Franco de port (montant minimum)

  - nom: delai_livraison
    type: number
    obligatoire: false
    description: Delai de livraison moyen (jours)

  # Bancaire
  - nom: banque
    type: text
    obligatoire: false
    description: Nom de la banque
    autocompletion: true

  - nom: iban
    type: text
    obligatoire: false
    description: IBAN

  - nom: bic
    type: text
    obligatoire: false
    description: BIC
    autocompletion: true

  # Comptabilite
  - nom: compte_comptable
    type: text
    obligatoire: false
    defaut: "401000"
    description: Compte comptable fournisseur
    autocompletion: true

  # Categories
  - nom: categorie
    type: select
    obligatoire: false
    options: [FOURNITURES, SERVICES, MATERIEL, SOUS_TRAITANCE, TRANSPORT, AUTRE]
    description: Categorie fournisseur

  - nom: tags
    type: tags
    obligatoire: false
    description: Tags pour filtrage

  # Evaluation
  - nom: note_qualite
    type: number
    obligatoire: false
    description: Note qualite (1-5)

  - nom: note_delai
    type: number
    obligatoire: false
    description: Note delai (1-5)

  - nom: note_prix
    type: number
    obligatoire: false
    description: Note prix (1-5)

  - nom: certifications
    type: textarea
    obligatoire: false
    description: Certifications
    autocompletion: true

  # Statut
  - nom: is_active
    type: boolean
    obligatoire: true
    defaut: true
    description: Actif

  - nom: date_creation_relation
    type: date
    obligatoire: false
    description: Date debut relation

  - nom: bloque
    type: boolean
    obligatoire: false
    defaut: false
    description: Fournisseur bloque

  - nom: motif_blocage
    type: text
    obligatoire: false
    description: Motif de blocage
    autocompletion: true

  # Metadonnees
  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

actions:
  - creer_commande
  - voir_commandes
  - voir_factures
  - voir_historique
  - envoyer_email
  - evaluer
  - bloquer
  - debloquer

marceau:
  alertes:
    - si bloque = true: "Fournisseur bloque"
    - si note_qualite < 3: "Fournisseur avec note qualite faible"
