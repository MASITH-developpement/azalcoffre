redis:
  cache:
    - id: redis_001
      titre: "Redis avec Python"
      contenu: |
        CONNEXION REDIS

        import redis
        from typing import Optional
        import json

        # Connexion
        redis_client = redis.Redis(
            host='localhost',
            port=6379,
            db=0,
            decode_responses=True
        )

        # Ou avec URL
        redis_client = redis.from_url("redis://localhost:6379/0")

        OPERATIONS DE BASE

        # SET/GET
        redis_client.set("cle", "valeur")
        redis_client.get("cle")

        # Avec expiration (secondes)
        redis_client.setex("cle", 3600, "valeur")  # 1 heure

        # Verifier existence
        redis_client.exists("cle")

