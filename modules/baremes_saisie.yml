# =============================================================================
# AZALPLUS - Barèmes de Saisie sur Salaire
# =============================================================================
# Tranches légales pour le calcul de la quotité saisissable

nom: Barème Saisie
nom_pluriel: Barèmes Saisie
icone: sliders
menu: Paie
description: "Barèmes légaux de saisie sur rémunération"
ordre_menu: 14

champs:
  # Identification
  - nom: annee
    type: number
    libelle: "Année"
    obligatoire: true

  - nom: date_effet
    type: date
    libelle: "Date d'effet"
    obligatoire: true
    description: "Généralement 1er janvier"

  - nom: date_fin
    type: date
    libelle: "Date fin"
    description: "Si remplacé en cours d'année"

  - nom: reference_jo
    type: text
    libelle: "Référence JO"
    description: "Décret ou arrêté de publication"

  # RSA de référence
  - nom: rsa_personne_seule
    type: money
    libelle: "RSA personne seule"
    description: "Montant mensuel RSA"

  # Tranches (barème 2024 par défaut)
  - nom: tranche_1_plafond
    type: money
    libelle: "Tranche 1 - Plafond"
    description: "Jusqu'à ce montant"

  - nom: tranche_1_taux
    type: number
    libelle: "Tranche 1 - Taux (%)"
    defaut: 3.33
    description: "1/30ème"

  - nom: tranche_2_plafond
    type: money
    libelle: "Tranche 2 - Plafond"

  - nom: tranche_2_taux
    type: number
    libelle: "Tranche 2 - Taux (%)"
    defaut: 6.67
    description: "1/15ème"

  - nom: tranche_3_plafond
    type: money
    libelle: "Tranche 3 - Plafond"

  - nom: tranche_3_taux
    type: number
    libelle: "Tranche 3 - Taux (%)"
    defaut: 10
    description: "1/10ème"

  - nom: tranche_4_plafond
    type: money
    libelle: "Tranche 4 - Plafond"

  - nom: tranche_4_taux
    type: number
    libelle: "Tranche 4 - Taux (%)"
    defaut: 13.33
    description: "2/15èmes"

  - nom: tranche_5_plafond
    type: money
    libelle: "Tranche 5 - Plafond"

  - nom: tranche_5_taux
    type: number
    libelle: "Tranche 5 - Taux (%)"
    defaut: 16.67
    description: "1/6ème"

  - nom: tranche_6_plafond
    type: money
    libelle: "Tranche 6 - Plafond"

  - nom: tranche_6_taux
    type: number
    libelle: "Tranche 6 - Taux (%)"
    defaut: 20
    description: "1/5ème"

  - nom: tranche_7_plafond
    type: money
    libelle: "Tranche 7 - Plafond"

  - nom: tranche_7_taux
    type: number
    libelle: "Tranche 7 - Taux (%)"
    defaut: 25
    description: "1/4"

  - nom: tranche_8_taux
    type: number
    libelle: "Au-delà - Taux (%)"
    defaut: 33.33
    description: "1/3"

  # Majoration par personne à charge
  - nom: majoration_personne_charge
    type: money
    libelle: "Majoration/personne"
    description: "Majoration de chaque tranche"

  # Fraction insaisissable
  - nom: fraction_insaisissable
    type: money
    libelle: "Fraction insaisissable"
    description: "Minimum à laisser (RSA)"

  # Pension alimentaire
  - nom: pension_alimentaire_integrale
    type: boolean
    libelle: "PA intégrale"
    defaut: true
    description: "Pension alimentaire saisissable intégralement"

  # Statut
  - nom: actif
    type: boolean
    libelle: "Actif"
    defaut: true

  # Notes
  - nom: notes
    type: textarea
    libelle: "Notes"

# Index pour performance
index:
  - annee
  - date_effet

recherche:
  - annee

affichage_liste:
  - annee
  - date_effet
  - tranche_1_plafond
  - fraction_insaisissable
  - actif

# Données initiales (barème 2024)
donnees_initiales:
