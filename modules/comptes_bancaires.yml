# AZALPLUS - Module Comptes Bancaires
nom: ComptesBancaires
icone: landmark
menu: Comptabilite
description: Gestion des comptes bancaires et rapprochement

champs:
  - nom: nom
    type: text
    obligatoire: true
    description: Nom du compte
    autocompletion: true

  - nom: code
    type: text
    obligatoire: false
    description: Code interne du compte
    autocompletion: true

  - nom: banque
    type: text
    obligatoire: true
    description: Nom de la banque
    autocompletion: true

  - nom: agence
    type: text
    obligatoire: false
    description: Nom ou code de l'agence
    autocompletion: true

  - nom: iban
    type: text
    obligatoire: true
    description: Numero IBAN
    autocompletion: true

  - nom: bic
    type: text
    obligatoire: false
    description: Code BIC/SWIFT
    autocompletion: true

  - nom: devise
    type: relation
    obligatoire: false
    relation: Devises
    defaut: EUR
    description: Devise du compte
    autocompletion: true

  - nom: solde_initial
    type: number
    obligatoire: false
    defaut: 0
    description: Solde initial

  - nom: solde_actuel
    type: number
    obligatoire: false
    defaut: 0
    description: Solde actuel

  - nom: compte_comptable
    type: text
    obligatoire: false
    defaut: "512"
    description: Numero de compte comptable
    autocompletion: true

  - nom: format_import
    type: select
    obligatoire: false
    options: [OFX, QIF, CSV, MT940, CAMT053]
    description: Format de fichier pour l'import

  - nom: actif
    type: boolean
    obligatoire: false
    defaut: true
    description: Compte actif

  - nom: principal
    type: boolean
    obligatoire: false
    defaut: false
    description: Compte bancaire principal

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes internes

actions:
  - importer_releve
  - rapprocher
  - voir_mouvements
  - exporter_ecritures
