pydantic:
  schemas:
    - id: pydantic_001
      titre: "Schemas Pydantic AZALPLUS"
      contenu: |
        SCHEMAS DE BASE

        from pydantic import BaseModel, Field, ConfigDict
        from typing import Optional, List
        from uuid import UUID
        from datetime import datetime

        # Schema de creation (input)
        class ItemCreate(BaseModel):
            nom: str = Field(..., min_length=1, max_length=100)
            description: Optional[str] = Field(None, max_length=1000)
            prix: float = Field(..., gt=0)
            categorie_id: Optional[UUID] = None

        # Schema de mise a jour (partiel)
        class ItemUpdate(BaseModel):
            nom: Optional[str] = Field(None, min_length=1, max_length=100)
            description: Optional[str] = None
            prix: Optional[float] = Field(None, gt=0)
            categorie_id: Optional[UUID] = None

        # Schema de reponse (output)
        class ItemResponse(BaseModel):
            model_config = ConfigDict(from_attributes=True)

            id: UUID
            nom: str
            description: Optional[str]
            prix: float
            actif: bool
            created_at: datetime

        # Schema avec relations
        class ItemDetailResponse(ItemResponse):
            categorie: Optional["CategorieResponse"] = None

        # Schema de liste pagine
        class PaginatedItems(BaseModel):
            items: List[ItemResponse]
            total: int
            page: int
            pages: int

    - id: pydantic_002
      titre: "Validation personnalisee"
      contenu: |
        VALIDATEURS PERSONNALISES

        from pydantic import BaseModel, field_validator, model_validator

        class FactureCreate(BaseModel):
            numero: str
            montant_ht: float
            taux_tva: float = 0.20
            montant_ttc: Optional[float] = None

            @field_validator('numero')
            @classmethod
            def numero_format(cls, v):
                if not v.startswith('FAC-'):
                    raise ValueError('Numero doit commencer par FAC-')
                return v

            @field_validator('taux_tva')
            @classmethod
            def taux_valide(cls, v):
                taux_valides = [0.055, 0.10, 0.20]
                if v not in taux_valides:
                    raise ValueError(f'Taux doit etre parmi {taux_valides}')
                return v

            @model_validator(mode='after')
            def calculer_ttc(self):
                if self.montant_ttc is None:
                    self.montant_ttc = self.montant_ht * (1 + self.taux_tva)
                return self

        TYPES PERSONNALISES

        from pydantic import BaseModel, EmailStr, HttpUrl
        from typing import Annotated
        from pydantic import AfterValidator

        # Email valide
        email: EmailStr

        # URL valide
        site_web: HttpUrl

        # SIRET (validation custom)
        def valider_siret(v: str) -> str:
            v = v.replace(' ', '')
            if len(v) != 14 or not v.isdigit():
                raise ValueError('SIRET invalide (14 chiffres)')
            return v

        Siret = Annotated[str, AfterValidator(valider_siret)]

        class EntrepriseCreate(BaseModel):
            nom: str
            siret: Siret
            email: EmailStr

