sqlalchemy:
  bases:
    - id: sqla_001
      titre: "SQLAlchemy 2.0 - Configuration"
      contenu: |
        CONFIGURATION BASE DE DONNEES

        from sqlalchemy import create_engine
        from sqlalchemy.orm import sessionmaker, DeclarativeBase

        # URL de connexion
        DATABASE_URL = "postgresql://user:pass@localhost:5432/dbname"

        # Engine
        engine = create_engine(
            DATABASE_URL,
            pool_size=5,
            max_overflow=10,
            pool_pre_ping=True,  # Verifie connexion
            echo=False  # True pour debug SQL
        )

        # Session factory
        SessionLocal = sessionmaker(
            bind=engine,
            autocommit=False,
            autoflush=False
        )

        # Base declarative
        class Base(DeclarativeBase):
            pass

        # Creer les tables
        Base.metadata.create_all(bind=engine)

    - id: sqla_002
      titre: "Definition de modeles"
      contenu: |
        MODELES SQLALCHEMY 2.0

        from sqlalchemy import Column, String, Integer, Float, Boolean
        from sqlalchemy import DateTime, ForeignKey, Text, JSON
        from sqlalchemy.dialects.postgresql import UUID
        from sqlalchemy.orm import relationship, Mapped, mapped_column
        from datetime import datetime
        import uuid

        class Base(DeclarativeBase):
            pass

        # Modele AZALPLUS (avec tenant_id OBLIGATOIRE)
        class Item(Base):
            __tablename__ = "items"

            # Cle primaire UUID
            id: Mapped[uuid.UUID] = mapped_column(
                UUID(as_uuid=True),
                primary_key=True,
                default=uuid.uuid4
            )

            # TENANT ID - OBLIGATOIRE AZAP-TENANT-001
            tenant_id: Mapped[uuid.UUID] = mapped_column(
                UUID(as_uuid=True),
                ForeignKey("tenants.id"),
                nullable=False,
                index=True
            )

            # Champs metier
            nom: Mapped[str] = mapped_column(String(100), nullable=False)
            description: Mapped[str | None] = mapped_column(Text)
            prix: Mapped[float] = mapped_column(Float, default=0)
            actif: Mapped[bool] = mapped_column(Boolean, default=True)

            # Timestamps
            created_at: Mapped[datetime] = mapped_column(
                DateTime, default=datetime.utcnow
            )
            updated_at: Mapped[datetime] = mapped_column(
                DateTime, default=datetime.utcnow, onupdate=datetime.utcnow
            )

            # Relations
            categorie_id: Mapped[uuid.UUID | None] = mapped_column(
                UUID(as_uuid=True),
                ForeignKey("categories.id")
            )
            categorie: Mapped["Categorie"] = relationship(
                back_populates="items"
            )

    - id: sqla_003
      titre: "Requetes CRUD"
      contenu: |
        OPERATIONS CRUD

        from sqlalchemy import select, update, delete
        from sqlalchemy.orm import Session

        # CREATE
        def create_item(db: Session, tenant_id: UUID, data: dict) -> Item:
            item = Item(tenant_id=tenant_id, **data)
            db.add(item)
            db.commit()
            db.refresh(item)
            return item

        # READ - Un element
        def get_item(db: Session, tenant_id: UUID, item_id: UUID) -> Item | None:
            stmt = select(Item).where(
                Item.id == item_id,
                Item.tenant_id == tenant_id  # FILTRE TENANT OBLIGATOIRE
            )
            return db.execute(stmt).scalar_one_or_none()

        # READ - Liste avec filtres
        def list_items(
            db: Session,
            tenant_id: UUID,
            skip: int = 0,
            limit: int = 100,
            actif: bool | None = None
        ) -> list[Item]:
            stmt = select(Item).where(Item.tenant_id == tenant_id)

            if actif is not None:
                stmt = stmt.where(Item.actif == actif)

            stmt = stmt.offset(skip).limit(limit)
            return db.execute(stmt).scalars().all()

        # UPDATE
        def update_item(
            db: Session,
            tenant_id: UUID,
            item_id: UUID,
            data: dict
        ) -> Item | None:
            item = get_item(db, tenant_id, item_id)
            if item:
                for key, value in data.items():
                    setattr(item, key, value)
                db.commit()
                db.refresh(item)
            return item

        # DELETE
        def delete_item(db: Session, tenant_id: UUID, item_id: UUID) -> bool:
            item = get_item(db, tenant_id, item_id)
            if item:
                db.delete(item)
                db.commit()
                return True
            return False

    - id: sqla_004
      titre: "Requetes avancees"
      contenu: |
        JOINTURES ET RELATIONS

        from sqlalchemy import select, func
        from sqlalchemy.orm import joinedload, selectinload

        # Jointure automatique (eager loading)
        stmt = select(Item).options(
            joinedload(Item.categorie)  # JOIN
        ).where(Item.tenant_id == tenant_id)

        # Pour les collections (one-to-many)
        stmt = select(Categorie).options(
            selectinload(Categorie.items)  # SELECT IN
        )

        AGREGATIONS

        # Compter
        stmt = select(func.count(Item.id)).where(
            Item.tenant_id == tenant_id
        )
        count = db.execute(stmt).scalar()

        # Somme
        stmt = select(func.sum(Item.prix)).where(
            Item.tenant_id == tenant_id
        )
        total = db.execute(stmt).scalar()

        # Group by
        stmt = select(
            Item.categorie_id,
            func.count(Item.id).label("count"),
            func.sum(Item.prix).label("total")
        ).where(
            Item.tenant_id == tenant_id
        ).group_by(Item.categorie_id)

        FILTRES AVANCES

        from sqlalchemy import or_, and_, not_

        # OR
        stmt = select(Item).where(
            or_(
                Item.nom.ilike("%recherche%"),
                Item.description.ilike("%recherche%")
            )
        )

        # BETWEEN
        stmt = select(Item).where(
            Item.prix.between(10, 100)
        )

        # IN
        stmt = select(Item).where(
            Item.categorie_id.in_([id1, id2, id3])
        )

        # IS NULL
        stmt = select(Item).where(
            Item.description.is_(None)
        )

        TRI ET PAGINATION

        from sqlalchemy import desc, asc

        stmt = select(Item).order_by(
            desc(Item.created_at)
        ).offset(skip).limit(limit)

