version: '3.8'

services:
  # =============================================================================
  # AZALPLUS - Application principale
  # =============================================================================
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: azalplus_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AZALPLUS_ENV=production
      - DATABASE_URL=postgresql://azalplus:${DB_PASSWORD}@postgres:5432/azalplus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CREATEUR_EMAIL=contact@stephane-moreau.fr
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - azalplus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # PostgreSQL - Base de données principale
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: azalplus_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=azalplus
      - POSTGRES_USER=azalplus
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=fr_FR.UTF-8 --lc-ctype=fr_FR.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - azalplus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azalplus -d azalplus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # Redis - Cache et sessions
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: azalplus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - azalplus_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Nginx - Reverse proxy + SSL
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: azalplus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - azalplus_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local

# =============================================================================
# Réseau isolé
# =============================================================================
networks:
  azalplus_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
