jinja2:
  templates:
    - id: jinja_001
      titre: "Templates Jinja2 AZALPLUS"
      contenu: |
        CONFIGURATION FASTAPI + JINJA2

        from fastapi import FastAPI, Request
        from fastapi.templating import Jinja2Templates
        from fastapi.staticfiles import StaticFiles

        app = FastAPI()

        # Templates
        templates = Jinja2Templates(directory="templates")

        # Fichiers statiques
        app.mount("/static", StaticFiles(directory="static"), name="static")

        @app.get("/items")
        def list_items(request: Request):
            items = get_items()
            return templates.TemplateResponse(
                "items/list.html",
                {"request": request, "items": items}
            )

        SYNTAXE JINJA2

        <!-- templates/items/list.html -->
        {% extends "base.html" %}

        {% block title %}Liste des items{% endblock %}

        {% block content %}
        <h1>{{ title }}</h1>

        <!-- Boucle -->
        <ul>
        {% for item in items %}
            <li>{{ item.nom }} - {{ item.prix }} EUR</li>
        {% else %}
            <li>Aucun item</li>
        {% endfor %}
        </ul>

        <!-- Condition -->
        {% if user.is_admin %}
            <a href="/admin">Admin</a>
        {% elif user.is_manager %}
            <a href="/manage">Gerer</a>
        {% else %}
            <span>Utilisateur standard</span>
        {% endif %}

        <!-- Filtres -->
        {{ item.prix | round(2) }}
        {{ item.created_at | date("d/m/Y") }}
        {{ item.description | truncate(100) }}
        {{ item.nom | upper }}
        {{ item.nom | default("Sans nom") }}

        <!-- URL statique -->
        <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

        <!-- Include -->
        {% include "partials/header.html" %}

        <!-- Macro -->
        {% macro input(name, label, type="text") %}
        <label>{{ label }}</label>
        <input type="{{ type }}" name="{{ name }}">
        {% endmacro %}

        {{ input("email", "Email", "email") }}
        {% endblock %}

    - id: jinja_002
      titre: "Templates AZALPLUS - Bonnes pratiques"
      contenu: |
        STRUCTURE TEMPLATES AZALPLUS

        templates/
        ├── base.html           # Template de base
        ├── ui/
        │   ├── list.html       # Liste generique
        │   ├── form.html       # Formulaire generique
        │   └── detail.html     # Detail generique
        ├── partials/
        │   ├── header.html
        │   ├── footer.html
        │   ├── sidebar.html
        │   └── messages.html
        └── email/
            └── facture.html

        BASE TEMPLATE

        <!-- templates/base.html -->
        <!DOCTYPE html>
        <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{% block title %}AZALPLUS{% endblock %}</title>
            <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
            {% block head %}{% endblock %}
        </head>
        <body class="theme-{{ theme }}">
            {% include "partials/header.html" %}

            <main class="container">
                {% include "partials/messages.html" %}
                {% block content %}{% endblock %}
            </main>

            {% include "partials/footer.html" %}

            <script src="{{ url_for('static', path='js/main.js') }}"></script>
            {% block scripts %}{% endblock %}
        </body>
        </html>

        VARIABLES CSS AZALPLUS

        Toujours utiliser les variables CSS :
        - var(--color-primary)
        - var(--color-text)
        - var(--spacing-md)
        - var(--border-radius)

        JAMAIS de couleurs hardcodees !

