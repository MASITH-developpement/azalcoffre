# AZALPLUS - Module Receptions
nom: Receptions
icone: inbox
menu: Achats

champs:
  - nom: numero
    type: text
    obligatoire: true
    description: Numero de reception
    autocompletion: true

  - nom: commande_id
    type: relation
    relation: CommandesAchat
    obligatoire: true
    description: Commande achat
    autocompletion: true

  - nom: fournisseur_id
    type: relation
    relation: Fournisseurs
    obligatoire: true
    description: Fournisseur
    autocompletion: true

  - nom: date_reception
    type: date
    obligatoire: true
    description: Date de reception

  - nom: statut
    type: select
    defaut: EN_ATTENTE
    options: [EN_ATTENTE, PARTIELLE, COMPLETE, PROBLEME]
    description: Statut

  - nom: notes
    type: textarea
    obligatoire: false
    description: Notes

  - nom: validee
    type: boolean
    defaut: false
    description: Validee

  - nom: validee_par
    type: relation
    relation: Utilisateurs
    obligatoire: false
    description: Validee par
    autocompletion: true

lignes:
  champs:
    - nom: produit_id
      type: relation
      relation: Produits
      description: Produit
      autocompletion: true

    - nom: quantite_attendue
      type: number
      description: Quantite attendue

    - nom: quantite_recue
      type: number
      description: Quantite recue

    - nom: ecart
      type: number
      description: Ecart

    - nom: motif_ecart
      type: text
      description: Motif ecart
      autocompletion: true
