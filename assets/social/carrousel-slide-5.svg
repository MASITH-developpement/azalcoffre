<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="200" fill="#3454D1"/>
  <text x="540" y="120" font-family="Inter, Arial" font-weight="800" font-size="52" fill="#FFFFFF" text-anchor="middle">REJOINS LES ZALIERS</text>

  <!-- Logo Z -->
  <circle cx="540" cy="400" r="100" fill="#3454D1"/>
  <circle cx="610" cy="330" r="14" fill="#6B9FFF"/>
  <text x="540" y="435" font-family="Inter, Arial" font-weight="800" font-size="110" fill="#FFFFFF" text-anchor="middle">Z</text>

  <!-- Message -->
  <text x="540" y="580" font-family="Inter, Arial" font-weight="700" font-size="42" fill="#333333" text-anchor="middle">Les Zaliers ne paient plus</text>
  <text x="540" y="640" font-family="Inter, Arial" font-weight="700" font-size="42" fill="#333333" text-anchor="middle">d'abonnement ERP.</text>

  <!-- Avantages -->
  <rect x="140" y="720" width="800" height="80" rx="15" fill="#f0f4ff"/>
  <text x="540" y="775" font-family="Inter, Arial" font-weight="600" font-size="32" fill="#3454D1" text-anchor="middle">100 premiers accompagnés personnellement</text>

  <rect x="140" y="830" width="800" height="80" rx="15" fill="#f0f4ff"/>
  <text x="540" y="885" font-family="Inter, Arial" font-weight="600" font-size="32" fill="#3454D1" text-anchor="middle">Communauté d'entraide TPE</text>

  <rect x="140" y="940" width="800" height="80" rx="15" fill="#f0f4ff"/>
  <text x="540" y="995" font-family="Inter, Arial" font-weight="600" font-size="32" fill="#3454D1" text-anchor="middle">Accès à vie. Gratuit. Illimité.</text>

  <!-- CTA -->
  <rect x="240" y="1100" width="600" height="90" rx="45" fill="#3454D1"/>
  <text x="540" y="1160" font-family="Inter, Arial" font-weight="700" font-size="36" fill="#FFFFFF" text-anchor="middle">Je m'inscris maintenant</text>

  <!-- Pagination -->
  <circle cx="480" cy="1280" r="8" fill="#3454D1" opacity="0.4"/>
  <circle cx="510" cy="1280" r="8" fill="#3454D1" opacity="0.4"/>
  <circle cx="540" cy="1280" r="8" fill="#3454D1" opacity="0.4"/>
  <circle cx="570" cy="1280" r="8" fill="#3454D1" opacity="0.4"/>
  <circle cx="600" cy="1280" r="8" fill="#3454D1"/>
</svg>
